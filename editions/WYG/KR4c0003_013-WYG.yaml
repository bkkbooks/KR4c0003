body:
  text: 王子安集巻十三唐王勃撰碑益州夫子廟碑述夫帝車南指遯七曜於中階華葢西臨藏五雲於太甲雖復星辰蕩越三元之軌躅可尋雷雨沸騰六氣之經綸有序然則撫銅渾而觀變化則萬象之動不足多也握瑶鏡而臨事業則萬機之湊不足大也故知功有所服龜龍不能謝鱗介之尊器有所歸江漢不能竊朝宗之柄是以朱陽登而九有照紫泉清而萬物覩粤若皇靈草昧風驪受河洛之圖帝象權輿雲鳳錫乾坤之瑞髙辛堯舜氏沒大夏殷周氏作達其變遂成天下之文極其數遂定天下之象衣冠度律隨鼎器而重光玉帛謳歌反宗禋而大備洎乎三川失御九服蒙塵俎豆喪而王澤竭鐘鼔衰而頌聲寢邵陵髙㑹諸侯輕漢水之威踐土同盟天子窘河陽之召三徽制度乗戰道而横流千載英華與王風而掃地大業不可以終喪彞倫不可以遂絶繇是山河朕兆素王開受命之符天地氤氳𤣥聖舉乗時之策興九圍之廢典振六合之頽綱有道存焉斯文備矣夫子姓孔氏諱丘字仲尼魯國鄒人也帝天乙之靈苗宋㣲子之洪緒自𤣥禽翦夏浮寶玉於南巢白馬朝周載旌旗於北面五遷神器琮璜髙列帝之榮三命雄圖鐘鼎冠承家之禮商丘誕睿下屬於防山泗水載靈遥馳於汶上禮樂繇其委輸人儀所以來蘇排禍亂而搆乾元掃荒屯而樹真宰聖人之大業也若乃承百王之丕運摠千聖之殊姿人靈昭有作之期嶽瀆降非常之表珠衡玉斗徵象緯於天經贙據龍蹲集風雲於地紀亦猶三階瞰月恒星知太紫之宫八柱衝霄羣嶺辨中黄之宅聖人之至象也若乃順時而動用晦而明紆聖哲於常師混波流於下問太陽亭午收爝火於丹衡滄浪浮天控涓涔於翠渚西周捧袂仙公留紫氣之書東海摳衣郯子敘青雲之袂接輿非聖詢去就於狂歌童子何知屈炎涼於詭問聖人之降跡也若乃參神揆訓録道和倪辱太白於中都絆乗黄於下邑湛無為之跡而衆務同并馳不言之化而羣方取則雖復霓旌羽斾齊人張夾谷之威八佾三雍桓氏逼公宫之制洎乎歴階而進宣武備而斬俳優推義而行肅刑書而誅正夘用能使四方知罪爭歸舊好之田三家變色願執陪臣之禮聖人之成務也若乃乗機動用歴聘栖遑神經幽顯志大宇宙東西南北推心於暴亂之朝恭儉温良援手於危亡之國道之將行也命道之將廢也命歸齊去魯發浩歎於衰周厄宋圍陳奏悲歌於下蔡聖人之救時也若乃筐篚六藝笙簧五典折旋洙泗之間探賾唐虞之際三千弟子攀睿化而升堂七十門人奉洪規而入室從周定禮憲章知損益之源反魯裁詩雅頌得絃歌之首備物而存道下學而上達援神敘敎降赤製於南宫運斗陳經動𤣥符於北洛聖人之立教也若乃觀象設敎法三百八十四爻四十有九窮神知化應萬有一千五百五十有五成變化而行鬼神觀隂陽而倚天地以鼓天下之動以定天下之疑索衆妙於重𤣥纂羣㣲於太素聖人之贊易也若乃靈襟不測睿視無涯石砮昭集隼之庭土缶驗羵羊之井稽山南望識皓骨於封禺蠡澤東浮考丹萍於夢渚麟圖鑑逺金編題佐漢之符鳳徳鈎深玉策筮亡秦之兆聖人之觀化也時義逺矣能事畢矣然後拂衣方外脱屣人間奠楹興夕夢之災負杖起晨歌之跡撓虹梁於大厦物莫能宗摧日觀於魯丘吾將安仰明均兩曜不能遷代謝之期序合四時不能革盈虚之數適來夫子時也適去夫子順也為而不有用九五而長驅成而勿㞐撫雲霓而髙視聖人之應化也自四敎逺而㣲言絶十哲喪而大義乖九師爭大易之門五傳列春秋之輻六體分於楚晉四始派於齊韓淹中之妙鍵不追稷下之髙風代起百家騰躍攀戸牖而同歸萬匹驅馳仰陶鈞而共貫猶使絲簧金石長懸闕里之堂荆棘蓬蒿不入昌平之墓聖人之遺風也遵揚十聖光被六虚乗素履而保安貞垂黄裳而獲元吉故能貴而無位履端於太極之初髙而無名布政於皇王之首千秋所不能易百代所不能移萬乗資以興衰四海繇其輕重雖復質文交映瞻禴祀而長存金火逓遷奉琴書而罔絶葢易曰觀乎人文以化成天下又云聖人以神道設敎而萬物服焉豈古之聰明睿智神武而不殺者夫國家襲宇宙之淳精據明靈之寶位髙祖武皇帝以黄旗問罪杖金䇿以勞華夷太宗文皇帝以朱翟承天穆玉衡而正區宇皇上宣祖宗之累洽奉文武之重光稽厯數而坐明堂陳禮容而謁太廟八神齊饗停旒太史之宫六辨同和駐蹕華胥之野文物隱地聲名動天樂繁九俗禮盛三古冠帶混并之所書軌八紘閭閻兼匝之鄉烟火四極竭河追日夸父力盡於楹間越海陵山竪亥塗窮於廡下薰腴廣被景貺潛周乾象著而常文清坤靈滋而衆寳用溢金膏於紫洞雨露均華栖玉燭於𤣥都風雷順軌丹蓂翠菌藻繪軒庭鳳彩龍姿激揚池籞殊徵肸蠁不召而自至茂祉昭彰無幽而不洽雖復帝臣南面降衢室而無為岱畎東臨陟名山而有事靈命不可以辭也大典不可以推也繇是六戎宵警横紫殿而摐金五挍晨驅蹴𤣥雲而噴玉星羅海運嶽鎮川渟登碧墠而㑹神祇御𤣥壇而禮天地金箱玉冊益睿算於無疆玳撿銀繩署靈機於不竭功既成矣道既貞矣歴先王之舊國懷列聖之遺塵翔赤驥而下雲亭吟翠虬而望鄒魯泗濱休駕杳疑汾水之陽尼岫凝鑾暫似峒山之典乃下詔曰可追贈太師託鹽梅於異代鼎路生光寄舟楫於同時泉塗改照咸亨元年又下詔曰宣尼有縱自天體膺上哲合兩儀之簡易為億載之師表顧唯寢廟義在欽崇如聞諸州縣孔子廟堂及學館有破壞并向來未造生徒無肆業之所先師闕奠祭之儀久致飄零深非敬本宜令諸州縣官司速加營葺九隴縣學廟堂者大唐龍朔三年鄉人之所建也爾其州分化鳥境屬蹲鴟縈錦室於中區託銅梁於古地玉輪斜界神龍蟠沮澤之雲石鏡遥臨寳牒秘禺山之影天帝㑹昌之國上照乾維英靈秀出之鄉傍清地絡庠序繇其紏合纓弁所以㑹同文翁之景化不渝智士之風猷自逺於是雙川舊老攀帝奬而翹心三蜀名儒想成均而變色探周規於舊宅詢漢制於成都開基於四㑹之躔授矩於三農之隙土階無級就擊壤於新歡茅茨不剪易層巢於故事莊壇文杏即架椽欒樊谷幽蘭爰疏戸牖儀形莞爾似聞沂水之歌列侍誾如若奉農山之對緇帷曉闢横紐帶於西河綘帳宵懸聚青衿於北海雖秋禮冬詩之化已洽於齊人而宣風觀俗之規實歸於上宰銀青光禄大夫譙國公諱崇義大武皇帝之支孫河間大王之長子髙秋九月振玉贙於唐丘寶算千齡躍璇虯於大渚我國家靈命東朝抗裘冕之尊宗子維城南面襲軒裳之重折𤣥元之𦙍緒擁朱虛之禄位拜玉節於秦京輝金璋於蜀郡𤣥機應物潛銷水怪之災丹筆申寃俯絶山精之訟魏文侯之擁篲道在而謙尊董相國之垂帷風行而俗易司馬宇文公諱純河南洛陽人也皇根帝緒列五鼎於三朝青𤨏丹梯跨千尋於十紀仲舉澄清之轡未極夷塗士元卿相之材先登上佐氷壺精鑒遥清玉壘之郊霜鏡懸明下映金城之域縣令栁公諱明字太易河東人也梁岳之英長河之靈沐雲漢之精粹荷天衢之元亨旌旗赫奕於中古珪組陸離於下葉鳳巖抽律擢層秀於龍門驪穴騰姿吐榮光於貝闕自朱絲就列光膺令宰之榮墨綬馳芬高踐郎官之右仙鳬旦舉影入銅章乳翟朝飛聲含玉軫臨卭客位自髙文雅之庭彭澤賓門猶主壺觴之境曠懷足以御物長䇿足以服人重泉之惠訓大行單父之謳謠遂逺猶為夏絃春誦俗化之樞機西序東膠政刑之根本上祗朝憲下奉藩維爰摉􅃨廟之儀載闡重欄之制三門四表煥矣惟新上哲宗師肅焉如在將使圓冠方領再行鄒魯之風鋭氣英聲一變賨渝之俗於是侍郎幽思摛鳳藻於瓌林丞相髙材排龍姿於璧沼遺榮處士開簾詮孝悌之機頌徳賢臣持節聽中和之樂其為政也可久其為志也可大方當變化台極儀刑萬宇豈徒偃仰聽事風敎一同而已哉勃幼乏逸才少有奇志虚舟獨泛乗學海之波瀾直轡髙驅踐詞塲之閫閾觀質文之否泰衆矣考聖賢之去就多矣自生人以來未有如夫子者也嗟乎今古代絶江湖路逺恨不得親承妙㫖攝齊於游夏之間躬奉德音攘袂於天人之際撫身名而永悼瞻棟宇而長懷嗚呼哀哉敢為銘曰五帝既沒三王不歸天地震動隂陽亂飛山崩海竭月缺星圍禮樂無主宗禋遂㣲其一大哉神聖與時迴薄應運而生繼天而作龍躍浩蕩鵬飛寥廓奄有人宗遂荒天爵其二尼山降彩泗濱騰氣志匡六合神經萬類夾谷登庸中都歴試睿情貫一𤣥猷絶四其三栖遑敎跡寂寞河圖違齊出宋歴楚辭吳風衰俗毁禮去朝無麟書已巻鳳徳終孤其四杳杳靈命茫茫天秩吾道難行斯文易失式宣六藝裁成四術虛往實歸外堂内室其五邈矣能仁悠哉化主力制羣辟權傾終古陸離彩燦蟬聯茅土渉海輕河登山小魯其六皇家載造神風四極撿玉題祥繩金署徳聿懷聖跡同亨天則迺眷台庭爰昇袞職其七玉津同派金堤茂版智士髙風文翁澤逺甿淳壤沃聲和俗愿載啟仁祠遂光儒苑其八沉沉壼奧肅肅扃除靈儀若在列配如初槐新市密杏古壇疎楹疑置奠壁似藏書其九泛泛寰中悠悠天下徇名則衆知音蓋寡碝石參瓊迷風亂雅仲尼既沒夫何為者其十彭州九隴縣龍懷寺碑粤若真元混沌抱一氣於天門象化童䝉構三靈於地戸繇是金城逆順山河假成器之因玉燭沉浮風火兆流形之蘖懸大明於日月適滯泉宫設巨浸於雲雷終迷燬宅太極所以散而為兩洪飇所以吹而為萬雖復卑髙異列俱沉方内之遊坌集横流共失寰中之契豈夫湼槃深視不背色以求真般若長驅每乗空而得靜則知一名同出隂陽為破道之墟萬象皆空天地即降魔之境莫見其俯仰不知其去就至自於太虚復歸於無物其建言立徳開業成務握大柄而推造化執洪罏而誥元始四門幽闢顧非相而遲迴三駕晨嚴臨有為而出頓豈不知覊孤長路終嬰旅泊之虞舟楫中流未釋風濤之苦將以宅心者寂虛室所以合符應物者神明鏡繇其不倦故能商𣙜宇宙指麾權實演羣生而非其力存庶品而非其有千巒閉景似居蓬艾之間雙闕臨空若在江湖之上其釋迦之沖用乎龍懷山者井絡之所交㑹岷隅之所控帶攅峰北走吐香嶂於𤣥霄巨壑南馳歕洪濤於赤㟁香城寶地左右林泉碧岫丹岑往來烟液時有法㑹禪師者俗姓楮氏吳郡錢塘人也金章錫美河隂傳九命之尊玉鉉乗榮江左受三台之貴地靈人傑自朝野而重光學府文宗冠南都而獨秀法師紫星降彩紅雲受氣應積善於髙門契冥縁於累世果浮觴引潛圖彼㟁之功聚礫延砂即揆為山之業靈樞密運闢仁路而長鳴慧刃髙揮斬邪闗而洞照以為冥機體化毫髪莫滯其真執數逐㣲乾坤不容其算於是四禪幽觀破銅堞而出無明三昧雄圖排鐵圍而泯非相法雲自在吐納龍宫賢聖不仁奔馳象域將使三千塔廟知真實之𤣥津萬億幡幢入空虚之秘藏安心樂土遯影靈闗以開皇元年憇于兹嶺靈墟福地已被神功玉牓金繩未光朝命蜀王秀以文昭建國帝子專征仗巴服之尊名裂卭荒之寶命彤騑僣帝蹕萬騎於銅梁皁蓋圖王警千乗於玉宇鏡山南望志狹彭渝錦水西浮恥朝江漢開實沉之壁壘嘯京叔之風塵擁龜堞而託殊方憑爵堂而傲天子威權所制勝兵數十州雄視所臨經塗五千里三英賦雪瞻秋月於梁臺八叟吟風傳朝雲於楚館思𢎞正法廣召名僧振錫雲趨乗杯霧合禪師括囊泉石韜跡烟霞攀紫桂而同塵守青蓮而向晦衝飇蕩岳寧移忍地之靈烈火焚山不撓堅林之色王心有悟時加優禮順風拜道封山謝失發淨財於廣内揆仙室於重幽因嶂為壁憑崕列戸以開皇五年始賜額為龍懷寺地鄰緜左遂均緜上之恩山似龍盤即建龍懷之刹爾其崇巒經復複磵縈迴髙丘洩雲長林翳日增瓊垣於下麓揆瑶構於中巖香闕神行珍臺妙立玉虯銜靄絶游氣而負蒼天金鳳連甍排烈風而瞰𤣥圃延緑房於疊巘上拂霞莊蔓丹闕於重磎下披泉戸陽開隂闔變霜露於旋迴蠖動螟飛起雷霆於指顧玉堂朝亘影襲長虹珠殿宵浮光含列宿禪師歿後爰有孝恭法師智開法師𢎞嚮法師寶積闍梨四上人者並禪師之上足而法門之領袖也五明衢路控引情宫八解源流朝宗性海其深為寳投白玉於嶄巖無礙居真得𤣥珠於象㒺住持真界栖息妙塗俱探寂滅之源各證菩提之域雖業定人境照已極於無方而道寄生成功遂覃於有相演中乗之奥義增上棟之宏規萬栱不騫千門有闊俄而帝隋大去皇家小往天地閉而賢人隱雲雷屯而巨寶衰毒龍横霧四天沉暗逆之悲醉象驅風三界溺崩離之酷上人慧機幽晤定識潛融知佛日之恒明審王風之尚靜芝歌商岳揆雞嶺而同歸茅藉磻溪與猴江而共致遯俗無悶因時有待洎丹陵啟秩赤縣居尊迦維授手波旬革面十千天子新朝帝釋之宫八萬仙人始向毗耶之國一音演而荒景服三聖澄而禮樂備繇是巴方舊彥蜀城遺老仰慈門而知戸牖升福田而喜畊鑿雕鞍繡轄瞻鷰崿而馳魂黼帶綖裾指鸚林而鶩欵寶瓶宵注潤浹堯旬玉麈晨麾風調舜厯咸以為假沉其性迷生安視聼之功動亂其心窮子失肌膚之戀江連巫峽始絆心猿山對禺同終維意馬貞觀年中積闍梨等迺宣昭遺址發揮精舍容成挍厯揆日用於天經𨽻首陳章算神功於地籙迴廊􅌄窱自吐風飇列榭崢嶸坐含雲雨圖碣宫之妙質儼廬舍之真容寶珠周映銀龕備色逸多垂足似臨兠率之天師利分身若赴維摩之境靈仙可接藻繪無施真應難㣲雕鐫有寄若乃巡積岨歴森沉天花照而髙月落地籟驚而幽泉湧紫蘭花徑香侵柏葉之罏緑草紋茵影入芙蓉之座真童鳳策即踐金沙仙女鸞衣還窺石鏡巖莊轉梵杳冥松桂之墟磵石栖橰寂寞蕂蘿之院法鼔奏而寒山曠洪鐘鳴而曉壑靜赬苔翠蘚具不盡之靈衣石乳瓊漿入無生之妙饌肅肅焉遥遙焉信調御之珠庭而列真之甲第也爰有上座𤣥鑒法師等並六塵無我四諦非他奉乾越之㣲言守楞伽之奥府法雷潛吼鼔動風烟慧日揚明照臨丘壑青漢坐定見心宅之恒靈丹洞行忘覺身城之每化須彌不動迥鎮閻浮闍崛安居下觀忉利開四生之廣路敘六趣之彞倫足以遵揚眞績恭宣來命者矣縣令栁公諱明獻字太初河東人也太𤣥降氣中黄授彩襲周魯之榮基吐河汾之靈液四科髙第振風翮於三冬萬室崇班跼雲驂於百里既而政成黎頌道洽甿謳假無上之幽筌毗不言之景化絃歌在韻將寶偈而齊歸銅墨成章與梵天而共貫瓊波湛淡沃蕩雲雷珠灌蕭條蔽虧煙雨貞機罕應良談於好事之游朗調多奇髙賞盡名山之曲下走東臯事失南州塗窮歡孔席之栖遑笑楊岐之浩蕩薄游兹邑喜見髙人三接而定琴樽七縱而擒風月林宗有道相期清濁之間平叔能言見許天人之際從容宴語契闊胸懷欣性情之同冥感形骸之共遣雖𤣥都妙域已貴於忘言而義塾文場竊申於知已敢作頌曰妙象無倪神功有渉湛淡名器崩騰事業慧路翹車禪河􅋈檝控引羣品輪迴庶劫縱横宇宙反覆山川言因境立道寄形詮爰稽福地式揆珍田丹溪漏日碧洞栖烟闍都玉檻須彌石室榛灌溟濛風雲蕭瑟睟容乃眷禪徒有謐葉磴三休花巖四密崇巒架殿疊嶂營樓千楣鳳起萬栱鸞浮星開紺髪月湛青眸神宫不夜邃閣長秋戸臨重崿牕分絶嶺半漢香浮中天梵警鶴林聖迹龍泉佛影鳥思山空猿悲峽靜森森巨柏落落長松月出東岫霞生北峰山人自狎野老相逢白雲屢斷青溪幾重彭澤之令臨卭之客比徳山藪重規泉石法宇成言慈門致役糠粃吏隱薜蘿心迹吾生擾擾與道遑遑殷勤頌詠惆悵津梁投功翠碣助化𤣥場百年之後苔蘚蒼蒼
