front:
  text: 王子安集巻之八
  hash: sha256:a821a593a486211867a458f91db8a493882c2ba6ddd470c6ae2244960e5dcf53
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0003_SBCK_008-1a}
body:
  text: 唐龍門王勃子安著明閩漳張爕紹和纂表上九成宫頌表臣勃言臣聞帝機無朕道洽則時邕靈化不言功成則頌顯伏惟陛下體元纂極模神建隧棟梁三氣庭階六合松軒夜警杳冥姑射之心茅殿晨凝寥廓峒山之駕臣霑風太上庇影華胥仰衢室而無階候襄城而有地雖望卑平叔空勒景福之詞而文謝子雲願竭甘泉之思謹憑天造輙貢九成宫頌二十四章攀紫墀而絶望呌丹闕而累息臣誠惶誠恐死罪死罪謹言上拜南郊頌表臣伏見總章元年十二月四日詔既清東寇將覲南岳甫資元勲旋窺大典伏惟皇帝陛下黼藻神器銜策睿圖用天老之前機戮防風之後至為而不恃懸寶位於中宸卑以自居託靈符於上帝禮凝蒼璧瑞溢玄圭紫旻降祜黄祗叶矩㣲臣學不照古才不曠時窺宇宙之神功覩郊禋之盛節時非茍邁懷雅頌而知歸道不虛行想謳歌而有志豈與夫周傳考室裁稱棟宇之規漢奏甘泉未息嬉遊之諷比興衰於列代較馳驟於同衢而已謹憑天則輙貢拜南郊頌十章文不足奇意有遺美臣誠惶誠恐謹言爲原州趙長史請為亾父度人表臣某言臣聞奉忠履義帝業所資昭徳報功王風是切臣亾父故臣使持節都督豐州諸軍事豐州刺史上柱國南康郡王士達往因隋季預奉皇初于時元洛未清雙崤尚梗江淮海岳王公數十亾父身羈偽鄭寵極戎庭掃千載之風雲擁三河之士馬情思奉順義不圖生綿越寇塲密歸誠欵登太行而耀甲則建徳離心出函谷而揚麾則王充破膽天書屢降手勑仍存洎乎九服乂安四方無事謀臣出鎮猛將臨邊西窮赤水之源東究青丘之境横戈北塞盡沙漠之風塵授鉞南荒被䍧牱之矢石義形夷險迹遍疆塲分閫淹榮懸車遂禮雖死於牖下實懷天子之恩力盡方隅無媿忠臣之節今者歸藏有日先逺戒期陛下徳被游䰟惠流枯骨髙班厚禄已極於生前列鼓鳴簫復光於身後誠非毁滅所能投報但臣霜露之感瞻彼㟁而神銷烏鳥之誠俯寒泉而思咽希開淨福庶補窮埏伏惟陛下恢不次之恩録無涯之請使獲從朝例賜許度人濟沉識於昏塗拯亾靈於燬宅則陛下乾坤之施旣不隔於幽明㣲臣螻蟻之心豈忘情於家國是所圖也非敢望焉輕黷冕旒若墜氷谷啟上從舅侍郎啟勃啟一昨弟勛至奉命以憲臺詩十首垂示氣横霜署彩洞雲扃繡衣兼藻肆之華白簡控玄機之奧仙驄在馭踐文路而驅神冠獬下臨望詞林而直指勃質惟茅艾名隔縉紳虛霑自出之榮每媿諸甥之列恩華曲被誨誘傍臨識謝知音榮㴱覩奧虞韶忽奏聴律吕而忘疲楚匣遥開仰光􅉭而不暇昔孔融之逢元禮罕賭高文王粲之謁伯喈終慚懿戚援今企古議徳疇恩荷慄兼儲悲欣兩集但才非酷似攀宅相而多慚慕切如存臨渭陽而增感不勝荷戴屏營之至上武侍極啟勃啓勃聞玄螭掩耀光銷赤堇之芒白鶴摧輝影滅青胡之寶繇是紫霄氣耿指牛漢而忘歸丹水神迷道驪泉而罔悔其有龍文已逺輕圖剸兕之功魚目濫持自擬靈虵之色循榮覽分朝聞夕可君侯締華椒閣席寵芝扃粲貂冕於金軒藻龜章於玉署月開鸞鏡懷精鑑以分形霜湛虬鐘藴希聲而待物吞九溟於筆海若控牛涔抗五岳於詞峯如臨蟻垤馳䰟霧谷忻逢紫岫之英驛思霞丘佇接青田之響勃北巖曲藝東臯下節攀翰苑而思齊傃文風而立至迹疲千里未陪丹轂之遊葉契三英尚隔黄衣之夢謹憑洪貸輙録舊文輕敢上呈列之如右涓波有託望日谷以馳誠鐘鼓無施伏雷門而假息謹啟又勃啟一昨不縁媒紹輕承盻飾祗寵相驚俯仰無地何則循方極弊尚虧風雨之間撫翼濡鱗猶失江湖之上况乎九天鵬術一代龍門榮枯舛致山川在目而可以追騰白日忘言於咫尺之書干突青雲投跡於尋常之境徒以北林增秀弱翰知歸東壑流謙纎鰭未已神交道合君侯昭片善之榮千載一時下走得長鳴之所是用謬憑髙奬曲撰蕪音游海無際過雷自讋雖黄金激憤指秦路而方窮蒼璧慚恩伏焦原而未逺謹啟上李常伯啟勃啟勃聞𣏌林騰秀羽族知歸暘谷流謙波臣有託然則朝光八聖尚欣牧豎之詞道濟五殘未隔輿人之誦謹憑斯義輙呈宸遊東岳頌一首當仁不讓下走無慚於自媒聞善若驚明公豈難於知我龍門髙逺眇黄道而無階爵里既投呌丹閽而有地伏願蹔停左右曲流國士之恩廣進蒭蕘俯息樵夫之議輕陳徑㨗退用彷徨上皇甫常伯啟勃啟一昨奉命令寫新對臺策及前後舊文謹憑國士之恩敢進輿人之頌竊以龍鑣就路駑駿相懸鵲鏡臨春妍媸自逺亦有飛霜匝地蘭蕭銜共盡之悲烈火埋岡玉石抱俱焚之慘然則知音罕嗣流水空存至寶不同荆山有淚君侯飾揚芻議提奬蕪詞白圭成再見之榮黄金定一言之重鵬颷既接仰雲逕而將趨龍阪可登指星臺而有望循襟佩徳撫事知恩山岳有輕河漢無極謹啟又勃啟自恭陳薄技祗奉話言咳唾成恩盻睞為飾征夫擊節方思孤竹之風壯士寒心實有長楊之作謹憑嚴命輕呈乾元殿頌一首將冀導江至海常以筆札見知南館西園遂與簪纓為伍徳雖無盡攀驥尾而方遥生也有涯比鴻毛而非重謹啟上吏部裴侍郎啟勃啟猥承衡鏡驟照堦墀本慚刀筆之工虛荷雕蟲之睠殊恩屢及嚴命頻加賁光耀於昏冥課宫商於寂寞進退惟谷憂喜聚門誠恐下官冒輕進之譏使君侯招過聽之議貴賤交失恩愛兩虧所以戰懼盈旬遲逥改朔懷鄭璞而增愧捧燕珉而自恥勃性惟懵昧識謝沉㝠䝉父兄訓導之恩籍朋友琢磨之義好學近乎智力行近乎仁知忠孝為九徳之源故造次必於是審名利為五常之賊故顛沛而思逺雖未之逮也亦有其志焉孔子曰言及之而不言謂之隱今者接君侯者三矣承招延者再矣抑亦可以言乎夫文章之道自古稱難聖人以開物成務君子以立言見志遺雅背訓孟子不為勸百諷一揚雄所恥茍非可以甄明大義矯正末流俗化資以興衰家國繇其輕重古人未嘗畱心也自㣲言既絶斯文不振屈宋導澆源於前枚馬張淫風於後談人主者以宫室苑囿為雄敘名流者以沉酗驕奢為達故魏文用之而中國衰宋武貴之而江東亂雖沈謝爭騖適先兆齊梁之危徐庾竝馳不能免周陳之禍於是識其道者巻舌而不言明其弊者拂衣而徑逝潛夫昌言之論作之而有逆於時周公孔氏之敎存之而不行於代天下之文靡不壞矣國家應千載之期恢百王之業天地靜黙隂陽順序方欲激揚正道大庇生人黜非聖之書除不稽之論牧童頓顙思進皇謀樵夫拭目願談王道崇大厦者非一木之材匡弊俗者非一日之衞衆持則力盡真長則偽銷自然之數也君侯受朝廷之寄掌鎔範之權至於舞詠澆淳好尚邪正宜㴱以爲念也伏見銓擢之次每以詩賦爲先誠恐君侯器人於翰墨之間求材於簡牘之際果未足以採取英秀斟酌髙賢者也徒使駿骨長朽真龍不降衒才飾智者奔馳於末流懷真藴璞者栖遑於下列易不云乎言行君子之所以動天地失之毫釐差以千里書不云乎弊化奢麗萬世同流餘風未殄公其念哉嗟乎葢有識天人之幽致明國家之大體辨焉而不窮酌焉而不竭抱膝無悶盱衡自得彼悠悠小技焉足為君侯道矣自非奉閒宴接清談未可一二言也然竊不自揆嘗著文章非敢自媒聊以恭命謹録古君臣讚十篇并序雖不足塵髙識之門亦可以見小人之志也伏願暫停左右少察胸襟觀述作之所存知用心之有地謹啟上明員外啟勃啟側聞金烏聳轡俯圓燧而抽光瑶兎浮輪候方諸而吐液斯則洪纎異數㝠符造化之津髙下相懸精契陶鈞之表故知聲同義合存長幼於三州理隔氣殊置山川於一面神交可託風雲於杵臼之間道不虚行涇渭於簪裾之列其有跡申知已投爵里於思齊事迫當仁抱龍泉而願割雖荆山已峻多輕抵鵲之珍而渤澥方春敢進歸鳬之景伏惟丈人珠躔降徳銑社抽英河岳縱其神器煙霞發其符采江東第一家傳正始之音日下無雙譽重名流之首三冬文史先兆跡於青衿百里絃歌即馳芳於墨綬彭澤陶潛之菊勝氣仍存河陽潘岳之花芳風遂逺榮加從袂上清蘭府之遊寵奪攀輪更掌蓬山之務麟圖緝謚定榮辱於三泉鵷閤裁書考薰蕕於四部既鶴鳴雲路望偃朝端鴻漸星臺俯諧僉議亷平譽號李宣伯之當官雅操繩時山巨源之稱職加以文塲武庫發揮廊廟之師瓊樹瑶林寥廓風塵之表一丘一壑同阮籍於西山一嘯一歌列嵇康於北面詞條鬱霧遥騰駕日之隂辨鍔横霜直上衝星之氣鳬鐘蓄韻聞片言而指掌鸞鏡懸心見一善而明目情源九派士流欣滿腹之期德宇千門詞人有庇身之望方當坐談帝席雄視羣公豈徒比迹天府雌伏郎官而已哉勃崇徽啟緒盛徳在家承太子之仙宗祈將軍之逺系朱輪在漢列髙士於三台青葢浮江扈平王於七姓遺風舊烈尚存清白之基祖徳家聲代有縱横之目及金陵東覆玉馬西奔髦頭傑起文儒繼出鳳鳴朝日森峭煙雨之標龍躍雲津盤礴江山之氣雖雄名雅譽隨朔野而揚聲而華冕雕軒比南風而不競陳太丘之積善羔鴈成羣謝車騎之餘芳蘭蓀不替趨庭洽訓共歌朱蕚之篇避席承歡猶守青箱之業嘗謂酣神北阜籍春渚而忘歸動影南櫺坐秋山而長往不意蘭臯獨嘯輕交委鶴之書芝澗行謠坐辱飛龍之使年殊賈誼仰宣室而方同業謝劉繇俯長途而遂恧塞上浮雲之跡空倦吳山隨侯明月之珠終悲暗室豈不知拂衣長謝林泉多倨俗之因安枕有餘廟堂非養髙之所松楹坐月臨黛壑而遐征桂席攀風俯青嵓而自足而欲俛首屈膝逡巡多士之林弔影慚䰟骯髒文昌之府徒以牛蹄已倦臨文壑而驤鱗羊角可逢想髙衢而撫翼叅名國士方叨智伯之恩揮迹奉常冀雪公孫之恥識正平於處士雖在孔融期仲容於望外終資許允猶恐先馳折翮頻驚鶂路之風再舉枯鱗空擊龍門之水丈人借以顔色資以恩波垂雅契於長年敘情交於累代情加倒屣知歩頃之生光禮極升堂覺聲名之有地是用俯抽丹思上瀆清顏鏤殊奬於肝膽銜徳音於咳唾懦夫増氣先歌易水之風壯士投心思赴吳宮之火恩崇命淺瞻吕梁而可泛山髙海㴱渉孟門而何險謹啟上許左丞啟勃啟自違阻恩華嬰纏風恙守愚空谷歛跡仙臺同衞玠之虛羸談非正始愧劉楨之逸氣卧似漳濱朝野既殊風猷遂隔望芝蘭之漸逺覺鄙恡之都生所以暫下松丘言游洛邑永懷前惓逡巡元禮之門延首下風匍匐文章之府實願稍捐人事少奉清言質儒釋之幽疑訪空玄之極境願聞者道敢披江海之心祈進者榮非慕軒裳之重雖齒絶位殊空塵左右而道存目擊豈隔形體輕陟階堂伏㴱悸越謹啟上郎都督啟勃啟勃聞古之君子重神交而貴道合者以其得披心胸而盡志義也是以叔牙茍在管仲分多而不貪無知尚存陳平受謗而非罪何則達其趣者能申其迹收其大者能讓其細也今勃東鄙之一書生耳少懷耿亮頗慕髙烈俛仰相得則屠博可遊造次不諧則軒冕異路䝉君侯國士之遇受君侯長者之禮繾綣談謔殷勤誨誘今有情而不告是不盡也有窘而不託是有疑也將恐季布無侣於後葉孫臏獨稱於前古嗟乎可以竭誠矣敢不盡言乎勃家大人天下獨行者也性惡儲歛家無儋石自延國譴逺宰邊隅常願全雅志於暮齒揚素風於下邑而道里夐遥資糧窘鮮秩寡鍾釡債盈數萬此勃所以側目扼腕臨㴱履薄庶逢知已之厚以成大人之峻節也古人有言富觀其所與貧觀其所取又曰損有餘補不足於君侯何如哉然則定其交而後求敢無愧巳易其心而後語夫何飾
