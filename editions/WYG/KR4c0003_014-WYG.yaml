body:
  text: 王子安集巻十三欽定四庫全書王子安集巻十四唐王勃撰碑梓州𤣥武縣福㑹寺碑若夫考龍圖而括運撫麟筆以傷時天地閉而賢人隱周孔逝而㣲言絶豈非太階無象三辰鮮逌敘之因滄海為陵百川有横流之勢况乎法身長往顧糟粕以空存化迹繁流仰舟航而遂逺雖復功推八正猶迷鶴樹之談道亞三明未覩龍宫之籍則有妙音難遇瞻雪嶺而投軀真諦希聲仰雲山而破骨優填企景新雕白玉之龕般若尋風而化黄金之像三千寶座迴出天宫八萬珍臺遥臨淨域非惠圖之冥感孰能臻于兹乎福㑹寺者隋開皇中之所建也爾其峰巒地列東分井絡之光樓雉雲横西睹禺同之奥北彌豐邑里閈千甍南控平江波潮萬里擁亭臯之絶勢昇林野之殊形肇開修竹之園式揆旃檀之刹法川髙闢慈宫峻敞文璫寶綴環日月於重廊翠栱丹楹起虹蜺於複殿真容俯映福衆爰依􅆊筵交燭禪房互啟山神獻果還栖交露之臺天女持香即遶飛花之閣輪輝夜滿抽紫熖於金山毫相晨臨發珠華於玉地爰有縣令栁邊河東令族大業之年來光上邑髙人奉檄功為銅墨之先令宰鳴琴課穆絃歌之最眷香城而惻念披道肆而驚魂示懷延奬思𢎞末敎迺於寺内起重閤一所乗烟置臬揆日端繩層榭三休琱簷四注奔星掛廡混珠網而同歸明月窺軒雜璿璫而共貫仍抽麗筆俯刋貞琰詞源迅委振法海之波瀾義宇宏深接禪宫之閫奧昔者陶潛彭澤罔聞仁祠之風潘岳河陽未入菩提之域兼其美者著在我栁君乎俄而帝隋方否三官失龍鳳之圖皇業未昌九野被豺狼之毒雖復餐砂茹石窺劍道而迴心蜂聚梟騰指銅梁而革面自非法雲西睠潛銷火宅之氛慧日東來迴朗昬衢之景則安能冥資福地顯沮魔軍波清於振壑之隅燎息於炎昆之曲洎乎大鈞無事神器有歸清玉戸而帝寰中轉金輪而王天下𤣥塲佛境與天壤而惟新鶯樹雞林共風雲而改旦功既成矣時既貞矣紫宸有裕蒼甿胥悦都人狎至瞻鴈塔而歡心野老相趨尋鹿園而頓顙或至誠冥發爭知不盡之虚或道恩㫄流竟委忘縁之施乃於寺内造菩提塑像一座實彭氏絶羣之迹洞參瑶銑體備丹青得埏範之奇模盡陶甄之能事功分實相變入㝠機丹果長春青蓮不染靈儀若動似臨王舍城中神足疑行即坐菩提樹下銀牀地湧寶帳猶懸珍木天成金花不落總章元年又奉為皇帝更造八菩薩像成於淨境別峻崇堂而力寄羣縁功難獨舉遂令衆情馳騖空懷更始之圖靈座端嚴未得安居之地時有𢎞演上人自丹鳥下日昌帝籙於明堂青鶴乗霄降仙苖于大室軒冕將風雲交映鐘鼎與山河共逺法師宿持真諦幼挺殊姿㧞五翳於長驅登四禪於迴觀以為徳因時建澄什繼踵扵西都道冀人𢎞林逺隨肩於南國痛迷生之詭矯悲正覺之陵夷思欲樹真氣於未萌緒崇因於已往遍游淨境歴騁遐方至總章二年憇于兹刹身持寶印口出神珠心動巴南化行蜀右法羅潛舉馴鳥性於慈林慧鏡㫄開息猿心於定水亦有情鈎五縛遥騰解脱之川想痊六塵迴㧞沉迷之域名臣長者捐玉珮於銀庭善女靈姬落金環於寶地貪機霧滌法施泉流林衡掄杞梓之材班匠獻鈎繩之巧千欒電糾萬桷霞張飛陸縁甍曾構架景瓊缸杳照乗紺壁而宵分珠箔重華掩青疏而曉亂紅葩植井彩綴河宫丹桂承梁香交列肆夭倡梵樂肅然忉利之天藻葢琱璫煥若摩伽之殿豈精力之𤣥感而神化之曲成乎直嵗寺主等州閭盛族鶖鷺榮因昇慧圃而功成踐魔庭而戰勝排四門而獨往共極邦縁攀十地而遐征同趨覺路縣令虞洽旌旗百代劍履三朝匡帝座而南征擁台庭而北面星像垂祉川岳載靈豫章七嵗麒麟千里雄情負俗鬱王佐之宏圖英識邁時得公門之逸氣既而拂衣華族入天邑而觀光列板仙臺出靈闗而作宰泉魚狎夜多單父之深恩隴翟游春嗣中牟之善政有條不紊施緩政於繁繩㫁訟有神下髙鋒於錯節因以激揚大化潛滋比屋之封光啟令圖預積攀輪之慕縣丞裴休家接朱欄譽流丹闕軒裳照緒忠孝榮門鳥鳴有伐木之歌龍文非刈蓬之具髙材列務盛徳分司翰墨不足留神琴罇申其徇性十旬休沐奄有泉林千里邀迎乃疲風月青驪蹀躞終噴玉而懸雲素鶴徘徊具銜珠而犯露加以沉研有地題橋八解之津誘勸無方叱御三乗之路故能使幽明仰徳法俗依仁攀海袛而如歸挹衢罇而下瞰鄉望等龜靈髙族驥子名家闗錦室於中堂分綺疏於甲第或望雄都鄙代列歌鐘或業預雲雷門藏璽詔文塲促席有江漢之英靈武觀連衡得岷峨之銳氣竝能馳心彼岸欲臨海而褰裳投足化城下悲思而反䘧下官薄遊江右旅寄城隅懷道術於百齡接風期於四海依然梵宇欣象教之將行莞爾公庭惜牛刀之遂屈雖文殊辯論妙懸解而忘言而伯喈雄管叙真宗而罔媿敢巡此義乃作頌云金堤迥邑玉峽長瀾城闕紛亂江山聳盤雲屯勝邑霧啟禪壇右縈層雉左控崇巒竹園精舍檀山香閤萬栱騰虬千楣跂鶴晩星疎翠朝霞泛雘鼓奏泉流鐘鳴霜落時經失道代歴交呈神宫不撓法衆無驚金輪䆳曉玉鏡施明功照佛刹化被王城帝圖㝠運真儀濬發貝齒含星流毫推月鳥離山扃龍還海闕寳樹刑留天宫匠設爰有真人式宣慈主發迹江甸馳聲蜀宇望逺連規攀澄襲矩力窮興道功周廊廡羣縁肸蠁衆福氤氲叢楹列電髙棟銜雲銀龕曙撫玉座宵分瓊璣有爛藻繪多文鬱彼巗邑猗歟上宰松桂連華鴛鸞集彩禪津有裕至公無待火宅可辭舟航斯在我之飄寓邈矣來遊山川俯仰道義淹留承風郭外撰綴江幽𤣥機勝筆天地相周梓州飛烏縣白鶴寺碑原夫玉都瓊室紫垣光大帝之庭金闕銀臺𤣥壁杜羣仙之域故能使神明有宅駕日月以長驅鸞鳳知歸撫雲霓而上出斯則曾巢瑾穴上皇迷棟宇之尊考室靈臺中右識巖廊之貴然後冕旒前序提四海以為家登歩大階列千門而有閲况乎􅡙山形見㫄行草昧之先徳水源深光宅乾坤之右雖鶴臨西閟龍宮與王法同亡而象化東流鴈塔與遺儀繼起白鶴寺者葢菩提寺之餘址梁武皇之所建也香城福地之舊三巴五蜀之湊裂岷山之奧域分井絡之榮光西包玉壘之墟北瞰銅陵之野南扃列第門庭萬家東户連峰岡巒千里實伽藍之勝跡得迦衞之英模慿絶磴以圖規俯長溪而作固自金陵不競玉鏡無章城池興南露之悲亭障切北風之候崩山鬬水觸地網而三分墜月奔星劃乾綱而五裂中原錯戾慈門為虎豹之墟滄海横流定水穴鯨鯢之浦懷山既蕩法衆咸淪林院榛蕪軒堂委寂遂使悲生棄井堙玉甃於三泉歎積為山移瓊峰於九仞皇上攝千秋之寳運緒三聖之宏機挾宇宙而先神御雷風而首出靈功不宰華夷沾共貫之恩至道無私霜露得平分之序考禎圖於日慎寤寐同符稽妙册於年刀幽明合貺然後東巡巨鎮追六聖而撫寰中南面天壇朝萬方而小天下皇威既暢寳應齊歸川岳薦靈風煙動慶丹烏抱日疑增帝閣之華素鶴低雲若赴仙庭之㑹昔白魚黄竹業未峻於封崇赤鴈芝房名不登於梵宇爰徴瑞典肇錫嘉名重興波若之臺更起招提之院金繩夕布綿秀嶺以開壇玉牓晨舒擁囘峰而闢户爰有𢎞演上人者法門之秀士也行起常凍思越恒饑悲淨域之為墟喜皇波之普泛縱還舟於苦海驚浪旋夷比歸馭於邪山靈闗非險於是淨財雲委真衆煙馳如趨摩竭之宫似向毗邪之國縣令梁𢎞悦首加甄緝縣丞梁敬一親昭施典上慿天㫖爭開舍利之壇俯㑹衆心競起須彌之座禺同故嶺石鮮堅華廣漢餘坰地多疎斥事闕經始人懷袛懼重階不就空思天室之氓寳像無資未獲黎陽之士豈非冥期肸蠁功參造化之外故能果脣間發運眸周映貝齒含滋璿毫起照三十二相臨玉座以相輝八十四儀擁金山而圓立層甍四合爍奔電於丹楹複殿三休絡浮煙於翠幌因髙積磴疑遷倒景之臺架嶮連榮似立迎風之觀琱簷競注縈霧道以龍囘繡桷爭飛傃雲衢而鳳矯寫歸禽於寳鏡誤接朝鸞圖走獸於文璫疑栖夕兔雷霆蓄洩裁臨承霤之間煙雨飛浮未出層欒之下耀丹青於菌壁妙跡疑存炳銑鋈於蓮龕神輝自燭鏘鏘櫩鐸聲傳桂葉之風熖熖山爐氣結松隂之藹仰真容於始旦滿月晨昭窺列棟於方宵長虹夜發香泉激溜有符温浄之池珍木成行無忝袛園之樹信煦尼之别府實兠率之殊庭者乎愛友上座法師等情機藻瑩戒律圓明披玉笥以研芳候瓊鐘而肅慮禪姿曉映依稀同雞岫之前梵唄晨臨髣髴像魚山之曲縣令獨孤儉等或鵬垂待運終燮道於中台或蠖屈求伸且毗風於下邑鄉望儀曹等或鹽泉錦室家稱三蜀之豪或抱樸懷仁譽擁雙流之美或以為山川肆踐猶紀石於弇州陵谷生哀尚沉碑於峴首况乎徳因時盛慶流封拜之辰名為功登事屬文明之運豈可使璿猷被物終昧燮於𤣥機金字韜華不題勲於翠琰敢作頌曰睿塗菌藹靈機翕忽玉架天都金裁地闕法玉利見香城繼發鴈塔齊雲龍宫瘞月長江近域廣漢遺居禪扃共往梵宇全疎迹均梁後義切秦餘山川牢落榛莽丘墟有聖聿興惟皇降撫因天因地為雲為雨日觀龍驤煙壇鶴舉肇開嘉號重光浄土猗歟上士道塲真政物觀成章子來興詠土石呈彩人靈合慶寳座晨嚴金山夕映紫㣲分殿青岑曜郭複岫榮樓攢峰跨閣月低璿鏡星連寳鐸彩鳳將飛蟠虹未落森沉桂宇肅穆筠壇花明桺砌葉暗朱欄溪留夏雪澗咽秋湍山虚梵冷谷静鐘寒法衆爰依禪徒戾止望風三蜀征塵千里頓首𤣥墀歸心翠扆業超有色功齊無始偉哉㝠化妙矣能仁去來均跡前後俱身寂滅為樂般若為因題芳翠琰敢詣靈津梓州通泉縣惠普寺碑若夫𤣥機黙運披睿烈於三精素鍵濳融肇神功於萬彚則有靈期肸蠁龜龍負河洛之圖帝緒氤氲賢哲舉乾坤之策雖功懸日月終植軌於寰中業静雲雷未逃規於象外爾其譯雉林之寳偈詮鷲嶺之真圖抽紫玉於禪山朗𤣥珠於智水不生不滅光臨妙物之津無去無來濬發乗時之契仗三明而獨運施洽平分據二諦而同歸功超邃古故能使三千法界向風知袵席之師百億大王聞道失巖廊之貴非釋迦之神化其孰能與於此乎既而正法將隠㣲言不嗣應身既没遺儀間起恒星夜掩西天銜風霧之悲夢日宵成東漢肅壇塲之禮繇是鹿園曾敞象教㫄流宣妙奬於希夷範靈蹤於顯晦瑤龕寳座光華震旦之墟鳳刹蜺裳斧藻閻浮之域其寺葢梁大同年中所建地分彭蜀嶺對岷峨慿廣漢之遺墟籍犍為之舊壤西馳峭崿山連白雉之郊東赴長川江走黄牛之峽崇墉却峙之勢庭衢四㑹勝里九曲之分閭閻萬積危冠袨服參差軒葢之前露渚風畦隠軫亭臯之望是惟先鏡實啟香城煥若神明恍同化出紺壇煙屬疏絶閤而三休紫殿雲深徹迴廊而四注重欒複棟霧緝霞張繡桷琱楣鸞伸鶴跂珍臺控景羲和獲練轡之因綺榭裁氛屏翳得停鑣之所連甍積翠交玉鎻於星衢洞户流丹綴金鋪於月竇垂珠網露傍傾漢浦之琛列鐸吟颷上合鈞天之樂固以輪奐之美冠真宰以先鳴琱範之竒告靈基而得雋乃造彌勒下生像一座相好端足華姿朗備貞觀末年靈暉繼發房籠匝曜疑連不夜之城户牖皆明似出重昏之境自非理參幽贊道叶㝠機宣佛鏡於無方演慈燈於已絶豈能寫丹青於實相妙色長存圖銑鋈於真容神光不昧若乃時暄福地低落照於晴暉候肅禪房汎初華於霽景千千寳樹若在雙林一一妙香仍清八味山暉傃脱跂葉嶼而相鳴野鷰迎晨拂花簾而自樂松楹秀蔓曲成蘿薜之衣砌石生蓮直起芙蓉之座則有拖身童子戾止巖扃忍辱仙人來儀磵户都人野彦希梵席而投裾趙美燕餘望齊庭而繼履莫不青鳬委貫俱欣不捨之壇紫貝兼明共化無縁之力故能使琱形畫塔象設年滋彩帙瑤箱龍編月乆豈西周之道備南國之風成者乎爰有寺主等覃機色外練迹塵間浴甘露於心田集祥風於性宇栖情不二忽起初地之權授手大千猶擁彌天之具縣令等或公侯百代𤣥貂列駟之門或文史三冬吐鳳迴鸞之客銅章墨綬任切臨人鐵印黄簪功宣陸漸局牛烹而待價肆蠖屈以求伸揮鋒九仞之隅作鏡雙流之外録事抑元等丹軒紫紱家傳方面之勲驥子魚文地列膏腴之右昔承隋運屢委天書爰自皇初顓流帝禮等賨渝之奉漢類㣲濮之匡周咸申白馬之盟並受飛龍之託故能遺風㒺墜代濟其美望重西南功宣法俗咸以為絃歌小政猶篆徳而垂芳鐘鼎㣲榮尚銘勲而作鑒况乎神威自在方傳宰匠之功豈可棟宇常存不勒山河之贊爰託幽鄙奉揚徽猷敢宣此義而為頌曰天地定位君臣作極道在巖廊功霑寰域尚清皇盻猶歌帝力况我能仁惟神不測誕生迦室利見王城機覃有應業㑹無生長驅定境振旅魔營恩兼動植勢絶隨迎鷰山傾仞鶴林埋景慧日西沉慈波東騁競窺靈相争參佛影月殿分城雲龕動嶺長江舊域廣漢遺區川分潼峽塞接岷渝閭閻四㑹亭障威紆爰開寳地實控名都霞牆百雉雲甍四住紫闕尋煙赬樓結霧波流虹起雷奔蠖步網罩星鶉璫栖月兔靈機藻繂禪室安閒琱金範玉舉翠浮丹神宫不夜虚室長寒光超有色貺出無端清露花徑飛泉葉户磵緑苔秋山蒼樹古茫茫庶類巍巍浄土鵝鷺同歸華夷共聚第一義諦寥廓法門迹離生滅思舉乾坤情迷則復道在為尊惟名與器萬古長存
