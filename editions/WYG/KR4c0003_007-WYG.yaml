body:
  text: 王子安集巻六欽定四庫全書王子安集巻七唐王勃撰序秋日楚州郝司户宅餞崔使君序上元二載高旻八月人多汴北地實淮南海氣近而蒼山隂天光秋而白雲晚川塗所亘郢路極於崤潼風壤所交荆門洎於吳越憑勝地列雄州城池當要害之衝寮采盡鵷鸞之選昌亭旅食悲下走之窮愁山曲淹留屬羣公之宴喜披鶴霧陟龍門故人握手新知滿目飲崔公之盛德果遇攀輪慕郝氏之高風還逄解榻接衣簪於座右駐旌棨於城隅臨風雲而解帶眄江山以揮涕巖楹左峙俯映𤣥潭野逕斜開傍連翠渚青蘋布葉亂荷芰而動秋風朱草垂榮雜芝蘭而涵晚液􅋈仙舟於石岸薦綺席於沙塲賓友盛而芳罇滿林塘青而上筵肅琴歌迭起爼豆駢羅烟霞充耳目之翫魚鳥盡江湖之賞情槃樂極日暮途遙思染翰以凌雲願麾戈以留景嗟乎素交為重覺老㓜之同歸朱紱儻來豈榮枯之足道且欣風物共悦濠梁齊天地於一指混飛沉於一貫嗟乎此歡難再慇懃北海之筵相見何時惆悵南溟之路請揚文筆共記良遊人賦一言俱成四韻云爾秋晚入洛於畢公宅别道王宴序下官才不曠俗識不動時充皇王之萬姓預乾坤之一物早師周禮偶愛儒宗晚讀老莊動諧真性進非干物自疎朝市之機退不邀榮誰識王矦之貴散琴樽於北阜喜耕鑿於東陂野老披荷暫辭幽澗山人賣藥忽至神州驚帝室之威靈偉皇居之壯麗朝遊魏闕見軒冕於南宫暮宿靈臺聞絃歌於北里交情獨放已厭人間野性時違少留都下道王以天孫之重分曲阜之新基畢公以帝室之華擁平陽之舊舘迹塵鐘鼎思在江湖居榮命於中朝接風期於下走綠􅀈朱紱且混以羅裳列榭崇軒坐均於蓬户賓主繇其莫辨語黙於是同歸終賢王之樂善備將軍之揖客是日也雲繁雨驟氣爽風馳高秋九月王畿千里高扃向術似元禮之龍門甲第臨衢有當時之驛騎英王入座牢醴還陳高士臨筵樵蘇不爨是非䨇遣自然天地之間榮賤兩忘何必山林之下𤣥談清論泉石縱横雄筆壯詞煙霞照灼既而神馳象外宴洽寰中白露下而南亭虛蒼煙生而北林晚鶢鶋始望不及牲牢麋鹿長懷非忘林藪先生負局倦城市之塵埃遊子横琴憶汀洲之杜若况乎迹不皆遂時不再來屬宸駕之方旋直羣公之畢從洛城風景此㑹無期戚里笙竽浮驩易盡仰雲霞而道意捨塵事而論心夏仲御之浮舟願乗春水張季鷹之命駕思動秋風策藜杖而非遙勅柴車之有日青溪數曲幽人長往白雲萬里帝鄉難見安貞抱朴巳甘心於下走全忠履道是所望於羣公倘心迹克諧去留咸遂廟堂多暇返身滄海之隅軒冕長辭廻首箕山之路尋赤松而見及泛黄菊以相從雖源水桃花時時失路而幽山桂樹往往逄人庶公子之來遊幸王孫之畢至茅君待客自有金壇王烈迎賓還開石架惟恐一丘風月侶山水而忘年三徑蓬蒿待公卿之來日對元陽之易晚惜雲霧之難披羣公葉縣鳬飛入朝廷而不出下走遼州鶴去謝城闕而依然敢抒重􅁭爰疏短引式命離前之筆希存别後之資凡我故人其辭云爾越州永興李明府宅送蕭三還齊州序嗟乎不遊天下者安知四海之交不渉河梁者豈識别離之恨薜衣松杖琴罇為得意之親臨逺登高煙霞是賞心之事有梁孝王之下客僕是河南之南孟嘗君之上賓子在北山之北幸屬一人作寰中之主翛然四皓為方外之臣俱游萬物之間相遇三江之表許𤣥度之清風朗月時慰相思王逸少之修竹茂林屢陪歡宴加以惠而好我􅂝手同行或登吳㑹而聽越吟或下宛委而觀禹穴良談落落金石􅁝竹之音輝雅智飄飄松柏風雲之氣狀當此時也嘗謂連壁無異鄉之别斷金有好親之契生平於張范之年齊物於惠莊之歲三光廻薄未殫投分之情四序循環詎盡忘言之道豈期我留子往樂去悲來横咽水而東西緒愁雲於南北况乎泣窮途於白首白首非臨别之秋嗟岐路於他鄉他鄉豈送歸之地蓐收戒序少昊司辰清風起而城闕寒白露下而江山逺徘徊去鶴將别葢而同飛斷續來鴻共離舟而俱泛古人道别動便經年今我言離㑹當何日山巨源之風猷令望善佐朝廷嵇叔夜之潦倒麤疎甘從草澤行當山中攀桂往往思仁野外紉蘭時時佩德人非桃李豈得無言子是簫韶當湏振響勉酌傷離之酒具陳感别之辭各賦一言俱題六韻秋夜於綿州羣官席别薛昇華序夫神明所貴者道也天地所寳者才也故雖隂陽同功宇宙勠力山川崩騰以作氣星象磊落以降精終不能五百年而生兩賢也故曰才難不其然乎今之羣公竝受竒彩各仗異氣或江海其量或林泉其識或簪􅅂其跡或雲漢其志不可䨇得也今竝集此矣豈英靈之道長而造化之功倍乎僕之區區常以為人之百年猶如一瞬非不知風月不足懷也琴樽不足戀也事有切而未能忘情有深而未能遣故僕射羣公相知非不深也相期非不厚也然義有四海之重而無同方之感分有一靣之深而非累葉之契故與夫昇華者其異乎嗟乎積潘楊之遠好同河汾之靈液自置良友相依窮路是月秋也于時夕也他鄉怨而白露寒故人去而青山迥不其悲乎盍各賦詩云爾秋日餞别序黯然别之銷䰟悲哉秋之為氣人之情也傷如之何極野蒼茫白露凉風之八月窮途蕭瑟青山白雲之萬里奏鳴琴則離鵾别鶴驚岐路之悲心來勝地則時雨凉風助他鄉之旅思琴書人物冀北關西去馬歸軒雲間日下楊學士天璞自然地靈無對二十八宿稟太微之一星六十四爻受乾坤之兩卦論其器宇滄海添江漢之波序其文章𤣥圃積煙霞之氣幾神之外猶是卿雲陶鑄之餘尚同嵇阮接光儀於促席直覩明月生天響詞辯於中筵但覺清風滿室悠哉天地含靈有喜愠之容丘也東西悵望積别離之恨煙霞直視龍蛇去而泉石空文酒求朋賢俊散而琴歌斷門生餞别如北海之郡前高士將歸似東都之門外研精麝墨運思龍章希存宿昔之資去啟相思之詠冬日羇游汾隂送韋少府入洛序游汾勝壤樓船高漢帝之詞卜洛名都城邑辯周公之跡仰天文而窺日月雖共光華憑地理而考山川即殊南北韋少府玉山四照珠胎一色縱横振鋒穎之才吐納積江湖之量子雲筆札擁鸞鳳於行間孫楚文詞列宫商於調下牽􅁝一命披林野而隨班考績三年指蘭臺而赴選移征駕背長亭地隔風煙人離歲月寒原冠蓋既同斟桂之歡岐路風塵即斷驚蓬之思下官詩書拓落羽翮摧頽朝廷無立錐之處丘園有括囊之所山中事業暫到漁樵天下棲遲少留城闕忽逄萍水對雲雨以無聊倍切窮途撫形骸而何託於時氷霜裂地星象廻天朔風動而關塞寒明月下而樓臺曙各題一字傳之兩鄉云爾餞宇文明序昔者王烈登山林泉動色嵇康入座左右生光豈非仙表足以感神真姿可以錯物况我巨山之禀孤出昇華之麗清峙羣公之好善下官之惡俗接霓裳於勝席陪鶴轡於中軒俱拔出塵之標各仗專門之氣煙霞用足江海情多言泉共秋水同流詞鋒與夏雲争長雖揚庭載酒方趨好事之游而肆樂含毫請命昇遷之筆同抽藻思共寫離懷感興奉送王少府序八十有遇共太公晚宦未遲七歲神童與顔囬早死何益僕一代丈夫四海男子衫襟緩帶擬貯鳴琴衣袖闊裁用安書巻貧窮無有種富貴不選人高樹易來風幽松難見日羽翼未備獨居草澤之間翅翮若齊即在雲霄之上鳥衆多而無辯鳳馬羣雜而不分龍荆山㸔刖足之夫湘水聞離騷之客人貧材富㒺窺卿相之門貌弱骨剛豈入王矦之宅王少府北辭伊闕南登湎山過我貧居飲我清酒一談經史亞比孔先生再讀詞章何如曹子建山岳藏其跡川澤隠其形一旦覩風雲千年想光景孔夫子何湏頻删其詩書焉知來者不如今鄭康成何湏浪注其經史豈覺今之不如古王少府乃可畏後生學問人也各為四韻共寫别懷别盧主簿序林慮主簿清靈士也逹于藝明乎道詮柱下之理駁河上之義撮其綱統成其巻軸吾儕服其精博時議稱其典要可謂賢人師古老氏不死矣夫靈芝既秀蘭蕙同薰仙鳳于飛鵷鸞舞翼何則物􅁼之相感也况乎同得此義目擊道存此僕所以望風投欵披襟請益展轉於寤寐殷勤于左右詩不云乎中心藏之何日忘之然變動之不居乃聚散之恒理琴樽暫離山川有别惟高明之捧􅊾屬吾人之解帶王事靡盬良時易失盍陳雅志各叙幽懷人賦一言同疏四韻云爾送李十五序夫人生百齡促膝是忘言之契丈夫四海交頤非贈别之資然乃想山川之遽違送歸將逺惜歲華之不待行樂無時於是輟離驂以少留敞幽亭之多暇山芳襲吹疑居蘭室之中水樹含香宛似楓江之上御溝新溜近入離絃賓舘餘花遙催别酒既而滎波東注灞岸南登浮蟻傾而高宴終踆烏落而離宫散雖相思為贈終結想於華滋而素賞無暌盍申情於麗藻人為四韻各賦一篇英華此篇凡再見一稱王勃送李十五序一稱駱賓王餞李八騎曹序今兩存之以俟知者送白七序天地所以間南北山川所以别風雲陽舒隂慘覺造化之為勞日運星廻恨良辰之不定白七官天台傑氣地乳竒精當益友之龍頭處通侯之鷰頷靈珠耀掌是琴酒之文人長劔横腰即風雲之烈士屬天象掩峻帝道徵竒吐詞塲之珠玉作朝廷之鸞鳳寰中握手得希代之英靈天下傾心盡當年之意氣整秋駕駐春装背横溪之七曲對長亭之十里中情易感下調多愁送君當東陸之前逄我在北風之别嗟乎良友不追神交已逺同人者少方見阮籍之眼青知我者稀不學馮唐之首白唯當逺游絶壑旅思空山幽桂一叢賞古人之明月長松百尺對君子之清風既而花鳥爭飛煙霞競集青山高而望遠白雲深而路遙貴余以道誰能著後五十言贈子以言空有離前四十韻送劼赴太學序今之游太學者多矣咸一切欲速百端進取故夫膚受末學者因利乘便經明行修者華存實爽至於振骨鯁之風標報賢聖之言懷逺大之舉蓋有之矣未之見也可以深慕哉且吾家以儒輔仁述作存者八代矣未有不乆於其道而求茍出者也故能立經陳訓删書定禮揚魁梧之風樹清白之業使吾徒子孫有所取也大雅不云無念爾祖易不云幹父之蠱書不云惟孝友于詩不云不如友生四者備矣加之執德𢎞信道篤心則口詞廢食忘寢渙然有所成望然有所伏然後可以託教義編人倫彰風聲議出處若意不感慨行不卓絶輕進茍動見利忘義雖上一階履半級何足恃哉終見棄於高人但自溺於下流矣吾被服家業霑濡庭訓切磋琢磨戰兢惕勵者二十餘載矣幸以薄伎獲蠲戎役嘗恥道未成而受禄恨不得如古君子四十强仕也而房族多孤飦粥不繼逼父兄之命覩饑寒之切解巾捧􅊾扶老擕幼今既至於斯矣不蠶而衣不耕而食吾何德以當哉至於竭小人之心申猶子之道飲食衣服晨昏左右庶幾乎令汝無反顧憂也行矣自愛游必有方離别咫尺未足耿耿嗟乎不有居者誰展色飬之心不有行者孰就揚名之業籩豆有踐菽水盡心盍各賦詩叙離道意云爾
