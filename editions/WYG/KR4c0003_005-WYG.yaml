  text: 王子安集巻四欽定四庫全書
  hash: sha256:fa140ac9b43c7be7da848a50d4c82692267ad84f3660c69ac36ba9313036ae2e
  markers:
  - {type: page-break, offset: 6, content: '', id: KR4c0003_WYG_005-1a, image: WYG1065/WYG1065-0094c.png}
body:
  text: 王子安集巻五唐王勃撰序滕王閣詩序南昌故郡洪都新府星分翼軫地接衡廬􅁭三江而帶五湖控蠻荆而引甌越物華天寳龍光射牛斗之墟人傑地靈徐孺下陳蕃之榻雄州霧列俊彩星馳䑓隍枕夷夏之交賓主盡東南之羙都督閻公之雅望棨㦸遥臨宇文新州之懿範䄡帷暫駐十旬休暇勝友如雲千里逄迎高朋滿座騰蛟起鳳孟學士之詞宗紫電清霜王將軍之武庫家君作宰路出名區童子何知躬逄勝餞時維九月序屬三秋􅕙水盡而寒潭清煙光凝而暮山紫儼驂騑於上路訪風景於崇阿臨帝子之長洲得仙人之舊舘層巒聳翠上出重霄飛閣流丹下臨無地鶴汀鳬渚窮島嶼之縈廽桂殿蘭宫列岡巒之體勢披繡闥俯雕甍山原曠其盈視川澤盱其駭矚閭閻撲地鐘鳴鼎食之家舸艦彌津青雀黄龍之軸虹銷雨霽彩徹區明落霞與孤鶩齊飛秋水共長天一色漁舟唱晚響窮彭蠡之濱鴈陣驚寒聲斷衡陽之浦遥襟俯暢逸興遄飛爽籟發而清風生纎歌凝而白雲遏睢園緑竹氣凌彭澤之樽鄴水朱華光照臨川之筆四羙具二難并窮睇盻於中天極娛遊於暇日天高地迥覺宇宙之無窮興盡悲來識盈虛之有數望長安於日下指吳㑹雲間地勢極而南溟深天柱高而北辰逺關山難越誰悲失路之人萍水相逄盡是他鄉之客懷帝閽而不見奉宣室以何年嗟乎時運不齊命途多舛馮唐易老李廣難封屈賈誼於長沙非無聖主竄梁鴻於海曲豈乏明時所賴君子安貧逹人知命老當益壯寜移白首之心窮且益堅不墜青雲之志酌貪泉而覺爽處涸轍以猶歡北海雖賖扶揺可接東隅已逝桑榆非晚孟嘗高潔空餘報國之情阮籍猖狂豈效窮途之哭勃三尺微命一介書生無路請纓等終軍之弱冠有懷投筆慕宗慤之長風舍簪笏於百齡奉晨昏於萬里非謝家之寳樹接孟氏之芳鄰他日趨庭叨陪鯉對今晨捧袂喜託龍門楊意不逄撫凌雲而自惜鍾期既遇奏流水以何慚嗚呼勝地不常盛筵難再蘭亭已矣梓澤丘墟臨别贈言幸承恩於偉餞登高作賦是所望於羣公敢竭鄙誠恭疏短引一言均賦四韻俱成請灑潘江各傾陸海云爾遊山廟序吾之有生二十載矣雅厭城闕酷嗜江海常學仙經博渉道記知軒冕可以理隔鸞鳳可以術待而事親多衣食之虞登朝有聲利之迫清識滯於煩城仙骨摧於俗境鳴呼阮籍意疎嵇康體放有自來矣常恐運促風火身非金石遂令林壑交喪煙霞板蕩此僕所以懷泉塗而惴恐臨山河而嘆息者也粤以勝友良暇相與遊於𤣥武西山廟蓋蜀郡三靈峰也山東有道君廟古者相傳以名焉爾其丹壑藂倚𤣥崕糾合俯臨萬仞平視重𤣥乘杳㝠之絶境屬芬華之暮節玉房跨霄而懸居瓊䑓出雲而高峙亦有野獸羣狎山鸎互囀崇松埒巨栢爭隂積瀨與幽湍合響眇眇焉逌逌焉王孫何以不歸羽人何以長往其𤣥都紫㣲之事耶方歛手鐘鼎息肩巖石絶視聼於寰中置形骸於度外不其然乎時預乎斯者濟隂鹿宏𦙍安陽邵令逺耳盍詩以言志不以韻數裁焉梓潼江南泛舟序咸亨二年六月癸巳梓潼縣令韋君以清湛幽凝鎮流靖俗境内無事􅋈舟於江潭縱觀於丘壑𣺌然有山林陂澤之思遂長懷悠想周覧極睇思其人則呂望藉茅於磻溪之隂屈平製芰於涔陽之浦覺瀛洲方丈森然在目於是間以投壺酬以妙論亦有嘉餚㫖酒鳴絃朗笛以補尋幽之致焉預於斯者若干人爾上巳浮江宴序吾之生也有極時之過也多緒若夫遭主后之明聖屬天地之貞觀得畎畒之相保以農桑為業而託形宇宙者幸矣况乃偃泊山水遨遊風月樽酒於其外文墨於其間則造化之於我得矣太平之縱我多矣兹以上巳芳節雲開勝地大江浩曠羣山紛糾出重城而振策下長浦而方舟林壑清其顧盻風雲蕩其懷抱于時序躔青律運啟朱明輕荑秀而郊戍青落花盡而亭臯晚丹鸎紫蝶候芳晷而騰姿早鷰歸鴻俟迅風而弄影巖暄蕙密野淑蘭滋弱荷抽紫疎萍泛緑于是儼松舲於石㠗停桂檝於璇潭指林岸而長懷出河洲而極睇妍妝袨服香驚北渚之風翠幙𤣥帷彩綴南津之霧若乃尋曲渚厯廻溪榜謳齊引漁歌互起飛沙濺石湍流百勢翠嶮丹崕岡巒萬色亦有銀鈎犯浪掛頳翼於文竿瓊舸乗波耀錦鱗於畵網鍾期在聽𤣥雲白雪之琴阮籍同歸紫桂蒼梧之醴既而遊盤興逺景促時淹野日照晴山煙送晚方披􅁭朗詠餞斜光於碧岫之前散髪高吟對明月於青溪之下客懷既暢遊思遄征視泉石而如歸佇雲霞而有自昔周川故事初傳曲路之悲江甸名流始命山隂之筆盍遵清轍共抒幽􅁭俾後之視今亦猶今之視昔一言均賦六韻齊䟽誰知後來者難輒以先成為次綿州北亭羣公宴序下官人間獨傲海内少徒志不屈於王矦身不絶於塵俗孤吟五嶽長嘯三山昔往東吳已有梁鴻之志今來西蜀非無張載之懷况乎踐名塲􅂝勝友風月無幾琴酒俄乖半面十年一别千里何少府故人攀桂撫金石而論心韓法曹新識班荆臨江湖而執手離亭北望煙霞生故國之悲别舘南開風雨積他鄉之思于時蒼雲寡色白日無光沙塵起而桂浦昏鳬鴈下而蘆洲晚傍隣蒼野霜封橘柚之園斜枕碧潭鴈斷芙蓉之水既而登臨惜别驂駕少留季札何人親逄贈縞子荆不敏思掛傾城惆悵北梁揖琴臺而漸間徘徊東道思錦署以行遥嗟乎人事乖矣江山逺矣請命離前之筆為題别後之資五際飛文想羣公之不讓一言留贈知下筆之有神夏日登龍門樓寓望序夫益者三友則道術可存同心三人則金蘭可浴况乎詩書舊好披樂廣之高天鄉黨新知掃顔囘之陋巷尋勝地叙清蕪脱野客之荷衣入幽人之桂坐榴花浮酌對文舉而無憂葛蔓調絃撫鍾期而有遇既而南方夏晚北牖晴開中園之弱桞含煙曠野之隂雲蔽日低虹飲水向溪谷而全斜戲鳥凌空狎林亭而半度興含情逸共敦行役之期搦管含毫獨對當仁之序夏日登韓城門樓寓望序下官狂走不調東西南北之人也流離歲月羈旅山川輟仙駕於殊鄉遇良朋於異縣面勝地陟危樓放曠懷抱驅馳耳目韓原奥壤昔時開戰鬭之塲秦塞雄都今日列山河之郡池臺左右覺風雲之助人林麓周廻觀巖泉之入興則有驚花亂下戲鳥平飛荷葉滋而曉霧繁竹院静而炎氛息賞歡文酒思挽雲霄人賦一言庶旌六韻云爾秋日遊蓮池序人間齷齪抱風雲者幾人庶俗紛紜得英竒者何有煙霞召我相望道術之門文酒起予放浪沉潛之地少留逸客塞鴈飛鳴北斗横而天地秋西金用而風露降幽居少事野性多閒登石岸而鋪筵坐沙塲而列席琳瑯觸目朗月清風之後人珠玉在傍鸞鳳虬龍之君子汀洲地逺波濤濺日月之輝人野路殊原隰擁神仙之氣平郊樹直曲浦蓮肥隠士泥清仙人水緑越林亭而極望生死都捐出宇宙以長懷心靈若䘮悲夫秋者愁也酌濁酒以蕩幽􅁭志之所之用清文而銷積恨我之懷矣能無情乎越州秋日宴山亭序昔王子敬瑯琊之名士常懷習氏之園阮嗣宗陳留之俊人直至山陽之坐豈非琴樽逺契必兆朕於佳辰風月高情毎留連於勝地是以東山可望林泉生謝客之文南國多才江山助屈平之氣况乎揚子雲之故地巖壑依然宓子賤之芳猷絃歌在屬紅蘭翠菊俯映砂亭黛栢蒼松深環玉砌參差夕樹煙侵橘柚之園的厯秋荷月照芙蓉之水既而星廻漢轉露下風高銀燭摛花瑶觴抒興一時仙馭方㴱擯俗之懷五際飛文時動緣情之作人分一字四韻成篇秋日宴洛陽序夫以東京勝地南呂髙秋三塗鎮而九派分白露下而清風肅或出或處人多朝野之歡以嬉以遊時極登臨之所征衣流寓切下走之蓬􅁭解榻邀期屬上賓之桂席於是齊道實款琴樽倜儻論心留連促膝但有潘楊之密戚得無管鮑之深知簪組盛而車馬喧庭宇虛而管絃亮近臨銅陌斜控銀墟菊照新花泛輕香於逺次荷凋晚葉翻翠影於長波聽矚方窮獻酬逾洽年忘小大傲天地於平生志混榮枯得林泉之意氣願長繩以繫日幾近光隂思短札以凌雲或陳歌咏人採古韻成者先呈
