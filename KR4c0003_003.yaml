front:
  text: 王子安集卷之三
  hash: sha256:c4be9a164b124935d2daa8ecbb33ab0625381c5afc5c2a27fa81c0daecd55c26
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0003_SBCK_003-1a}
body:
  text: 唐龍門王勃子安著明閩漳張燮紹和纂五言律詩銅雀妓二首金鳯鄰銅雀漳河望鄴城君王無處所臺榭若平生舞席紛何就歌梁儼未傾西陵松檟冷誰見綺羅情妾本深宮妓層城閉九重君王歡愛盡歌舞為誰容錦衾不復襞羅衣誰再縫高臺西北望流涕向靑松聖泉宴并序玄武山有聖泉焉浸淫歷數百千年乘巖泌湧接磴分流下瞰長江沙堤石岸咸古人遺迹也兹乃靑蘋緑芰紫苔蒼蘚遂使江湖思遠寤寐寄託既而崇巒左岥石壑前縈丹崿萬尋碧潭千頃松風唱響竹露薰空瀟瀟乎人間之難遇也方欲以林壑為天屬琴樽為日用嗟乎古今代謝方深川上之悲少長同遊且盡山陰之樂盍題芳什共寫髙情詩得泉字披襟乘石磴列籍俯春泉蘭氣薰山酌松聲韻野弦影飄垂葉外香度落花前興洽林塘晚重巖起夕煙尋道觀而張天師居也其觀即昌利觀芝􅒡光分野蓬闕盛規模碧壇淸柱閾丹洞肅松樞玉笈三山記金箱五嶽圖蒼虬不可見作一得空望白雲衢散關晨度關山淩旦開石路無塵埃白馬髙談去靑牛真氣來重門臨巨壑連棟起崇隈即今揚䇿度非是棄繻回别薛華送送多窮路遑遑獨問津悲涼千里道悽斷百年身心事同漂泊生涯共苦辛無論去與住俱是夢中人重别薛華明月沉珠浦秋風濯錦川樓臺臨絶岸洲渚亘長天旅泊成千里棲遑共百年窮途惟有淚還望獨潸然遊梵宇三覺寺香閣披靑磴雕臺控紫岑葉齊山路狹花積野壇深蘿幌棲禪影松門聽梵音遽欣陪妙躅延賞滌煩襟麻平晚行百年懷土望千里倦遊情髙低尋戍道遠近聽泉聲澗葉才分色山花不辨名羈心何處盡風急暮猿淸送盧主簿窮途非所恨虛室自相依城闕居年滿琴樽俗事稀開襟方未已分袂忽多違東巖富松竹嵗暮幸同歸餞韋兵曹征驂臨野次别袂慘江垂川霽浮煙斂山明落照移鷹風凋晚葉蟬露泣泫一作秋枝亭臯分遠望延想間雲涯白下驛餞唐少府下驛窮交日昌亭旅食年相知何用早懷抱即依然浦樓低晚照鄉路隔風煙去去如何道長安在日邊杜少府之任蜀州城闕輔三秦風煙望五津與君離别意同是宦遊人海內存知己天涯若比鄰無為在岐路兒女共霑巾仲春郊外東園垂柳徑西堰落花津物色連三月風光絶四鄰鳥飛村覺曙魚戲水知春初晴山院裏何處染囂塵郊興空園歌獨酌春日賦間居澤蘭侵小徑河柳覆長渠雨去花光濕風歸葉影疏山人不惜醉唯畏緑樽虛郊園即事煙霞春旦早一作賞松竹故年心斷山疑畫障懸澑瀉鳴琴草遍南亭合花濃開一作北院深間居饒酒賦隨興欲抽簮觀佛迹寺蓮座神容儼松崖聖迹餘年長金迹淺地久石文疏頽華臨曲磴傾影赴前除共嗟陵谷遠俄視化城虛山居晚眺贈王道士金壇疏俗宇玉洞侶仙羣花枝栖晚露峰葉度晴雲斜照移山影回沙擁澑籀一作文琴樽方待興竹樹已迎曛八仙徑數里巖徑窈窕杖而後進寺南又有昌利觀去寺可奈園欣八正松巖訪九仙援蘿窺霧術攀桂俯雲阡煙一作代北鸞驂至遼西鶴騎旋終希脫塵網連翼下芝田春日還郊間情兼默語默默一作擕杖赴巖泉草緑縈新帶愈靑綴古錢魚牀侵岸水鳥路入山煙還題平子賦花樹滿春田􅍟酒春園作投簮下山閣攜酒􅍟河梁狹水牽長鏡髙花送斷香繁鶯歌似曲疏蝶舞成行自然催一醉非但閲年光觀內懷仙玉架殘書隱金壇舊迹迷牽花尋紫洞澗一作步葉下淸溪瓊漿猶類乳石髓尚如泥自能成羽翼何必仰雲梯秋日别王長史别路長餘一作千里深恩重百年正悲西候日更動北梁篇野色籠寒霧山光斂暮煙終知難再奉懷德自澘然上巳浮江宴韻得遙字上巳年光促中川興緒遙緑齊山葉滿紅泄岸花銷泉聲喧後澗虹影照前橋遽悲春望遠江路積波潮長柳晨征犯煙磴夕憩在雲關晚風淸近壑新月照澄灣郊童樵唱返津叟釣歌還客行無與晤賴此釋愁顏羈遊餞别客心懸隴路遊子倦惓一作江干槿豐濃一作朝砌靜篠密夜窗寒琴聲銷别恨風景駐離歡寧竟山川遠悠悠旅思難易陽早發飭裝侵曉月奔䇿候殘星危閣尋丹嶂回梁屬翠屛雲間迷樹影霧裏失峰形復此涼颷至空山飛夜螢焦岸早行和陸四侵星違旅館乘月戒征儔復嶂迷晴色虛巖辨暗流猿吟山漏曉螢散野風秋故人渺何際鄉關雲霧浮深灣夜宿山帶江主人依津途臨巨壑村宇架危岑堰絶灘聲隱峰交樹影深江童暮理楫山女夜調砧此時故鄉遠寧知遊子心傷裴録事喪子蘭階霜候早松路穸夜一作臺深魄散珠胎沒芳銷玉樹沈露文晞宿草煙照慘平林芝焚空歎息流恨滿籝金五言排律泥溪弭棹淩奔壑低鞭躡峻岐江濤出岸險峰磴入雲危澑急船文亂巖斜騎影移水煙籠翠渚山照落丹崖風生蘋浦葉露泫泣一作竹潭枝泛水雖云美勞歌誰復知秋日仙遊觀贈道士詩無首四句一作駱賓王石圖分帝宇銀牒洞靈宮回丹縈岫室復翠上巖櫳霧濃金竈靜雲暗玉壇空野花常捧露山葉自吟風林泉明月在詩酒故人同待余逢石髓從爾命飛鴻出境遊山二首源水終無路山阿若有人驅羊先動石走兔欲投巾洞晚秋泉冷巖朝古樹新峰斜連鳥翅磴疊上魚鱗化鶴千齡早元龜六代春浮雲今可駕滄海自成塵振翮淩霜吹正月佇天潯為鑣淩翠壑飛軫控靑岑巖深靈竈沒澗毁石渠沈宫闕雲間近江山物外臨玉壇棲暮夜珠洞結秋陰蕭蕭離俗影擾擾望鄉心誰意山遊好屢傷人事侵三月曲水宴得樽字彭澤官初去河陽賦始傳田園歸舊國詩酒間長筵列室窺丹洞分樓瞰紫煙縈回亘津渡出沒控郊廛鳳琴調上客龍轡儼羣仙松石偏宜古藤蘿不記年重簷交密樹復磴擁危泉抗石晞南嶺乘沙眇北川傅巖來築處磻溪入釣前日斜真趣遠幽思夢涼蟬盧照鄰和得樽字附風煙彭澤里山水仲長園繇來棄銅墨本自重琴樽髙情邈不嗣雅道今復存有美光時彥養德坐山樊門開芳杜徑室距桃花源公子黃金勒仙人紫氣軒長懷去城市髙詠狎蘭蓀連沙飛白鷺孤嶼嘯玄猿日影巖前落雲花江上翻興闌車馬散林塘夕鳥喧五言絶句晚屆鳯州寶雞辭舊域仙鳯歷遺墟去此近城闕靑山明月初羇春客心千里倦春事一朝歸還傷北園裏重見落花飛林塘懷友芳屏畫春草仙杼織朝霞何如山水路對面即飛花山扉夜坐抱琴開野室攜酒􅍟情人林塘花月下别是一家春春莊山中蘭葉徑城外李桃園直知人事靜不覺鳥聲喧春遊客念紛無極春淚倍成行今朝花樹下不覺戀年光春園山泉兩處晚花柳一園春還持千日醉共作百年人林泉獨飲丘壑經塗賞花柳遇時春相逢今不醉物色自輕人登城春望物外山川近晴初景靄新芳郊花柳遍何處不宜春他鄉敘興綴葉歸煙晚乘花落照春邊城琴酒處俱是越鄉人夜興野煙含夕渚山月照秋林還將中散興來偶步兵琴臨江二首泛泛東流水飛飛北上塵歸驂將别棹俱是倦遊人去驂嘶别路歸棹隱寒洲江臯木葉下應想故城秋江亭夜月送别二首江送巴南水山橫塞北雲津亭秋月夜誰見泣離羣亂煙籠碧砌飛月向南端寂寂離亭掩江山此夜寒别人四首久客逢餘閏他鄉别故人自然堪下淚誰忍望征塵江上風煙積山幽雲霧多送君南浦外還望將如何桂軺初不駐蘭筵幸未開林塘風月賞應待故人來霜華淨天末霧色籠江際客子常畏人何為久留滯贈李十四四首野客思茅宇山人愛竹林琴尊唯待處風月自相尋小徑偏宜草空庭不厭花平生詩與酒自得會仙家亂竹開三徑飛花滿四鄰從來揚子宅别有尚玄人風筵調桂軫月徑引藤杯直當花院裏書齋望曉聞早春野望江曠春潮白山長曉岫靑他鄉臨眺睨一作極花柳映邊亭山中長江悲已滯萬里念將歸况屬高風晚山山黃葉飛冬郊行望桂密巖花白梨疏林葉紅江臯寒望盡歸念斷征蓬寒夜思友三首久别侵懷抱他鄉變容色月下調鳴琴相思此何極雲間征思斷月下歸愁切鴻鴈西南飛如何故人别朝朝翠山下夜夜蒼江曲復此遙相思淸尊湛芳緑始平晚息觀闕長安近江山蜀道賒客行朝復夕無處是鄉家扶風晝屆離京浸遠帝里金莖去扶風石柱來山川殊未巳行路方悠哉普安建陰題壁江漢深無極梁岷不可攀山川雲霧裏遊子幾時還九日九日重陽節開門有菊花不知來送酒若箇是陶家七言絶句秋江送别二首早是他鄉值早秋江亭明月帶江流已覺逝川傷别念復看津樹隱離舟歸舟歸騎儼成行江南江北互相望誰謂波瀾才一水已覺山川是兩鄉蜀中九日登玄武山旅眺沛王府既廢客劍南王有遊玄武山詩紀事云武山在東蜀勃以檄雞文斥出九月九日望鄉臺他席他鄉送客杯人今情一作巳厭南中苦鴻鴈那從北地來盧照鄰九月九日玄武山旅眺附九月九日眺山川歸心歸望積風煙他鄉共酌金花酒萬里同悲鴻鴈天邵大震九月九日登玄武山旅眺附九月九日望遙空秋水秋天生夕風寒鴈一向南飛遠遊人幾度菊花叢河陽橋代竇郎中佳人答楊中舍披風聽鳥長河路臨津織女遙相妬判知秋夕帶啼還那及春朝攜手度
