  text: 訛誤
  hash: sha256:8f6a7d9ecde47b0168f2fa566dd68e2ed9c909156825f5fb3b745aecc2a25579
body:
  text: 王子安集巻十欽定四庫全書王子安集巻十一唐王勃撰頌乾元殿頌并序臣聞鵬霄上廓瓊都開紫帝之庭鼇紀下清珍野闢黄靈之館兼山配極照鸞闕於霞標薦水涵元湛驪宫於霧壑斯則神徵語恠功潛鳥跡之初理渉非經道昧鶉居之始授鳳書而稽碧落仙構罕存按龜籙而質黄圖金模間起粤若風移處闇增巢恢火運之機業拒嚮明上棟括河圖之奥三堦布政詠匪日於靈臺百堵陳詩頌斯干於考室亦有黄軒瞰月樵門頽九洛之功璿闥排烟牧野構三河之酷御燕臺而臨北極缺王度於祈招列雲閣而拒南山隕皇謨於軹道然則卑宫喪禮采椽輕四海之尊豐屋延災柏梁非萬乗之有雖因時立事奢儉殊流而𢎞道在人興亡迭運靈光末造不窺九室之榮景福宏規猶擁三方之釁瞻風舊史逮曹馬而無譏觀跡故墟歴周隋而未得自我唐太陵遷構均五方於鶴几之前中野凝圖調六氣於虬牀之下坐圭臺而清俯仰晷緯齊明臨鼎邑而重威靈雲雷合響得𤣥功於大壯其至在兹乎我大唐雞渾制極樹神宰而制山河鶴䜟裁儀闢太虛而有天地黄精吐瑞潛龍苞象帝之基紫氣徵祥鳴鳳呈真王之表髙祖太武皇帝虹星湛色開寶胄於金壺蛟電凝隂發皇明於石紐白蛇宵斷行移海岳之符蒼兕晨驅坐遘雲雷之業屬東隣委馭扇虐政於叢祠北拱隳尊紊皇圖於寶極蜚鴻集野瞻烏鮮投足之因青犢嘯風羣鹿無擇音之所天街五裂截鯨浦而飛芒地紐三分觸鼇山而按節𤣥虬在御掃圻甸而廓星都黄鳥分麾動扶揺而駭雲陣鑣官杖鉞跨髙陌而登元轡野韜戈陟圮壇而擁號皇圖不恃聖人追巻領之風神器無私才子奉褰裳之運太宗皇帝雲房揖契壓麟璽於庭軒雷渚翔英擾龍鈴於髙席八能亨運抗鵷邸而杖朱髦十亂恢基臨鶴州而擁黄鉞唐雲秘族潛開白水之徵代景迴輪光踐丹丘之運權輿象緯削茅社而建瓊桃草昧風雲席羅圖而創璿厯紫庭合粹括宇宙於宸襟丹扆凝尊運陶鈞於寶思摛碧霄而鍊石上清耀魄之宫詔寰海而捐珠俯睇陽侯之室功驅偃伯頓鶚視於華封道被來王靜龍吟於武庫𤣥樞上運卜年開累聖之符丹竈昇遐遺範敞謀孫之畫皇帝陛下椒庭襲慶曜璿萼於霞莊蘭殿分休湛珠衡於月館道凝瓊鎮下蒼掖而照重熙業峻銅樓憑紫軒而揖羣后環四瀛於舜抱漏蟻覃津栖十景於堯衿巢螟荷照上元開籙寶龜定皇邑之模下武崇基飛龍錫帝臺之構貞明啟運齊玉鏡於鸞門易簡成功偃銅符於鶴仗懷降尊於襄野太階忘七起之勞念負重於焦原巾席託三危之險臨翠媯而則道天孕時成坐𤣥扈而被圖神超物妙皇后星潯縱淑曳珠紱於銅臯雲野疏祥抗瓊枝於桂浦素蟾登慶六虛充牝馬之貞丹雀銜林三雅合闗雎之好璿宫夜靜居龍幰而調元金扆晨開御鴛階而緝化芝庭揖訓逺清和鳳之儀蘭珮承風競峻當熊之節皇太子承雲紫座翊八柱於乾維湛粹青衢揖三樞於地戸黄離踵曜太陽分銑樹之輝蒼震荐音少海控銀河之色鶴筌飛奏想丹駕於瓊山鮑俎捐芳齒𤣥冠於寶序彤闈問豎禮崇監撫之威黼席興賢義極君親之愛若乃東門䘏𦙍疊仙構於熊山西苑承家𨗳靈波於鴈沼桐圭作瑞鳳毛曜丹穴之英茅壤分維麟趾冠𤣥丘之俊巽宫延粹闢朱柱於娥臺兌野流芬疏紫蘭於别館頻隈毓範雲扃分戚里之驩覃㠘凝規星閣絶郎官之請雕龍命職縱跳澤而驤鱗翠鷃調司順義飇而撫翼月軒宵佇虞谿降璿緯之精震帳晨披姜水洞金韜之賾飛鶴書而抽海狀桂壑於是投綸轉麟斾而揖山容松澗繇其削衽軒圖瑞矞泛花綬於雞林農紀祥炎濯蘭纓於鳳水仙臺俶務三珪銓棘序之風天秩調邦六府變槐衢之典金門獻納縱麟筆於苔牋石館論思覈龜章於竹槧淹中訪禮蹲龍揺壁水之波稷下談經飛兔躍環林之秀詞庭吐鳳翫鳥跡於春黌書帳翻螢閱蟲文於夏閣杏花千畝紺轅照帝籍之功桑柘三宫𤣥紱降親蠶之禮圓丘上闢奉蒼璧於靈壇方澤下凝列黄琮於寶墠朱絃翠瓚履霜懷四響之尊複霤重簷涓日正三綱之首五靈奔慶冠􅉬澤於黄樞六祀銜欣颺麟烟於紺席遺弓積慕䖍深太廟之儀執豆推恩道振明堂之禮瑶山廣樂備逸調於宫懸洞庭仙奏納遺歌於帝府九韶分唱后夔清桂序之音六變同和飛鳳掌梧軒之律樽俎折旋之數苞舉隂陽堂庭節奏之規彌綸宇宙靈襟索隱控風伯於詞林睿想鈎深詔天吳於筆海神窮獨照㫄探赤水之珍思洽幾深迥寫丹谿之韻金壇紫露映銀籀而翻華瑶林白雪藻瓊章而吐絢蟬機撮化銅渾將九聖齊懸虬箭司更銀漏與三辰合運爽鳩分職素雲頽鳥啄之祥神獬闗司𤣥水照龍顏之則黄沙鞠草剗叢棘而遷訛丹石滋苔仰甘棠而息訟融臯再稔方聞外戸之謡昧谷千箱坐溢康衢之奏百城烟峙望秋露而乗風千室雲開合宵霆而組化彤幃獨選熊幡下蘆鴈之祥墨綬分賢犀檢降槐鸞之祉筠驂佇信髦士剖竹而相尋葦杖霑仁鮐叟攀輪而不暇龍蛇可踐野人豐荷杖之驩雞犬相聞城尉輟鳴桴之響五雲抽潤湛芳氣於璿臺六府威殷唱豐歌於銅闕不戒而畀東戸恩周動植之津博施而舉南風化偃胎萌之㝢神謀備預儼七萃於丹樞䆳畧防㣲肅千廬於紫衞元戎握節黄公授犀闕之圖帝座聞鼙𤣥女荐龍庭之策赬柯捭刃中權決勝於兩階白羽俄麾善陣推亡於四表朱厓反景之域削􅉬弭於文㮰黑山明月之鄉委龍琛於武帳錦軒星鶩控乾絡而觀風繡服霞驚浹神紘而問俗川浮沒羽鯨谿靜丹浦之虞陸薦飛毛熊瓛動青雲之偵銀闗驟雨望紫陌而趨恩鐵幌馳風計彤闈而瀝思赤馬文猨之寶叢積乎郊虞紈牛露犬之貢滿盈乎儲邸青邱畫野不踰征賦之鄉蒼水奉圖未盡提封之貫且夫緯武經文宏業也含幽育明至誠也混齊六合大功也規模百代昌數也故能襲九空而寧庶物劃千里而統諸侯休徵象徳而動嘉符觸類而至風揚晷洽藻乾慶於芳年司節河清靄坤禎於明渚瑶枝結慶泉埃蕩玉葢之文瓊液浮甘天酒綴金莖之色黄麰紫脱湊仙穎於中畿翠萐丹蓂疊靈株於上序駢眸候日漾影䝉池比翰翻風栖光若木祥飛井絡震鱗題瑞朔之元祉絢新郊枵獸紀和年之序具靈篇之絶貺究仙諜之殊休天人之際交矣皇帝之道備矣繇是三靈物覩扣蘭禁而棲誠九服子來詠嵩宫而騁力去奢去甚不矜黄屋之隆匪樸匪雕方順丹墀之請宸規相宅考周舊於靈都睿覽思和獲秦餘於正殿羣臣列陛奏蕭相之遺模天子臨軒採荀卿之故事炎洲八桂簉仙栱於林衡岱畎五松委靈材於梓匠衢宫記範萬機抗九戸之尊海孽移琛千欒省十家之費飛廉巻靄徹烟極而浮甍屏翳收津劃星墟而置槧瑶階百雉光懸寶露之壇瓊璧萬尋影綷崇霞之閣拖虹梁而四注星漢虧於上榮疊雲棟而三休寒暑隔於中霤雕楣鶴企沓勢分規繡桷虬奔殊形别起圓璫布藻罄羽璧於狼泉方鏡披蓮孕化璣於蜃浦芝樓對幄薫傳五日之風芸閣列錢彩鍛三旬之霧文疏罩迥隂兔息肩於綺寮翠幌籠霄陽烏鎩翼於珠網豐隆按節下複橑而司階列缺施鞭低叢楹而假道溫房佇幸煦芳景於佳辰涼室乗閒凜徂飇於火序金鋪夕照若帝圃之輝瓊英寶綴晨懸類阿房之聚銀燭烟丘碧桂翊珉陛而披香雨岫赬筠夾璿流而颺影九衢翻翠襍仙卉於中逵四照霏紅間靈葩於右墄神禽率舞光浮肆夏之軒瑞鳥相鳴響叶鈞天之樂鈎陳宿列儼雙碣於丹霄綺繳霞周闢千門於紫露爾其左扃嵩鎮申侯降太室之禎前枕莘郊伊尹發空桑之秀揭熊山而北眺貝闕猶存覩龜溜而西分瓊臺易接總交中宇廓川陸而疏畿竟想善鄰揆風霜而建野然則因秦構極祖宗耀金策之符作洛恢基我后創璿居之始援天引聖隔代重暉横紫都而可襲配𤣥宫而非逺故能使神光夜燭鏡麟趾於文除仙渰晨華委鸞章於繡礎靈爻密發八方昭大有之和寶篆潛開六合啟同人之㑹兩儀交慶虛碧墠而翹旌萬宇披歡指蒼車而候蹕雖青蒲頌徳東朝獻龍鳳之圖而丹極鳴謙南面動貂羊之詔百神推策望璆徑而䖍誠三讓奉符顧瑶壇而肅事龜書吐瑞按五挍而分營鳳策揚輝翔八鸞而節歩帷宫霧轉列芝葢於中天帳殿星離軔蒲輪於大野紫鱗充饋若大帝之共臨素鶴翔華類羣仙之廣宴花開瑞雪委瓊饌而調芳綵絢祥雲夾珠旗而曳影功推三祖銀繩勒東岱之威業峻一人金筴奉南山之夀道既成矣𤣥符集矣代既貞矣元勲緝矣運三辰而虛玉柄風兌渙其中孚懸五禮而偃金科雷坎光其作解奔烽舉爵溢仙酒於中衢疊鼔分餚浹宸輝於下里吞九重而上運控八聖而遐征翔赤驥而睇風區吟翠虬而掩霄甸隱隱轟轟雷動天驚囘輿斜眄而降乎乾元之殿司宫庀職肅坻堮而神行掌舍巡方煥巖廊而洞啟赫若朱螭負漢而輝横海之鱗黙若蒼鵬架壑而振垂天之翮千官曉次傃銀牓而端簪萬戸宵披候瓊膏而肅帶靈戈列陛天官具三揖之儀雲輅充庭宗伯寅九賓之禮瑶鯨戒響懸猛簴於端闈銅狄分形肅嚴扃於左序排紫㣲而立極宸儀冠明后之三俯黄道而披軒仙厯用乾元之九蕩蕩乎何聖人之無外巍巍乎而神功之不窮也臣勃席芳十歩企景三冬雖承宣室之談猶窘靈臺之影仙壇逺秘已多謝於祥鶼大厦初成復攀榮於賀雀慨深梁甫終乖捧日之歡思極甘泉未動淩雲之價神圖不測固流絢於丹縢㣲志可存庶鐫芳於翠琬敢獻頌曰紫扃垂耀黄樞鎮野銀樹霜披珠臺月寫響明立極横神廓社大壯摛爻斯干韻雅其一鶉居化沒狙訛道長瓊構霞明璜軒露敞棄人崇欲違天蠧象南巢不救東鄰長往其二瑶緘考懿金板藏功道凝茅屋業盛蒿宫龍階察祲鵷閣調風推訪華禮酌儉思沖其三懸釐結疊傳翼生災千甍嶺接萬栱星開爭圖絢侈福極凶來風寒碣館露慘蘇臺其四十館瑩秦金房砥室千間架漢韜雲閟日濟惡承危同亡異術傾輈未逺遺墟繼出其五龍川結禍鶴塞稱符塵驚八際霧慘三都穹廬寶極罽幕璿樞司宫墜典掌舍淪圖其六蒼衢毓祉丹丘表聖鳯矯仙樞龍迴寶命道凝金冊功馳玉鏡紫氣抽􅂠黄暉疊映其七神稽鶴䜟迹播雞渾重光累極翼子謀孫經天緯象就日提元鸞軒湛粹鳳几裁尊其八祥抽紫厯業照彤管珍雀朝翻仙蟾夜滿丹墟獻跡青臺墜卵椒閫儀風芝閨奉欵其九登三建緒明兩開儀龍譙霧鬱鵷禁霞披浪分璿渚景峻瑶枝黄扉曉列丹轂宵移其十龜文獵彥麟旌訪逸桂客攀榮松賓改律紫鵷開紀丹虬聳秩縱壑摶飇登山捧日其十一功融棘序道備槐庭不仁者逺惟道斯行烟揺墨綬電轉朱軿境懷春翟野散秋螟其十二鄭竹分科燕棠輟諷銅機化極珠囊業洞禮貴丹虬樂調朱鳳珠坰獻寶綿鄉委貢其十三龍闗靜析鶴塞投弦歌呈豹尾舞進鳶肩銅鐃月斥鐵輞星懸繩幽架險驛霧馳烟其十四霧壇凝紫河宫湛碧翠萐翻飇丹蓂候魄霜均電散連珠契璧蘤葢籠霏花衢墜液其十五年和政美化極風調靈臺軫詠考室興謡循圖訪典去泰捐雕道存南面讓屈東朝其十六望雲裁構籠霄建宇方鏡星離圓璫月聚梓匠傾思林衡授矩畫栱栖烟文軒架雨其十七芝房疊翠桂廡流丹霞張萬戸霧葺千欒重扃駐燠洞牖栖寒神加有敘貺入無端其十八帝圖臨御皇僚萃止電㦸揮霜雲旌拒晷紫宫可逼黄街易履鳳礎騰文麟庭抗禮其十九珠泥暢績銀繩鬱契鶴嶺雲明龍壇景惠道超中古功推下濟惟帝惟天惟天惟帝其二十拜南郊頌并序㣲臣上稽龍繇下閱龜謀觀天地之至道考皇上之大節武宣七徳未嘗踰息亂之鄉文招九功未嘗出昇平之域並能懸日月而髙視駕雷雨而先鳴或皮幣而踐天階或干戈而躡乾歩至於理定創禮功成作樂振長策以敘諸侯設靈機而制羣動猶虞階已泰不能息洞庭之誅夏載克寧不能罷㑹稽之戮故將體剛柔而立本法震曜而崇威一戎而㝢縣平四罪而華夷服然後黄旗大輅詔殊號於圓丘電轉雲逥奏𤣥符於孝理天下黎人知四海之安樂寰中殊域奉三寧之康泰德兼祥風灑道與和氣游不言而大寶用貞無事而元功有立捨彼代也其誰與哉若夫應運而生繼天而作鼓動千載之下超騰百王之上遂能發軒庭之景曜躡隋運之頽風揖讓而取文明指麾而清函夏則我皇唐得之矣髙祖以黄旗錫瑞靜雲火之横氛太宗以赤羽登期補星辰之絶縷授瑶圖於斯邑代璿厯於均臺人更三聖道昭千古於是俛臨睿極趨四荒於鳳闕之前端委廟堂調萬國於龍軒之下八鸞徐動頓湯文於後塵九駿長驅佇堯舜於中路邦家之具得矣易簡之業存矣猶有朱䝉戾俗違光蓬艾之間青激遺甿假氣陶鈞之内背熊山而搆虐擁狼潭而稽誅竊瀛海之風波弄乾坤之綱紀漢圖西返惟收五都之名魏律東窮未出三韓之險姦謀蓄於有漸逆節成於不悔長蚊蚋之雷霆附豺狼之羽翼豈知夫至人無外撫天下以為家真數有歸弔羣方而罪巳三門遯甲黄公成不戰之師五壘神兵𤣥女下先登之策肅牙璋而按律輝旄節而分麾降南宫之元老裂西營之毅卒良將首路偏戎竟野軸轤萬里旌旗四合金箱玉匱司空憑首勝之威鶚視龍趨將軍仗萬全之略負鼇丘而峻壁據黿壑而深溝一鼔而亭塞無塵七縱而江山失險伐罪以明而不以衆懷逺人於絶境均惠化於殊隣登若木以照臨折紅桃以延佇然後分州列鎮對明月以收營返斾旋戈部𤣥雲而振旅望神都而獻㨗仰靈社以書功辛亥謁於昭陵癸丑告於太廟時乗黑帝月旅𤣥枵大唐有國之五十一年皇帝有天下之一十九載也元惡既殄萬宇清矣元勲既輯萬寶成矣以為周郊上帝裁延肅慎之賓漢禮甘泉未拯朝鮮之亂想𤣥功而反側奉先㫖以遲逥思答上靈之心以洽庶黎之望爰考吉日遂淨行宫有司具典乗輿乃出撫𤣥蚪戴翠鳳鼉鼔按節鯨鐘疏響千乗嶽動萬騎林迴星陳而天行雷震而霧合是時未登夫泰壇也迺齋帷宫宿帳殿華葢移影鈎陳從蹕千營夕布亙蒼野而烟凝萬幕宵懸背黄闉而霧列既而屏翳清曉飛亷警旦孫叔奉轡王良聳策雲藏星謐宇曠山明旌軒具照簫笳互凝陟名嶽以告成歴神丘而展事國容象物而動朝章視令而肅宸儀有睟虛徐大帝之庭列侍無譁髣髴華胥之國於是襲衮服戒俎豆端瑞班儼華旒樂懸六代禮備三古奠惟蒼璧籍用白茅鳴孤竹之簫管奏空桑之琴瑟感格以誠不以事動植咸驩敬神以道不以華天人合應然後駐聲名於上邑反文物於仙宫因雷雨而作施法雲天而用響風行電舉未注景而浹九埏野忭途歌不崇朝而晏六合我之𤣥極孚矣我之能事畢矣趨帝寰而振足越皇衢以驤首不其休哉雖睿化無方比神圖而絶唱而小臣不佞撫洪筆而當仁敢作頌曰遼河巨浸碣石危峯城分𤣥菟塞接黄龍憑遐作梗恃險忘恭人殘鬼哭主闇臣兇有晉不綱戎麾内逐帝隋失御皇輿外鶩九縣塵征三靈霧黷長兹下慢逋我天戮五材無隕千齡有聖武創元基文清寶命波恬四海明宣七政息衆以寧綏荒以令飛龍繼跡鳴鳳重光遂均夷夏迭用柔剛戈船泛月劍騎横霜風驅海石電掃辰陽帝師無戰神兵有伐丞相陪麾司空伏鉞危雲旦起長星夜發萬壘爭屠千城自蹷功超薄伐義極兼該殊方底定善陣徐逥歸俘獻㨗課績分材建侯清廟偃伯靈臺考事龜謨凝清鳳扆仰觀俯察享神作祀道則推天功非在已豐隆旦出招揺夕指神壇嶽立齋館雲深鑾旗曉引葆吹晨吟山明野徹日降天臨鏘鏘盛服肅肅珪簪俎豆畢陳笙鏞間撫玉觴分獻金錞暢矩青帝鳴琴朱靈㑹舞上和下悦神歆神聚收驩巨野反斾靈躔思周宇宙樂極寰埏徳因時立頌以詞宣帝之功也臣何飾焉
