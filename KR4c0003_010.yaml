front:
  text: 王子安集卷之十
  hash: sha256:c080684bb6c1df6636cde35c74d43d8c8d70fef0c24f5f7f39ca9c9d37e4c04a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0003_SBCK_010-1a}
body:
  text: 唐龍門王勃子安著明閩漳張燮紹和纂論三國論論曰漢自順桓之間國統屢絶奸回竊位閹䆠滿朝士之蹈忠義履氷霜者居顯列則陷犯忤之誅伏閭巷則嬰黨錮之戮當是時也天下之君子掃地將盡雖九伊周十稷契不能振已絶之綱舉土崩之勢明矣嘉平中大黃星見楚宋之分遼東殷馗曰其有真人起於譙沛之間以知曹孟德不為人下事之明驗也先時秦帝東遊亦云金陵當有王者興董扶求出又曰益州有天子氣從兹而言則長江劒閣作吳蜀之限天道人謀有三分之兆其來尚矣然廢興有際崇替遞來每覽其書曷能不臨卷而永懷撫事而伊鬱也嘗試論之曰向使何進納公業之言而不追董卓催汜棄文和之策而不報王允則東京焚如之禍關右亂麻之尸何繇而興哉至使乘輿䝉塵於河上天子露宿於曹陽百官饑死於牆壁六宫流離於道路蓋繇何公之不明賈翊之言過也於是劉岱喬瑁張超孔胄之徒舉義兵而天下響應英雄者騁其驍悍運其謀能海內囂然於兹大亂矣袁本初據四州之地南向爭衡劉景升擁十萬之師坐觀成敗區區公路欲居列郡之尊瑣瑣伯圭謂保易京之業瓉既窘斃術亦憂終談尚離心琮琦失守其故何哉有大賢而不能用覩長策而不能施便謂力濟九區智周萬物天下可指麾而定宇宙可大呼而致也嗚呼悲夫余觀三國之君咸能推誠樂士忍垢藏疾從善如不及聞諫如轉規其割裂山河鼎足而王宜哉孫仲謀承父兄之餘事委瑜肅之良圖泣周秦之痍請吕䝉之命惜休穆之才不加其罪賢子布之諫而造其門用能南開交趾驅五嶺之卒東界海隅兼百越之衆地方五千里帶甲數十萬若令登不早卒休以永年神器不移於暴酷則彭蠡衡陽未可圖也以先主之寬仁得衆張飛關羽萬人之敵諸葛孔明管樂之儔左提右挈以取天下庶幾有濟矣然而喪師失律敗不旋踵奔波謙瓉之間羈旅袁曹之手豈拙於用武將遇非常敵乎初備之南也樊鄧之士其從如雲比到當陽衆十萬餘操以五千之卒及長坂縱兵大擊廓然霧散脫身奔走方欲逺竄用魯肅之謀然投身夏口于時諸葛適在軍中向令帷幄有謀軍容宿練包左車之計運田單之奇操懸軍數千夜行三百輜重不相繼聲援不相聞可不一戰而擒也坐以十萬之衆而無一矢之僃何異驅犬羊之羣餌豺虎之口固知應變將略非武矦所長斯言近矣周瑜方嚴兵取蜀㑹物故於巴丘若其人尚存恐玉壘銅梁非劉氏有也然僃數困敗而意不折終能大啓西土者其惟雅度最優乎武矦歿劉禪舉而棄之覩譙周之懦詞甘忿憤而忘食聞姜維之立事又慷慨而言喜惜其功垂成而智不濟豈伊時喪抑亦人亡乃知德之不修棧道靈關不足恃也魏武用兵髣佛孫吳臨敵制奇鮮有喪敗故能東擒狡布北走强表破黃巾於夀張斬眭固於射犬援戈北指踏頓懸顱擁斾南臨劉琮束手振威烈而清中夏挾天子以令諸矦信超然之雄傑矣而弊於褊刻失於猜詐孔融荀彧終罹其災孝先季圭卒不能免愚知操之不懷柔巴蜀砥定東南必然之理也文帝富於春秋光膺禪讓臨朝恭儉博覽墳籍文質彬彬庶幾君子者矣不能恢崇萬代之業利建七百之基骨肉齊於匹夫衡樞委乎他姓逺求珠翠廢禮諒暗之中近抱辛毗取笑婦人之口明帝嗣位繼以奢淫征夫困於兵革人力殫於臺榭髙貴鄉公明决有餘而深沉不足其雄才大略經緯逺圖求之數君竝無取焉山陽公之墳土未乾陳留王之賓館已啓天之報施何其速哉故粗而論之式僃勸戒俾夫來者有以監諸者焉八卦卜大演論昔者聖人之作易也始畫八卦以通神明之德以類萬物之情以為分太極者兩儀也分四象者八卦也成八卦者十六將也司八卦者十二月也分十六將者三十二候也分十二月者二十四氣也分三十二候者六十四卦也司二十四氣者三十六旬也進退於三百六十六日屈伸於三百八十四爻往來飛伏之理盡矣其孤虛消息之端極矣三才之道不可不及也五行之義不能復過也翕之以幽明張之以寒暑㑹之以生死申之以去就禍福生焉吉凶著焉成敗行焉逆順興焉賢者識其大者逺者不賢者識其小者近者奉之者則順背之者則愆圓立者稱聖偏據者號賢嘗試論之曰三才易之門戶也八卦者易之徑路也引而伸之終於六十四卦天下之能事畢矣陳而别之極於三百八十四爻天下之微理罄矣夫陰陽之道一向一背天地之理一升一降故明暗相隨寒暑相因剛柔相形髙下相傾動靜相乘出入相藉泯之者神也形之者道也可以一理徵也可以一端驗也故天尊則地卑矣水濕則火燥矣山盈則澤虛矣雷動則風適矣是以天下有風可以姤矣則地中有雷可以復矣天下有山可以遁矣則澤上於地可以臨矣天地不交可以否矣則天地既交可以泰矣風行地上可以觀矣則雷行天上可以大壯矣山附地上可以剝矣則火附天上可以大有矣風行水上可謂渙矣則水在地上可以比矣雷出地奮可以豫矣則風行天上可以小畜矣雷之與水可作解矣則風之與火可以家人矣雷在風上可以恆矣則風在雷上可以益矣風在地下可以升矣則雷在天下可以無妄矣風在水下可以井矣則雷在火下可以噬嗑矣風在澤下謂大過矣則雷在山下可為頥矣雷在澤下可以隨矣則風在山下可為蠱矣澤上有水可為節矣則山下有火可為旅矣雷在水下可為屯矣則風在火下可為鼎矣水在火上可為既濟矣則火在水上可為未濟矣澤中有火可以革矣則山下有水可為䝉矣火在地下可以明夷矣則水在天下可為訟矣地下有水可為師矣則山下有火可為賁矣澤上於天可為夫矣則澤下有水可為困矣山下有天可以為大畜矣則澤下有地可以為萃矣以山在澤上可為損矣則澤在山上可為咸矣澤上有火可為暌矣則山上有水可為蹇矣上天下澤可為履矣則地下有山可為謙矣澤上有風可為中孚矣則山上有雷可為小過矣山上有風可為漸矣則澤上有雷可以歸妹矣此天地以􅍟成之義陰陽反合之理故卦相次則反爻以成義易之八卦是也八八相生則錯卦以興理因而重之是也故聖人之道可縱焉可橫焉可合焉可離焉逆而陳之未嘗逆焉順而别之未嘗順焉三畫以變雖天地之數可無韜也九六相推雖萬二千五百之浩蕩不能踰於三百八十四三百八十四之糾紛不能踰於六十四重之以六十四不能過於八卦張之於八卦不能過四象紀之兩儀兩儀之理達而太極得矣故古往今來寒進暑退死生亂動是非謄結未嘗非兩儀也而未嘗離太極也故曰有寒有暑則兩儀不廢也無思無為則太極未嘗逺也見之則兩儀忘之則太極夫然故不捨二求一未嘗離動以求靜未嘗離動以達靜也有可有不可非聖人之謂也無可無不可是夫子之心也然天下之理不可窮也天下之往不可盡也有窮盡之地者其唯聖心乎有窮盡之路者其唯聖言乎故據滄海而觀衆水則江河之㑹歸可見也登泰山而覽羣嶽則岡巒之本末可知也是以貞一德之極權六爻之變振三才之柄尋萬方之動又何往而不通乎又何疑而不釋乎故孔子曰必也正名乎名者義之本也非聖人孰能正之哉若抑末執本研精覃思非聖人之書則不讀也非聖人之言則不取也庶幾乎神明之德可通乎萬物之情可類乎本末之思也夫何逺之有君子可不務乎哉平臺祕略論十首孝行一論曰昔之列桐圭建茅土者非一君焉至於孝思可稱仁風茂著存乎緗牒十一而巳豈非生於深宫之中長於婦人之手膏盲積乎驕慢情奔淪乎嗜欲嗚呼有國有家者可不誡乎貞修二論曰美哉貞修之至也或抗情激操仗清剛而勵俗或理韻和神抱直方而守道或旌奇表善擢才於不次之階或剖滯申嫌措辭於難犯之地竝能以禮升降以時舒卷既明且哲以保其身盛矣哉原夫御俗裁風變彞倫者寄乎直全身逺害得隨時者存乎變夫然故進不違義退不傷生清貞靜一保其道委迤屈伸合其度易曰君子或出或處或默或語天下何思何慮同歸而殊途百慮而一致此之謂也藝文三論曰易稱觀乎天文以察時變傳稱言而無文行之不逺故文章經國之大業不朽之能事而君子所役心勞神宜於大者逺者非緣情體物雕蟲小技而已是故思王抗言詞賦恥為君子武皇裁敕篇章僅稱往事不其然乎至若身處魏闕之下心存江湖之上詩以見志文宣王有焉忠武四論曰陰陽代興剛柔合運威恩參用以成化文武相資以定業况乎康侯自我宗子維城者乎城陽之權略明决卒摧吕氏之變任城之志意剛斷實啓有魏之業蓋有助焉陳思雅懷忠勇義形家國表奏永昌洞曉兵數績著疆場長沙武陵亦足云也善政五論曰東平以盛德匡時大興禮樂齊獻以至親統物光濟中外淮陽安定峻必行之典安陸扶風深受遺之泣能義形家國理極忠貞使黃河如帶垂芳不朽盛矣乎守方雅以調蕃政用公直而掌朝論昻然直上凛有生氣衡陽太原亦足云也尊師六論曰前史稱良藥苦口而利於病忠言逆耳而利於行豈非事情竭於不顧主色期於難犯中人以下罕免斯纍其有抗辭必盡忠烈橫匪石之心聞善若驚君王動順風之請相須之際良可詠也清河之恭慎真懇雅為上引聖朝下託師傅和矣哉褒客七論曰原夫重藝尊師登奇佇逸道存萬里神交一面故有推輪擁篲寡人忘千乘之榮越席分庭上才當四海之禮斯實藩邸之盛事間平之用心也而有矯情役智揚逸名利之間窒隙蹈瑕乾沒英翹之地便辟脂韋飾其迹甘言巧辭運其辨假君王之顧盻用君王之威福傳曰好善而不擇人則前代有以之傾矣至於興諧文雅賞盡煙霞月庭廣闢風閨洞敞西園故事下蘭坂而宵歌東苑遺塵坐槐庭而曉賦折旋書藝之園翺翔儛詠之隙洋洋乎亦為樂之一方也幼俊八論曰夫濫觴懸米翻浮天動地之源寸株尺蘖擢捎雲蔽景之幹豈非積微成大陟遐自邇易曰山下出泉䝉君子以果行育德故考其前事備之于篇規諷九論曰夫陵谷好遷乾坤忌滿哀樂不同而不遠吉凶相反而相襲故有全中率行用心於不爭之場杜漸防危投迹於知幾之地昔之善持滿者用此者也諺曰禍不入慎家之門前代有以之興矣至若中山激難重存親禮武陵變色復延情愛子建之陳辭貢憤長沙之發對因機雖亦各達其心未若洪慶之希聲也慎終十論曰詩云靡不有初鮮克有終若夫東平之奉憲遵約耿介原陵之奏中山之見賢思齊殷勤濮陽之託庶幾乎可謂慎終矣至子塵之奉行文處中慰之遠述河間陳思尅已竝未易誣也多訛誤子塵以下
