  - {type: line-break, offset: 0, content: '', id: KR4c0003_SBCK_000-1a01}
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書集部二}
  - {type: page-break, offset: 0, content: '', id: KR4c0003_WYG_000-1a, image: WYG1065/WYG1065-0061a.png}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 别集類一唐提要臣等謹案王子安集十六巻唐王勃撰勃字子安絳州龍門人髙宗時官虢州㕘軍事迹具唐書文苑傳傳稱其文集三十巻而楊烱集序則謂分為二十巻具諸篇}
  - {type: variant, offset: 5, length: 2, content: 録卷, WYG: 洪邁容齋隨筆亦稱今存者二十巻盖宋代所行猶其舊本明以來其集巳佚原目遂不可考世所傳初唐十二家集僅載勃詩賦二巻闕畧殊甚故皇甫汸作楊烱集序稱王詩賦之餘未睹他製此本乃明崇禎中閩人張燮捜輯文苑英華諸書編為十六巻雖非唐宋之舊而以視別本則較為完善矣勃文為四傑之冠儒者頗病其浮艷案段成式酉陽雜俎曰張燕公嘗讀勃夫子學堂碑頌帝車南指遁七曜於中階華盖西臨髙五雲於太甲四句悉不解訪}
  - {type: page-break, offset: 5, content: '', id: KR4c0003_WYG_000-1b, image: WYG1065/WYG1065-0061b.png}
  - {type: page-break, offset: 5, content: '', id: KR4c0003_WYG_000-2a, image: WYG1065/WYG1065-0062a.png}
