body:
  text: 王子安集巻一欽定四庫全書王子安集巻二唐王勃撰賦採蓮賦并序昔之賦芙蓉者多矣雖復曹王潘陸之逸曲孫鮑江蕭之妙韻莫不權陳麗美粗舉採掇豈所謂究厥麗態窮其風謡哉頃乗暇景厯覩衆製伏翫累日有不滿焉遂作賦曰非登髙可以賦者唯採蓮而已矣况洞庭兮紫波復瀟湘兮緑水或暑雨兮朝霽乍凉風兮暮起黛葉青跗烟周五湖紅葩絳蘤電鑠千里尤見重於幽客信作謡於君子爾其珍族廣茂淑類傳鮮藻河渭之空曲被沮漳之淪漣燭澄灣而爛爛亘修漲之田田豈直水區澤國江漘海堧是以呉娃越豔鄭婉秦妍感靈翹於上節悦瑞色於中年錦㠶映浦羅衣塞川飛木蘭之畵檝駕芙蓉之綺船問子何去幽潭採蓮已矣哉誠不知其所以然賞由物召興以情遷故其遊泳一致悲欣萬緒至若金室麗妃璇宫佚女傷鳯臺之寂寞厭鸞扄之閒處侍飲南津陪歡北渚見磯岸之紆直覿旌旄之低舉上苑神池芳林御陂樓隂架沚殿綵乗漪張拜洛之容衞備横汾之羽儀簫鼔發兮龍文動鱗羽喧兮鷁首移咸靚粧而麗服各分騖而並馳蘋縈槳礙荇觸船危視雲霞之沃蕩望林泉之蔽虧川泱泱兮菡萏積水湛湛兮芙蕖披惜嵗時兮易暮傷君王兮未知折紺房與緗菂攬紅葩及碧枝廽綃裙兮竊獨歡歩羅韈兮私自竒莫不驚香悼色畏别傷離復有渚宫年少期門公子翠髪蛾眉赬脣皓齒傅粉蘭臺之上偷香椒房之裏亦復銜恩激誓佩寵緘愁承好賜之珍席奉嬉宴之彩斿繡棟曛兮翠羽帳瑶塘曙兮青翰舟攀條拾蘂沒波泝流池心寛而藻薄浦口窄而萍稠和橈姬之衞吹接榜女之齊謳去復去兮水色夕採復採兮荷華秋願承歡而卒嵗長接席而寡仇于時薊北無事關西始樂霧靜江垠氛恬海漠寢怪氣於沅湘照榮光於河洛殊方異類舞詠相錯王公卿士歌吹並作則有侯家瑣第戚里芳園穿池㶚㟁之曲蓄水河陽之源隄防谷口島嶼轘轅嘉木畢植靈草具繁沉桂北之丹藕擢荆南之紫根鬰萋萋而霧合粲􅁮􅁮而霞翻洎乎氣徹都鄙景萃川陸麥雨微凉梅颷淺燠命妖侣於石城嘯娱朋於金谷乃使緑珠捧棹青琹理舳樽芳醪藉珍餗汎玉潭之瀰漫遶金渠之隈隩石近水而苔濃岸連山而樹複排芰末而爭逺託蘆問而競逐赴汩凌波飛袿振羅風低緑幹水濺黄螺上客喧兮樂未已美人醉兮顔將酡畏蓮色之如臉願衣香而勝荷徘徊郢調悽愴燕歌念窮歡於水涘誓畢賞於川阿結漢女邀湘娥北溪蘂尚宻南汀花更多恨光景兮不住諧芳馨兮謂何若乃南鄢義妻東呉信婦結縭整佩承筐奉箒忽君子兮有行復良人兮逺征南討九真百越北戍雞田鴈城念去魂駭相視骨驚臨春渚兮一送見秋潭之四平與子之别烟波望絶念子之寒江山路難水淡淡兮蓮葉紫風䬃䬃兮荷花丹剪瑤帶而猶恨折瓊英而不歡既而縁隈逗浦返栧歸櫓睠芳草兮巳殘憶離居兮方苦延素頸於極漲攘皓腕於神滸惜佳期兮末繇徒増思兮何補又若倡姬蕩媵命侶招羣淇上洛表湘臯汝墳望洲草兮翡翠色動浦水兮驪龍文願解佩以邀子思褰裳而從君悲時暮愁日曛鳴環釧兮響窈窕艶珠翠兮光繽紛憐曙野之絳氣愛晴天之碧雲棹廵汀而桞拂船向渚而菱分掇翠莖以翳景籠朱蕚以為裙挺楫淩亂雲流雨散鳴榔絡繹霧罷煙釋狀飛虬之蜿蜿若驚鴻之奕奕艇怯奔潮篙憎淺石絲着手而偏繞刺牽衣而屢襞乃有貴子王孫乗閒縱觀何平叔之符彩潘安仁之藻翰税龍馬於金堤命鳬舟於石㟁錦䌫翻灑銀檣照爛日側光沉風驚浪深盼北渚之新贈恣東溪之密尋鴛鴦繡彩之文履玳瑁瓊華之寶琴扣舷擊榜呉歈越吟溱與洧兮葉覆水淮與濟兮花冒潯值明月之夕出逢丹霞之夜臨茱茰歌兮軫妾思芍藥曲兮傷人心伊採蓮之賤事信忘情之葢寡雖迹兆於水鄉遂風行於天下感極哀樂聲參鄭雅是以緬察谷底窮覧地維北盡豐鎬澇潏南究江沱越沂莫不俟期應節㳂濤汎湄薄言採之興言服之發文扄之麗什動幽幌之情詩使人結眷令人想思宜其色震百草香奪九芝棲碧羽之神雀負青冄之寶龜紫秩流記丹經秘詞豈徒加繡柱之光彩添文井之華滋已哉向使時無其族代乏厥類獨秀上清之境不生中國之地學鸞鳯而時來與鶼鶼而間至必能使衆瑞彩沒羣貺色沮湯武齋戒伊臯延佇豈俾夫秦童趙僕倡姬豔女狎而翫之擷而採之乎時有東鄙幽人西園舊客常陪帝子之輿經侍夫人之籍詠緑竹於風曉賦朱華於月夕暑往寒來忽矣悠哉蓬飄梗逝天涯海際似還卭之寥廓同適越之淫滯蕭索窮途飄颻一隅昔聞七澤今遇五湖聴菱歌兮㡬曲視蓮房兮幾株非鄴地之宴語異雎苑之歡娱况復殊方别域重瀛複嶂虞翻則故鄉寥落許靖則生涯惆悵感芳草之及時懼修名之或䘮誓將剗跡潁上棲影渭陽枕箕岫之孤石汎磻溪之小塘餐素實兮吸絳芳荷為衣兮芰為裳永潔已於丘壑長寄心於君王且為歌曰榮華息功名惻竒秀兮異植紅光兮碧色禀天地之淑麗承雨露之霑飾蓮有藕兮藕有枝才有用兮用有時何當婀娜花實移為君含香藻鳯池澗底寒松賦并序嵗八月壬子旅遊於蜀尋茅溪之澗深蹊絶磴人跡罕到爰有松焉冒霜停雪蒼然百丈雖髙柯峻頴不能踰其岸嗚呼斯松託非其所出羣之噐何以别乎葢物有殊類而合情士有因感而成興遂作賦曰惟松之植于澗之幽盤柯跨嶮沓柢慿流寓天地兮何日凌霜露兮幾秋見時華之屢變知俗態之多浮故其磊落殊狀森梢峻節紫葉吟風蒼條振雪嗟英鑒之稀遇保真容之未缺攀翠崿而形疲指丹霄而望絶已矣哉葢用輕則資衆器宏則施寡信棟梁之已成非榱桷之相假徒志逺而心屈遂才髙而位下斯在物而有焉余何為而悲者慈竹賦并序廣漢山谷有竹名慈生必向内示不離本修莖巨葉攅根㳫柢叢之大者或至百千株焉而縈結踰乎咫尺好事君子徙為堦庭之翫焉吁嗟非此土所有乃有厭流俗之譏動鄉關之思者葢撫髙節而興歎覧嘉名而思歸遂為賦曰有竹猗猗生于髙陂左連瑤帶右雜瓊枝恨幽客之方賞嗟君侯之不知徙蔚丹谷遷榮緑池氣凛凛而猶在色蒼蒼而未離屈巖壑之容貌充堦庭之羽儀爾其劃疆分域駢隂抗趾疊幹龍廽攅根鳯峙防碧露於霄末翳紅光於暈始崇柯振而雲靄生繁葉動而風颷起擁涼砌之晨肅屛炎扄之晝滓至若白藏載謝𤣥英肇切塞北河堅關南地裂觀衆茂之咸悴驗貞輝之獨㓗抽勁緑以垂霜總嚴青而負雪葢同類之常禀非殊方之異節若乃宗生族茂天長地乆萬柢爭盤千株競糾如母子之鈎帶似閨門之悌友恐孤秀而成危毎羣居而自守付美名之天屬而和氣之㝠受嗟乎道之存矣物亦自有一作有之不背仁而貪地不藏節以遯時故其貞不自炫用不見疑保夷險之無易哂榮枯之有期俄蓬轉於岷徼遂萍流於江汜分兄弟於兩鄉隔晨昏於萬里撫貞容而骨愧伏嘉號而心死庶因感而長懷將䇿情而勵巳青苔賦并序吾之旅遊數月矣憩乎荒澗覩青苔焉縁崖而上乃喟然歎曰嗟乎苔之生於林塘也為幽客之賞苔之生於軒庭也為居人之怨斯擇地而處無累於物也愛憎從而生遂作賦曰若夫桂洲蒼澗松崖祕液繞江曲之寒沙抱叢幽之古石汎廻塘而積翠縈修樹而凝碧契山客之竒情諧野人之妙適及其瑶房有寂瓊室無光霏微君子之砌蔓延君侯之堂引浮青而泛露散輕緑而承霜起金鈿之舊感驚玉筯之新行若夫弱質綿羃纎滋布濩措形不用之境託跡無人之路望夷險而齊歸在髙深而委遇惟愛憎之未染何悲歡之詭赴宜其背陽就隂違喧處静不根不蔕無華無影恥􅊝李之暫芳笑蘭桂之不永故順時而不競毎乗幽而自整四言古詩倬彼我系勃兄勮序倬彼我系舍弟虢州叅軍勃所作也傷廹乎家貧道未成而受禄不得如古之君子四十強而仕也故本其情性原其事業因陳先人之迹以議出處致天爵之艱難也倬彼我系出自有周分疆錫社派别支流居衛仕宋匡嬴相劉乃武乃文或公或侯晉代崩坼衣冠擾弊粤自太原播徂江澨禮䘮賢隱時屯道閉王室如燬生人多殪伊我有器思逢其主自東旋西擇木開宇田彼河曲家乎汾浦天未厭亂吾將誰輔伊我祖德思濟九埏不常厥所于兹五遷欲及時也夫豈願焉其位雖屈其言則傳爰述帝制大蒐王道曰天曰人是祖是考禮樂咸若詩書具草貽厥孫謀永為家寶伊余小子信慚明哲彼網有條彼車有轍思屛人事克終前烈于嗟代網卒余來絏來絏伊何謂余曰仕我瞻先達三十方起夫豈不懷高山仰止願言毓德啜菽飲水有烏反哺其聲嗷嗷言念舊德憂心忉忉今我不養嵗月其滔僶俛從役豈敢告勞從役伊何薄求卑位告勞伊何來參卿事名存實爽負信愆義静言遐思中心是愧五言古詩上巳浮江宴韻得阯字披觀玉京路駐賞金臺阯逸興懷九仙良辰傾四美松吟白雲際桂馥清谿裏别有江海一作漢心日暮情何已春日宴樂遊園韻得接字帝里寒光盡神臯春望浹梅郊落晚英桞甸驚初葉流水抽竒弄崩雲灑芳牒清尊湛不空暫喜平生接山亭夜宴桂宇幽襟積松臺涼夜永森沈野逕寒肅穆巖扉静竹晦南阿色荷翻北潭影清興殊未闌林端照初景詠風肅肅涼風一作景生加我林壑清驅煙尋磵户巻霧出山楹去來固無跡動息如有情日落山水静為君起松聲懷仙并序客有自幽山來者啟予以林壑之事而烟霞在焉思解纓紱永詠山水神與道超跡為形滯故書其事焉鶴岑有竒徑麟洲富仙家紫泉漱珠液𤣥巖列丹葩常希披塵網眇然登雲車鸞情極霄漢鳯想疲煙霞道存蓬瀛近意惬朝市賖無為坐惆悵虛此江上華忽夢逰仙僕本江上客牽跡在方内寤寐霄漢間居然有靈對翕爾登霞首依然躡雲背電䇿驅龍光煙途儼鸞態乗月披金帔連星解瓊珮浮識俄易歸真遊邈難再寥廓沈遐想周遑奉遺誨流俗非我鄉何當釋塵昧七言古詩秋夜長秋夜長殊未央月明露白澄清光層城綺閣遥相望川無梁北風受節南鴈翔崇蘭委質時菊芳鳴環曵履出長廊為君秋夜擣衣裳纎羅對鳯凰丹綺雙鴛鴦調砧亂杵思自傷征夫萬里戍他鄉鶴關音信斷龍門道路長君在天一方寒衣徒自香採蓮曲採蓮歸緑水芙蓉衣秋風起浪鳬鴈飛桂棹蘭橈下長浦羅裙玉腕輕揺櫓葉嶼花潭極望平江謳越吹相思苦相思苦佳期不可駐塞外征夫猶未還江南採蓮今巳暮採蓮花渠今那必盡娼家官道城南把桑葉何如江上採蓮花蓮花復蓮花花葉何稠疊葉翠本羞眉花紅強如頰佳人不在兹悵望别離時牽花憐共蔕折藕愛連絲故情無處所新物徒華滋不惜西津交佩解還羞北海鴈書遲採蓮歌有節採蓮夜未歇正逢浩蕩江上風又值徘徊江上月徘徊蓮浦夜相逢呉姬越女何丰茸共問寒江千里外征客關山路㡬重臨髙臺臨髙臺臨髙臺􅣖絶浮埃瑶軒綺構何崔嵬鸞歌鳯吹清且哀俯瞰長安道萋萋御溝草斜對甘泉路蒼蒼茂陵樹髙臺四望同佳氣鬱葱葱紫閣丹樓紛照耀璧房錦殿相玲瓏東迷長樂觀西指未央宫赤城映朝日緑樹揺春風旗亭百隊開新市甲第千甍分戚里朱輪翠葢不勝春疊榭層楹相對起復有青樓大道中繡户文牕雕綺櫳錦衾晝不襞羅幃夕未空歌屛朝掩翠粧鏡晚窺紅為君安寶䯻蛾眉罷花叢塵間狹路黯將暮雲開月色明如素鴛鴦池上兩兩飛鳯凰樓下雙雙度物色正如此佳期那不顧銀鞍繡轂盛繁華可憐今夜宿娼家娼家少婦不湏顰東園桃李片時春君看舊日髙臺處柏梁銅雀生黄塵滕王閣滕王高閣臨江渚珮玉鳴鸞罷歌舞畫棟朝飛南浦雲朱簾暮捲西山雨閒雲潭影日悠悠物换星移㡬度秋閣中帝子今何在檻外長江空自流江南弄江南弄巫山連楚夢行雲幾相送瑤軒金谷上春時玉童仙女無見期紫霧香煙眇難託清風明月遥相思遙相思草徒緑為聼雙飛鳯凰曲落花落落花落落花紛漠漠緑葉青跗暎丹蕚與君徘徊上金閣影拂粧階玳瑁筵香飄舞館茱茰幙落花飛撩亂入中帷落花春正滿春人歸不歸落花度氛氲遶髙樹落花春已繁春人春不顧綺閣青臺静且閒羅袂紅巾復往還盛年不再得髙枝難重攀試復旦遊落花裏暮宿落花間與君落花院臺上起雙鬟寒夜懷友二首北山烟霧始茫茫南津霜月正蒼蒼秋深客思紛無已復值征鴻中夜起複閣重樓向浦開秋風明月度江來故人故情懷故宴相望相思不相見六言古詩附雜曲智瓊神女來訪文君蛾眉始約羅裙初薰歌齊曲韻舞亂行分若向陽臺薦枕何啻得勝朝雲
