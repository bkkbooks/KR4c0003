front:
  text: 王子安集巻之十二
  hash: sha256:6cc7a6a887b752e82c4129b5f2b2fbd8d798aa39e03b12d952f70055c082d819
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0003_SBCK_012-1a}
body:
  text: 唐龍門王勃子安著明閩漳張爕紹和纂頌九成宫頌臣聞在天垂曜璿宫列乾象之墟在地班形珠闕鎮坤靈之野洎夫三精軿運即寥廓而爲宫九聖旋游遍洪荒而可宅則有瑶房玉室崑山分大帝之庭金屋銀臺滄海濯玄元之宇豈非神明其道騁仙轡於無垠浩蕩其居示清都於不宰若夫扃牖六合奔走八神占日月而揆山川駕陰陽而法天地非聖人其孰能與於此乎至若文開遯甲仇峰城蒼后之躔樂奏鈞天峒嶺駐黄軒之駕業融環堵下姑射而尋真道濟巖廊望衡山而展事斯則三階遍下唯臨布政之宫六位時乗未及巡方之館其後兩龍齊鶩抗瓊闥而同嬉八駿髙驤指瑶池而結興殷風不競砂丘雄别館之娯秦道無章雲閣狥殊庭之賞於是功虧大壯頌闕祈招豐屋同忘危輈繼及遂使來年侯跡名山爲縱觀之塲竝海遵河沃野盡行宫之地皇天震怒於上蒼黎甿慟哭于下土其有斟酌千古文明一代蒿宫不陋茨山可仰祈誠東岳唐帝復衢室之尊用饗西岐天子合釣臺之運得其道也葢有存焉國家梯霄架極罄域裁基纂髙丘白雲之胤鬱函都紫氣之兆宸扉既闢一宇宙而來王聖籙潛躋貳乾坤而作帝高祖天旗夜立制黄馬而先驅太宗日馭晨飛驂緑蟠而首出雖立極承祧之業進燭前文而重光累洽之符歸功下武陛下承靈太乙踵睿登三星虹㳫祉電虬發慶丹書碧篆神符煥河洛之文玉斗珠衡天骨挺皇王之表用能捨桐圭而宣匙鬯肅玉籍而揖宗祧寫藹九天騰景萬里御風雷七曜於上博臨之功顯用山川六府而下輔相之宜得玄宫密運敷造化於靈襟黄屋神凝創經綸於寶思鳳闈宵靜陰靈宣玉閫之華鶴禁朝趨離象峻銅樓之景川分帝子控鯤壑而䟽源岳動天孫擁熊山而列鎮其化成也如彼其強幹也如此猶乃停旒正室嚴纊中軒玉階匪泰金門爲險佇虹旃於月澗岳瀆生光飛鶴槧於煙臯江湖動色桃溪逸彥塞丹井而歸風松磴遺英斬玄闗而奉制位兼河海九卿叅巨濟之功道合星辰三事鬱經天之象朱轓緝化泣故老於中溪墨綬宣風繞春童於上陌王化之基已洽天工之代有序建銅儀而測曜象緯齊懸按璿璣而書雲禎氛疊舉祥嗈十二紫鵷調夏谷之音大禮三千頳蛇應黄鐘之曲蠶功順令業著於青裳蜃磨迎春恩周於黛耜黄砂靜讞爽鳩興頓足之悲丹石銷寃神獬輟推鋒之計詠時和於帝壤動植咸驩歌道泰於華封昆蟲自樂星墟列將輝玉節而長驅天策神兵下金壇而决勝横麾赤岅葱山成不戰之郊命繳青丘桃野見其亾之兆煙馳火徼勵珠產而移琛雪鶩氷洲駕瑶谿而納賮乾坤徑復載遵赤縣之封曦望環周未出黄圖之域故夫含吐萬物至功也制平八表大業也一陰一陽神通也乃文乃武聖圖也用能使天不愛寶地不藏珍日月五行風雲四序龍章鳳彩舄奕於郊墟黄鉉紫玉磊砢於坰囿集風雲於翠箑浴甘露於朱英澤馬飛鑣山輿結轍殊徽狎至祥書竭東郭之毫累譯同歸朝冊盡南山之竹然後瑶壇備物陳帝服而展皇儀石室疇庸登太山而小天下功弘事畢狹廣宙而三遷風舉雲揺歴神都而一憇考遺基於汶上稽故典於淹中光總章之瑞紀嗣乾封之寶曆大矣哉昇中作睿握四海而爲尊則大斯模肇三宫而配永憑太室而髙視靈壇八百坐明堂而恭巳諸矦一萬時既貞矣襄城辭訪道之遊功既成矣玄圃頓尋仙之駕繇是南宫奏議和玄禁而成章西土謳歌指皇輿而佇眷咸以珍臺靚穆陽靈開避暑之宫清序鈞調景福制追涼之殿然則髙棟㴱宇威神之大節也順氣發生巡遊之大功也况乎石城金室偏興井鬼之區珠藪瑶池宛在秦豳之境應雷軿而出豫蒼帝其時面炎馭而思和朱明不遠雖途吟野忭黎元忻望幸之符而屈已從人天子下勞謙之詔候離局而從宴尚惕三危清近縣而移鑾猶詳再駕以爲三十六所帝劉非舜禹之心四十二宫全趙異成康之曆詠荆臺而夕厲思蒲坂而晨凝方奉後天之期俯順觀風之請萬靈禔祉三辰合慶姬文考筮容成奏日千旌鳳轉儼鏤象而星陳萬騎龍嘶伐靈鼉而曉胤靜帷宫於緑野肅帳殿於黄街奔攙搶而走陸梁陳浮靈而候明月前驅電竦下列缺於騰鞭後乗雷驚起豐隆於驟轂瓊戈晝轉太陽疲轉日之鋒玉劍宵翻懸象睹衝星之氣天旋霧散岳運川迴林兵䕶野方神啟路黄麾紫葢襍精氣而西浮雲動神行背封巒而右指吐霧馳風以臻夫九成宫禮也爾時峰横地乳景戴天麋分閬井而圖基䕃秦星而耀阯靈墟寶藏代興汧雍之間峻阜長岑疊鎮岐梁之域丹溪碧洞吐納虹霓偃柏叢篁騰遷雨霧獲秦餘於故兆地擬林光訪周舊於遺風山連水滸前趨劒棧玉壘千尋傍望斗城金墉萬仞架陰丘而北走境瞰鄜祠分沓嶂而西馳塗交隴坂仙都密邇猶連上苑之扃靈宫巋然直透崇岡之曲即礄基於磵道利在斯干固拱木於虞衡規同匪日彌峰跨谷層城萬轉歴險乗危迴廊四注山祇盡石出徼道而終年風伯贏糧半長途而中宿架千樓而㮹極爛若神扶羅萬戸而窺天巍如化立離堂早照皦日籠光於綺寮合殿宵㴱歸雲納影於重廡珉房砥室畵栱相望緑岫紅巖雕櫳間出玄熊蚺䗊俯棟宇而危心青鳥歸飛仰靈軒而墜翼轉飛檐於秀崿上出重冥䕃反宇於迴谿下臨無地紅葩紫菂垂倒井而披文金鎖銀鋪接重扃而炫色儼鈎陳於漢陌泰階非逺設陛㦸於煙庄仙梯可陟華璫璧散掛明月於崇朝密網珠連落奔星於已曙丹樑發秀彩沓虹文皓璧凝鮮光含蜃氣銅龍對霤接飛泉而瀑流鐵鳳連甍遡還颷而佇立雖南躔綂序北室開榮凛勁氣於叢楹起淒風於洞宂踆烏失轡出澗戸而無光金兎低輪下山扉而變色陰庭阻夏祝融無竊據之因䆳屋乗春顓頊定忘歸之䇿飛亷扣響赴北闕而神寒屏翳收津跼南端而股戰蒼蒼八桂白露爲霜落落千松玄陰昧景金人列陛來危砌而思裘玉女窺牕伏增巒而請纊陽秋代駕不凋仙圃之華天地爲罏未解幽陵之凍至若氣清乾歩景霽山維栖翠藹於崇榮列朱霞於複榭瓊枝累道移綴文㮰碧樹周阿光揺鏤檻靜簾帷而洞啟穆羽相和肅坻堮而天臨纎塵不動宸儀有晬蓬萊與城闕俱榮羣后多歡薜蘿共簮裾合賞巖花落砌綴龍扆而成文嶂葉交軒拂鸞旗而追影罏峰轉藹香傳玉几之風石瀨鳴湍響入銅壺之水乃有陵陽駕鶴奉丹墀而稱臣子晉吟鸞下青蒲而謁帝箕精失耀傅說恭命於東廂昴宿低􅉭庭堅奉職於西序三臺九署雲端極目霓裳風䯻闕下相尋張良臥疾攀赤松而有地綺季來朝歌紫芝而忘返若夫功成旰食道濟宵衣漢宫追聽覽之餘堯殿得巡來之隙霞登月憇光睿幸於彤闈玉振金聲藻宸章於翠掖洛陽才子承閒盡宣室之談蜀郡詞人還奏動甘泉之賦復有軒庭十四出桂閫而乘茵永巷三千望椒塗而奉幣翊鸞臺之廣宴扈鴛砌之仙遊羅綺芳兮四面春環珮鳴兮九重暮風閨夕敞攜少女於歌筵月幌宵朧下嫦娥於舞席玄房竢宴雲姬辭豹尾之歡紺幄承顔星媛入魚鱗之戲若乃屯營櫛比對閤道而斜趨廨寺棊分混文昌而外屬周朝瑞鸑聲叅叶律之宫陳寶鳴雞響襍司晨之序名都廣㑹閭閻萬室帝籞仙垣亭臯千里山村野塾家連菌草之園谷飲川居戸有桃符之水故夫恩加草樹囿原澤而無私道被翔行苑山川而不禁每至旻天戒序髙風嘯律虞官獻秋獮之儀司馬奉梁騶之典將軍布卒略玄灞而東馳都尉闗營繞黄山而北睇於是逢䝉列階蚩尤竝轂材官發射期門走仞仗玄麾而直指鶚視千羣奮朱鬛而横行龍驤萬計層旗廣斾出宇宙而三驅疊鼔鳴鐘連雷霆而一呼前旌逐日夸父斷黄河之流後騎超山共伯挾崑崙之柱近陵吐熖縟奔電於長鋒灌莽生塵隕飛霜於勁鏃合戈鋋而照地猛兕知窮振罟網而籠天騰龍失據崩林磔石毛羣無挺險之資䕃澤風山羽族落垂雲之影長圍躞蹀得駿馬於秦坰大輅徜徉載飛熊於渭浦然後還師振旅考事陳功皮軒按節牙璋復路視餘生於大野誓廣挍於長陬班腥於嶻嶭之墟有蜡於長揚之舘命奔蜂而舉釂火照甘泉總輕騎而行庖雲驚上路聲兼萬籥歌鐘空廣樂之庭禮被三雍玉帛盡塗山之㑹龍胎鳳卵入禹膳而調芳石乳瓊漿委堯樽而湛色恩霑下帛宴液仙宫雖大夫思濯鷁之歡而天子可迴鸞之奏然後拜釐清廟考徳齋宫用玄工而不有宅太虛而無迹動崇易簡規萬祀而化黄金道貫幽明徵百靈而響丹甑得玄珠於舜海尚驚氷危朗天鏡於堯儀猶勤日昃䖍恭上帝東朝懸待諫之旌清問下人南面聴登聞之鼓則有郊童俟蹕敢讓天師野老排閽唯歌帝力風行比屋忠臣收折檻之謀化溢康衢良使息埋輪之請設神規而動俗庶績其凝握元符而發祉殊方合應華胥已泰濟羣生於不死之庭閭閻可觀致仙曆於無窮之境蕩蕩乎發育萬物而顯諸仁洋洋乎包舉六氣而藏諸用均兩儀而得一恥三皇而不四者矣臣勃東臯賤節北阜幽姿常叨召見之恩驟玷明敡之列書生謁相望闕推輪下客遊梁榮叅賜帛終童立志空投函谷之繻馬令同時未給尚書之筆雖玄機妙鍵已寂兆於忘言而詠徳陳功請追聲於匪頌其詞曰九門浩蕩三山超忽帝坐金房仙成玉闕浮丹麗紫棲霞冠月真匠難徵虛談易越一其旋窺鳳紀極睇龍墳層巢化沒上棟爻分茅宫蔽雨松殿來雲猶迷匪陋尚缺斯文二其道倫明一風遷繼五禮讃三宮詩歌百堵黄圖未洽紫庭無輔局促墉垣逡巡度矩三其盛衰環襲沖盈舛鶩璿宇夏關瑶扃殷樹奢窮地絡毒流天歩相日遄奔尋雲速仆四其災延六國運逼三川分雄競侈禮僣圖全飛甍月徑列廡霞阡乾谿敗楚碣石亾燕五其阿房秦搆文軒五里建章漢立仙闥萬戺詭代齊涇違天縱已望夷有亹甘泉不祀六其宛郊嗣籙譙鄉警衆蜀跨梁岷吳吞楚夢相宜裁軌崇楹累棟雲闕同華泉臺罕共七其晉圖終否胡風肆極霧黷丹圍塵埋紫域皇階不守帝庭無色帳殿相臨氊牆間飾八其南承有宋北洎亾隋功慚戸牗守在城池樓船水覘車陣山窺吳庭再毁代鼎三移九其火徳初融江陽振旅奄收淮船遂朝吳渚象錯驕秦龍舟壞楚雄圖乃溢傾宫不處十其海岳呈華風雷寫慶剪諸戎首光我靈命紫氣雲蒸黄星月映轥商爲業遵唐啟聖一其十景閟丹繩祥抽翠籙格天垂範模神騖躅朱極重光黄離繼旭道清金鏡時和玉燭二其十徵規鳳閫毓訓鸞闈桐宫宿列桂邸霞飛台精變道岳耀裁幾朝盈振鷺境比馴翬三其十武韜弓矢文經歩驟爽鳩議獄龍師掌奏玉帛華夷提封宇宙譯書歲欵祥圖月湊四其十帝功得一乾元用九鏤玉天齊塗金社首神京四邑明堂八牖爕而可大爲而不有五其十璿宫望幸幸封佇悦伺隟披圖乗時徙轍赤駵俟駕蒼虬按節月車宵移星闈曉列六其十方神䕶野岳將清塗迴麾嶠路逗蹕山樞千靈電騖萬辟風趨釣臺有問峒岫無虞七其十五城分委雙巒抗影畫栱彌峰雕甍亘嶺煙閨夜謐雲房晝靜竹殿栖寒松軒祕景八其十紫庭晨御彤闈早闢天子凝旒辟公奉璧薜蘿齊致簮裾混迹仙鶴隨輪靈鳬墜舄九其十風扃濬敞震廓藻䆳玉網星開金鋪月墜山樓獸矯雲臺鳥次複嶂披丹迴流轉翠十其二仇夷聖宅姑射神心樂翔丹鳳使引青禽羲壇葉暗禹洞花㴱沼分瑶水花跨珠林十一其二順時宣節分戎講將星騎朝飛雲羅夕張寶雞獲祉非熊入貺駕掩岐蒐禮髙秦望十二其二酆庭未逺塗山有戮襄野迷軒清都宥穆罕夷乾歩徒豐帝屋光總大猷允歸天禄十三其二命官垂訓靈臺韻雅功映寰中頌流天下皇圖已泰鴻筆難假帝有力焉惡非能者十四其二贊平臺秘略贊孝行第一受訓椒殿承輝桂閾資父事君自家刑國孝惟忠本忠隨孝得履薄臨深惟王之則貞修第二列藩好德淸修互起峻局剛情中孚素履道契玄極芳圖青史爲善不同同歸于美藝文第三榮分上邱業盛文塲爭開寶札競聳雕章氣淩雲漢字挾風霜後之來者其在君王忠武第四善政第五榮開社稷業照旂常是恢藩化或固朝章功成道洽身歿名揚唯忠與孝千載生光尊師第六奔霆易駭巨壑難遊主明臣直撫類相求道行言用性逸神休吁嗟盛軌從善如流褒客第七功惟應物業貴逢時君王樂道上客含詞情起月肆興入煙達文林辨囿何代無之幼俊第八列后雲騰英童霧躍年妙識遠理豐詞約寵照玉旗文先銅爵勿疎小善方恢大略規諷第九寵榮有極恭沖是守軸碎羣毛金銷衆口全忠衛國順時藏垢周之宗盟異姓爲後愼終第十具覽藩猷遐窺國篆罕兼百行多褒一善履忠存性愼終思遠生榮死哀身沒名顯
