front:
  text: 王子安集卷之一
  hash: sha256:74dfea360fdf55536d7dfbe8aa0d805ce12d32f3381b3178d6e6838a2670ba88
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0003_SBCK_001-1a}
body:
  text: 唐龍門王勃子安著明閩漳張爕紹和纂賦春思賦并序咸亨二年余春秋二十有二旅寓巴蜀浮遊嵗序殷憂明時坎􅇄聖代九隴縣令河東桺太易英達君子也僕從遊焉髙談胸懷頗􅂥憤懣于時春也風光依然古人云風景不􅊋舉目有山河之異不其悲乎僕不才耿介之士也竊禀宇宙獨用之心受天地不平之氣雖弱植一介窮途千里未嘗下情於公侯屈色於流俗凛然金石自匹猶不能忘情於春則知春之所及遠矣春之所感湥矣此僕所以撫窮賤而惜光陰懷功名而悲嵗月也豈徒幽宫狹路陌上桑間而已哉屈平有言目極千里傷春心因作春思賦幾乎以極春之所至析心之去就云爾若夫年臨九域韶光四極解宇宙之嚴氣起亭臯之春色况風景兮同序復江山之異國感大運之虛盈見長河之紆直蜀川風􅃸隔秦川今年節物異常年霜前桺葉銜霜翠雪裏梅花犯雪妍霜前雪裏知春早看桺看梅覺春好思萬里之佳期憶三秦之遠道淡蕩春色悠揚懷抱野何樹而無花水何堤而無草於是僕本浪人平生自淪懷書去洛抱劒辭秦惜良㑹之遒邁厭他鄉之苦辛忽逢邊􅀱攺遙憶帝鄉春帝鄉迢遞關河裏神臯欲暮風煙起黃山半入上林園􅀇㶚斜分曲江水玉臺金闕紛相望千門萬户遥相似昭陽殿裏報春歸未央臺上看春暉水精却掛鴛鴦幔雲母斜開翡翠幃競道西園梅色淺爭知北闕桺陰稀歛態調歌扇􅅆身正舞衣銀􅅙吐􅁝猶未暖金燕銜泥試學飛妾本幽閨學歌舞寧知漢代多廵撫前年齋祭謁甘泉今嵗笙簫祠后土桃花萬騎喧長薄蘭葉千旗照平浦見原野之芳春憶山河之䆳古長安路狹遶長安公子春來不厭看杏葉裝金轡蒲萄縷玉鞍聳葢臨平樂􅅆笳出上蘭上蘭經鄠杜揮鞭日將暮白馬新臨御溝道靑牛近出章臺路章臺接建章垂桺復垂楊草開馳馬埓花滿闘雞塲􅀯鄰少婦多妖婉北里王孫駐行幰乍怪前春節􅀱遲預道今年寒食晩傷紫陌之春度惜靑樓之望遠紫陌靑樓照月􅂠珠帷黼帳七香車蛾睂畵來應幾様蟬􅁂梳時半欲斜恨雕鞍之届晩痛銀箭之更賒行行避葉歩歩看花因狂夫之蕩子成賤妾之倡家狂夫去去無窮已賤妾春眠春未起自有蘭閨數十重安知榆塞三千里榆塞連延玉關側雲間沉沉不可識葱山隱隱金河北霧􅂻蒼蒼幾重䵥忽有驛騎出幽并傳道春衣萬里程龍沙春草遍瀚海春雲生疎勒井泉寒尚竭燕山烽火夜應明聞道河源路遠遠誰教夫壻苦行行君行塞外多霜露爲想春臺起煙霧遊絲空罥合歡枝落花自遶相思樹春望年年絶幽閨離緒切春色朝朝異邊廷羽書至都䕶新封萬里矦將軍稍定三邊地長斾猶銜掃雲色寶刀尚擁干星氣昨夜祁連驛使還征夫猶在鴈門關君度山川成白首應知嵗序歇紅顔紅顔一别成胡越夫婿連延限城闕羗笛橫吹隴路風戎衣直照關山月春色徒盈望春悲殊未歇復聞天子幸關東馳道煙塵萬里紅析羽揺初日繁笳思曉風後騎猶分長樂館前旌已映洛陽宮洛陽宮城紛合㳫離房别殿花周匝河陽别舍抵長河丹輪紺幰相經過戚里繁珠翠中閨盛綺羅鳳移金谷舞鶯引石城歌向夕天津洛橋暮爭驅紫燕黃牛度閒居伊水園舊宅邙山路武子新布金錢埒季倫欲碎􅃢瑚樹復道西墉春霧寡更值􅀯津春望寫入金市而乗羊出銅街而試馬葉抱露而爭密花牽風而亂下錦障縈山羅幃照野司空令尹之博物二陸三張之文雅新年柏葉之樽上巳蘭英之斚春來併是春何啻兩違秦忽逢江外客復憶江􅀯春羅衣乗北渚錦袖出東隣江邊小婦無形迹特怨狂夫事行役鳳凰山上花無數鸚鵡洲中草如積春江澹容與春期無處所春水春魚樂春汀春鴈舉君道玉門關何如金陵渚爲問逐春人年光幾處新何年春不至何地不宜春亦有當春逢遠客亦有當春别故人風物雖同候悲歡各異倫歸去春山恣閑放蕙畹蘭臯行可望何爲悠悠坐惆悵比來作客住臨卭春風春日自相逢石鏡巖前花屢密玉輪江上葉頻濃髙平㶚㟁三千里少道梁山一萬重自有春花煎别思無勞春鏡照愁容盛年耿耿辭鄉國長路遙遙不可極形隨朗月驟東西思逐浮雲幾􅀯北春蝶參差命儔侶春鶯綿蠻思羽翼余復何爲此方春長歎息㑹當一舉絶風塵翠葢朱軒臨上春朝昇玉署調天紀夕憇金閨奉帝綸長卿未達終希達曲逆長貧豈剰貧年年送春應未盡一旦逢春自有人七夕賦若夫乾靈鵲讖之端地輔龍驂之始憑紫都而受曆按􅀇丘而命紀鳳毛鍾桂閫之祥麟角燦椒庭之祉馳朱軒於九域振黃麾於萬里抗芝館而星羅擢蘭宫而霞起則有皇慈霧洽聖渥天浮庭分玉禁邸瞰金樓剪鳬洲於細桺披鶴籞於長楸啟魚鈴而分帝術授虹璧而控神州擁黃山於石磴􅂥􅀇灞於銅溝列瑶牕而送燠闢銀􅖑而迎秋君王乃排靑幌揺朱舄戒鵷輿靜鸞掖繞露廊而轉歩傃雲阡而縱跡嘯陳客於金牀命淮仙於桂席翔翠䍐於金甸迎吹簫於鳳驛佇靈匹於星期眷神姿於月夕于時玉繩湛色金漢餘光煙淒碧樹露濕銀塘視蓮潭之變彩見松院之生涼引驚蟬於寶瑟宿蘭燕於瑶筐綠臺兮千仞赬樓兮百常拂花筵而慘惻披葉序而徜徉結遥情於漢陌飛永睇於霞莊想佳人兮如在怨靈歡兮未揚促遥悲於四運味遺歌於七襄於是虬簷晚静魚扄夜飾􅁯帝子之光􅂠下君王之顏色握犀管展魚箋顧執事招仲宣仲宣跪而稱曰臣聞九變無津三靈有作布元氣於浩蕩運太虛於寥廓辨河鼓於西堧降天孫於東堮循五緯而淸黃道正三衡而澄紫落海人支石之機江女穿針之閣鄙塵情於春念擬仙契於秋諾河光淸地紀山氣歛天標霜凝碧宙水􅉷丹霄耀麟軒於霧術褰羽斾於星橋徴赤螭而架渚漾靑翰而乗潮停翠梭兮巻霜縠引鴛杼兮割氷綃舉黃花而乗月駕籠黛葉而卷雲翹撫今情而恨促指來渚而傷遥旣而丹軒黃萬一作拱紫房朱千一作籥仙御逶遲靈徒擾弱風驚雨驟煙廻電爍媧皇召巨野之龍莊􅅱命雕陵之鵲駐麟駕披鸞幕奏雲和汎霞酌碧虬玉室之􅄿白兎銀臺之藥荷葉頳鮫芙蓉靑雀上元錦書傳寶字王母瓊箱薦金約綵襻魚頭比目縫香緘燕尾同心縛羅帳五花懸珉砌百枝然下芸幬而暱枕弛蘭服而交筵託新歡而密勿懷往眷而潺湲於是羈鸞切鏡旅鶴驚絃悲侵玉􅂂念起金鈿儼歸裝而容曵整還葢而遷延洞庭波兮秋水急關山晦兮夕露連謂河漢之無浪似參商之永年君王乃背彤砌陟􅀇室沖想自閒神情如逸痛靈妃之稀偶嘉沉思之可畢荆􅃩齊升燕佳竝出金聲玉韻蕙心蘭質珠櫳綺檻北風臺繡户雕牕􅀯向開響曵紅雲歌面近香隨白雪舞腰來掩淸琴而獨進淩絳樹而輕廻盧女黄金之椀張家碧玉之杯奉君王於終夕夫何怨於良媒俄而月還西漢霞臨東沼鳬氏鳴秋雞人唱曉玉關控鶴瓊林飛鳥君王乃馭風殿而長懷俯雲臺而自矯矜雅範而霜髙穆沖衿而霞眇迎十客召三英香涵蔗酎吹肅蘭旌娃館疎兮綠草積歡房寂兮紫苔生聳詞源於月徑披翰藪於雲扄方絶元凱而髙視豈與梁楚而駢聲九成宮東臺山池賦并序九成宮東臺地接閑曠面山臨水爾其松峰桂壑紅泉碧磴金石千聲雲霞萬色侍郎張公雅思沉鬱永懷梓匠式侔仙造聿構靈􅒡纎波成止水之源拳石儼干霄之狀雖流波覆簣俯籍人機而布葉攅花渺同天㑹僕因暇日濫奉淸埃敢抽􅀯畒之才􅊃敘東山之事云爾若夫金臺妙境玉署仙居酌丹池墀一作之曉暇候靑禁之宵餘驟沖情於月道飛峻賞於煙墟指山楹而思逸懷水鏡而神虛旣而仰瞻赬嶠􅅖窺黛壑複嶂煙廻攅溪霧錯偉沉用之兼濟想神功之可作規疊巘于盤龍憲飛泉于挂鶴覆簣而縈巖磴浮芥而環川堮採拳石於瑶濵搴纎珠於綺薄萍徙楚江之蔕花轉崑墟之蕚岫藴玉而虹驚浦涵珠而星落美仁智之同歸信髙㴱之縱託爾其危岑漏景曲渚畱寒髙松偃鶴淸篠鳴鸞被蘭丘而結珮照蓮服而披冠激㘭堂於别漵引膚寸於危巒若乃嶺横雞秀波連鳳液花鳥縈紅蘋魚漾碧綠衣􅀇袵赬鱗翠額在林藪而同歡望江湖而齊適及夫景沉西崿月下東濱峰㴱夜乆潭靜秋新荷抽水葢薜引山茵雪芝獻液露菊傾津嗣􅀯商之逸興有東海之遐賓保林泉而肆賞混簮紱而同塵何濯纓之有地如攀桂之無因遊廟山賦并序􅀇武山西有廟山東有道君廟葢幽人之别府也長蘿巨樹梢翳雲日王子馭風而遊泠然而喜盖懷霄漢之舉而􅁯城闕之戀矣因欲攀􅇝崕於煙道邀羨門於天路仙師不存壯志徒爾俄而泉石移景秋陰方積松柏羣吟悲聲四起背鄉關者無復向時之榮焉嗚呼有其志無其時則知林泉有窮路之哭嗟一作煙霞多後時之歎不其悲乎遂作賦曰陟彼山阿積石峩峩亭臯千里傷如之何啟松崖之密蔭攀桂岊之崇柯隔浮埃於地絡披顥氣於天羅爾其綠巖分徑蒼岑􅍟室菌軒丹絢芝塲翠密俯泉石之淸泠臨風飇之瑟䫻仰紺臺而􅂝手望􅀇都而容膝於是躡霞岡於玉砌歩雲岊於金壇懷妙童與眞女想靑螭及碧鸞情恍恍而將逸心迥迥而未安見丹房之晩晦知紫洞之宵寒旣而露昏千嶂煙浮四野恨流俗以情多痛飛仙之術寡驅逸思於方外局髙情於天下使蓬瀛可得而宅焉何必懷於此都也亂曰巳矣哉吾誰欺林壑逢地煙霞失時託宇宙兮無日俟鸞虬兮未期他鄉山谷祗令人悲寒梧棲鳳賦鳳兮鳳兮來何所圖出應明主言棲髙梧梧則嶧陽之珍木鳳則丹穴之靈雛理符有契誰言則􅀌遊必有方駭哂一作􅀯飛之驚鵲音能中吕嗟入夜之啼烏况其靈光蕭散節物淒淸疎葉半殞髙歌和鳴鳥也將託其宿止人也焉知乎此情月照􅀌影風傳暮聲將振耀其五色俟蕭韶之九成九成則那率舞而下懐彼衆㑹罔知淳化雖璧沼可飲更能適於醴泉雖瓊林可棲復想巡於竹榭念是欲往敢􅁯晝夜苟安安而能遷則思思其不暇故當披拂寒梧翻然一􅀤自此西序言投北闕若用之銜詔冀宣命於軒堦若使之遊池庶承恩於嵗月可謂擇木而俟處卜居而後歇豈徒比跡於四靈常栖栖而没没江曲􅀌鳬賦并序梓州之東􅀯涪江之所合有潭焉周數十歩靑壁絕地綠波澄天常有􅀌鳬棲蕩其側飛沉翻唼而天性不違嗟乎宇宙之容我多矣造化之資我厚矣何必處􅂠池之内而求稻粱之恩哉遂作賦曰靈鳳翔兮千仞大鵬飛兮六月雖憑力而易舉終􅀱時而難􅀤不如㴱潭之鳥焉順歸潮而出没迹已存於江漢心非繫於城闕吮紅藻翻碧蓮刷霧露棲雲煙迫之則隱馴之則前去就無失沉浮自然爾乃􅁯機絕慮懷聲弄影乗駭浪而神驚漾澄瀾而􅃐靜恥園雞之戀促悲塞鴻之赴永知動息而多方屢㳂􅋡而自省故其獨泛單宿全眞遠致反覆幽溪淹畱勝地傷雲鴈之嬰繳懼泉魚之受餌甘辭稻粱之惠焉而全飲啄之志也馴鳶賦海上兮雲中靑城兮綘宮金山之斷鶴玉塞之驚鴻謂江湖之漲不足䀨謂宇宙之路不足窮終銜石矢坐觸金籠聲酸夕露影怨秋風巳矣哉何氣髙而望闊卒神瘁而智癢徒鶩迹於仙遊竟纒機於俗網未若兹禽猶融泛想慚丹丘之麗質謝靑田之逸響與道浮沉因時俯仰去非内懼馴非外奬夫勁翮揮風雄姿觸霧力制煙道神周天歩鬱霄漢之􅀪圖受園亭之近顧質雖滯於城闕䇿巳成於雲路陳平􅀒郭之居韓信昌平之寓似達人之用晦混塵蒙而自託類君子之含道處蓬蒿而不怍悲授餌之徒懸痛開􅁌之自落故爾放懷於誕暢此寄心於寥廓
