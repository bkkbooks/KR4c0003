  text: 王子安集卷之十三
  hash: sha256:697ff1329c6ee88d7083638108094cc65731addd0407c2637addb09abe81343c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0003_SBCK_013-1a}
body:
  text: 唐龍門王勃子安著明閩漳張爕紹和纂碑益州夫子廟碑述夫帝車南指遯七曜松中階􅂠葢西臨藏五雲於太甲雖復星辰蕩越三元之􅁤躅可尋雷雨沸騰六氣之經綸有序然則撫銅渾而觀變化則萬􅁚之動不足多也握瑤鏡而臨事業則萬機之湊不足大也故知功有所服􅀛龍不能謝鱗介之尊器有所歸江漢不能竊朝宗之柄是以朱陽登而九有照紫泉淸而萬物覩粤若皇靈草昧風驪受河洛之圖帝􅁚權輿雲鳯錫乾坤之瑞高辛堯舜氏没大夏殷周氏作達其變遂成天下之文極其􅁆遂定天下之􅁚衣冠度律隨鼎器而重光玉帛謳歌反宗禋而大備洎乎三川失御九服蒙塵俎豆䘮而王澤竭鐘鼔衰而頌聲寢邵陵高會諸矦輕漢水之威踐士同盟天子窘河陽之召三徽制度乘戰道而橫流千載英􅂠與王風而掃地大業不可以終䘮􅂜倫不可以遂絕繇是山河朕兆素王開受命之符天地氤氲玄聖舉乘時之䇿興九圍之廢典振六合之頽綱有道存焉斯文備矣夫子姓孔氏諱丘字仲尼魯國鄒人也帝天乙之靈苗宋微子之洪緒自玄禽翦夏浮寶玉於南巢白馬朝周載旌旗於北面五遷神器琮璜高列帝之榮三命雄圖鐘鼎冠承家之禮商丘誕睿下屬於防山泗水載靈遙馳於汶上禮樂繇其委輸人儀所以來蘇排禍亂而搆乾元掃荒屯而樹眞宰聖人之大業也若乃承百王之丕運摠千聖之殊姿人靈昭有作之期嶽瀆降非常之表珠衡玉斗徵象緯於天經贊據龍蹲集風雲於地紀亦猶三階瞰月恒星知太紫之宫八柱衡霄羣嶺辨中黃之宅聖人之至象也若乃順時而動用晦而明紆聖哲於常師混波流於下問太陽亭午􅀵爝火於丹衡滄浪浮天控涓涔於翠渚西周捧袂仙公畱紫氣之書東海摳衣郯子敘靑雲之袂接輿非聖詢去就於狂歌童子何知屈炎涼於詭問聖人之降跡也若乃叅神揆訓錄道和倪辱太白於中都絆乘黄於下邑湛無爲之跡而衆務同并馳不言之化而羣方取則雖復霓旌羽斾齊人張夾谷之威八佾三雍桓氏逼公宮之制洎乎􅊗階而進宣武備而斬俳優推義而行肅刑書而誅正卯用能使四方知罪爭歸舊好之田三家變色願執陪臣之禮聖人之成務也若乃乘機動用歷聘栖遑神經幽顯志大宇宙東西南北推心於􅁀亂之朝恭儉溫良授手於危亾之國道之將行也命道之將廢也命歸齊去魯發浩歎於衰周厄宋圍陳奏悲歌於下蔡聖人之救時也若乃筐篚六藝笙簧五典拆旋洙泗之間探賾唐虞之際三千弟子攀睿化而升堂七十門人奉洪規而入室從周定禮憲章知損益之源反魯裁詩雅頌得絃歌之首備物而存道下學而上逹援神敘敎降赤製於南宮運斗陳經動玄符於北洛聖人之立敎也若乃觀􅁚設敎法三百八十四爻四十有九窮神知化應萬一千五百五十有五成變化而行鬼神觀陰陽而倚天地以鼓天下之動以定天下之疑索衆妙於重玄纂羣微於太素聖人之贊易也若乃靈襟不測睿視無涯石砮昭集隼之庭土缶驗羵羊之井嵇山南望識皓骨於封禺蠡澤東浮考丹萍於夢渚麟圖鑑遠金編題佐漢之符鳯德鈎㴱玉策筮亾秦之兆聖人之觀化也時義遠矣能事畢矣然後拂衣方外脫屣人間奠楹興夕夢之災負杖起晨歌之跡撓虹梁於大厦物莫能宗摧日觀於魯丘吾將安仰明均兩矅不能遷代謝之期序合四時不能革盈虛之數適來夫子時也適去夫子順也爲而不有用九五而長驅成而勿㞐撫雲霓而髙視聖人之應化也自四敎遠而微言絕十哲䘮而大義乖九師爭大易之門五傳列春秋之輻六體分於楚晉四始派於齊韓淹中之妙鍵不追稷下之高風代起百家騰躍攀戸牖而同歸萬匹驅馳仰陶鈞而共貫猶使􅁝簧金石長懸闕里之堂荆􅁄蓬蒿不入昌平之墓聖人之遺風也遵揚十聖光被六虛乘素履而保安貞垂黃裳而獲元吉故能貴而無位履端於太極之初高而無名布政於皇王之首千秋所不能易百代所不能移萬乘資以興衰四海繇其輕重雖復質文交映瞻禴祀而長存金火遞遷奉琴書而㒺絕葢易日觀乎人文以化成天下又云聖人以神道設敎而萬物服焉豈古之聰明睿智神武而不殺者夫國家襲宇宙之淳精據明靈之寶位高祖武皇帝以黃旗問罪杖金䇿以勞􅂠夷太宗文皇帝以朱翟承天穆玉衡而正區宇皇上宣祖宗之累洽奉文武之重光稽曆數而坐明堂陳禮容而謁太廟八神齊饗佇旒太史之宮六辨同和駐蹕􅂠胥之野文物隱地聲名動天樂繁九俗禮盛三古冠帶混并之所書􅁤八紘閭閻兼匝之鄕煙火四極竭河追日夸父力盡於楹間越海陵山竪亥塗窮於廡下薰腴廣被景貺濳周乾􅁚著而常文淸坤靈滋而衆寶用溢金膏於紫洞雨露均􅂠栖玉燭於玄都風雷順􅁤丹蓂翠􅌲藻繪軒庭鳯彩龍姿激揚池御殊徵􅆄蠁不召而自至茂祉昭彰無幽而不洽雖復帝臣南面䧏衢室而無爲岱畎東臨陟名山而有事靈命不可以辭也大典不可以推也繇是六戎宵警横紫殿而摐金五挍晨驅蹴玄雲而噴玉星羅海運嶽鎭川渟登碧墠而會神祗御玄壇而禮天地金箱玉册益睿算於無疆玳撿銀繩署靈機於不竭功旣成矣道旣貞矣歷先王之舊國懷列聖之遺塵翔赤驥而下雲亭吟翠虬而望鄒魯泗濱休駕杳疑汾水之陽尼岫凝鑾暫似峒山之典乃下詔日可追贈太師託鹽梅於異代鼎路生光寄舟楫於同時泉塗改照咸亨元年又下詔日宣尼有縱自天禮膺上哲合兩儀之簡易爲億載之師表顧唯寢廟義在欽崇如聞諸州縣孔子廟堂及學館有破壞并向來未造生徒無肄業之所先師闕奠祭之儀乆致飄零㴱非敬本宜令諸州縣官司速加營葺九隴縣學廟堂者大唐龍朔三年鄕人之所建也爾其州分化鳥境狥罇鴟縈錦室於中區託銅梁於古地玉輪斜界神龍蟠沮澤之雲石鏡遙臨寶牒秘禺山之影天帝會昌之國上照乾維英靈秀出之鄕􅅖淸地絡庠序繇其糾合纓弁所以㑹同文翁之景化不渝智士之風猷自遠於是􅀟川舊老攀帝奬而翹心三蜀名儒想成均而變色探周規於舊宅詢漢制於成都開基於四㑹之􅄤授矩於三農之􅂩土階無級就擊壤於新歡茅茨不剪易層巢於故事莊壇文杏卽架椽欒夾谷幽蘭爰䟽戸牖儀形莞爾似聞沂水之歌列侍誾如若奉農山之對緇帷曉闢横紐帶於西河綘帳宵懸聚靑衿於北海雖秋禮冬詩之化以洽於齊人而宣風觀俗之規實歸於上宰銀靑光祿大夫譙國公諱崇義大武皇帝之支孫河間大王之長子高秋九月振玉贙於唐丘寶算千齡躍璇虯於大渚我國家靈命東朝抗裘冕之尊宗子維城南面襲軒裳之重折玄元之胤緒擁朱虛之祿位拜玉節於秦京輝金璋於蜀郡玄機應物濳銷水怪之災丹筆申寃俯絕山精之訟魏文侯之擁篲道在而兼尊董相國之垂帷風行而俗易司馬宇文公諱純河南洛陽人也皇根帝緒列五鼎於三朝靑鎖丹梯跨千尋於十紀仲舉澄淸之轡未極夷塗士元􅀸相之材先登上佐氷壺精鑒遙淸玉壘之郊霜鏡懸明下映金城之域縣令桺公諱明字太易河東人也梁岳之英長河之靈沐雲漢之精粹荷天衢之元亨旌旗赫奕於中古珪組陸離於下葉鳯巖抽律擢層秀於龍門驪穴騰姿吐榮光於貝闕自朱􅁝就列光膺令宰之榮􅇘綬馳芬高踐郞官之右仙鳬旦舉影入銅章乳翟朝飛聲含玉軫臨卭客位自高文雅之庭彭澤賓門猶主壺觴之境曠懐足以御物長策足以服人重泉之惠訓大行單父之謳謡遂遠猶爲夏絃春誦俗化之樞機西序東膠政刑之根本上祗朝憲下奉藩維爰摉複廟之儀載闡重欄之制三門四表煥矣惟新上哲宗師肅焉如在將使圓冠方領再行鄒魯之風銳氣英聲一變賨渝之俗於是侍郞幽思摛鳳藻於瓌林丞相高材排龍姿於璧沼遺榮處士開簾詮孝悌之機頌德賢臣持節聽中和之樂其爲政也可乆其爲志也可大方當變化台極儀刑萬宇豈徒偃仰聽事風敎一同而巳哉勃幼乏逸才少有奇志虛舟獨泛乘學海之波瀾􅀡轡高謳踐詞塲之閫閾觀質文之否泰衆矣考聖賢之去就多矣自生人以來未有如夫子者也嗟乎今古代絕江湖路遠恨不得親承妙㫖攝齊於游夏之間躬奉德音攘袂於天人之際撫身名而永悼瞻棟宇而長懷嗚呼哀哉敢爲銘曰五帝旣沒三王不歸天地震動陰陽亂飛山崩海竭月缺星圍禮樂無主宗禋遂微其一大哉神聖與時􅅆薄應運而生繼天而作龍躍浩蕩鵬飛寥廓奄有人宗遂􅂽天爵其二尼山降彩泗濱騰氣志匡六合神經萬類夾谷登庸中都歷試睿情貫一玄猷絕四其三栖遑敎跡寂寞河圖違齊出宋歷楚辭吳風衰俗毀禮去朝無麟書巳卷鳳德終孤其四杳杳靈命􅃼􅃼天秩吾道難行斯文易失式宣六藝裁成四術虛往實歸外堂内室其五邈矣能仁悠哉化主力制羣辟權傾終古陸離彩燦蟬聯茅土渉海輕河登山小魯其六皇家載造神風四極撿玉題祥繩金署德聿懐聖跡同亨天則廼眷台庭爰昇袞職其七玉津同派金堤茂版智士高風文翁澤遠甿淳壤沃聲和俗愿載啟仁祠遂光儒苑其八沉沉壼奥肅肅扃除靈儀若在列配如初槐新市密杏古壇疎楹疑置奠壁似藏書其九泛泛寰中悠悠天下狥名則衆知音蓋寡碝石叅瓊迷風亂雅仲尼旣沒夫何爲者其十彭州九隴縣龍懐寺碑粤若眞元混沌抱一氣於天門象化童蒙構三靈於地戸繇是金城逆順山河假成器之因玉燭沉浮風火兆流形之蘖懸大明於日月適滯泉宮設巨浸於雲雷終迷燬宅太極所以散而爲兩􅇝颷所以吹而爲萬雖復卑高異列俱沉方内之遊坌集横流共失環中之契豈夫湼槃㴱視不背色以求眞般若長驅每乘空而得靜則知一名同出陰陽爲破道之墟萬􅁚皆空天地卽䧏魔之境莫見其俯仰不知其去就至自於太虚復歸於無物其建言立德開業成務握大柄而推造化執洪罏而誥元始四門幽闢顧非相而遲􅅆三駕晨嚴臨有爲而出頓豈不知羈􅀌長路終嬰旅泊之虞舟楫中流未釋風濤之苦將以宅心者寂虛室所以合符應物者神明鏡繇其不倦故能商榷宇宙指麾權實演羣生而非其力存庶品而非其有千巒閉景似居蓬艾之間雙闕臨空若在江湖之上其釋迦之沖用乎龍懷山者井絡之所交會岷隅之所控帶攅峰北走吐香嶂於玄霄巨壑南馳歕􅇝濤於赤㟁香城寶地左右林泉碧岫丹岑往來煙液時有法會禪師者俗姓楮氏吳郡錢塘人也金章錫美河陰傳九命之尊玉鉉乘榮江左受三台之貴地靈人傑自朝野而重光學府文宗冠南都而獨秀法師紫星降彩紅雲受氣應積善於高門契冥緣於累世果浮觴引濳圖彼㟁之功聚礫延砂卽揆爲山之業靈樞密運闢仁路而長鳴慧刅高揮斬邪關而洞照以爲㝠機體化毫髮莫滯其眞執數逐㣲乾坤不容其算於是四禪幽觀破銅堞而出無明三昧雄圖排鐵圍而泯非相法雲自在吐納龍宮賢聖不仁奔馳象域將使三千塔廟知眞實之玄津萬億幡幢入空虛之秘藏安心樂土遯影靈關以開皇元年憇于兹嶺靈墟福地巳被神功玉􅖑金繩未光朝命蜀王秀以文昭建國帝子專征仗巴服之尊名裂卭􅂽之寶命彤騑僣帝蹕萬騎於銅梁皁蓋圖王警千乘於玉宇鏡山􅀯望志狹彭渝錦水西浮恥朝江漢開實沉之壁壘嘯京叔之風塵擁􅀛堞而託􅊋方憑爵堂而傲天子威權所制勝兵數十州雄視所臨經塗五千里三英賦雪瞻秋月於梁臺八叟吟風傳朝雲於楚館思弘正法廣召名僧振錫雲趨乘杯霧合禪師括囊泉石韜跡煙霞攀紫桂而同塵守靑蓮而向晦衝颷蕩岳寜移􅃘地之靈烈火焚山不撓堅林之色王心有悟時加優禮順風拜道封山謝失􅀤淨財於廣内揆仙室於重幽因嶂爲壁憑崕列戸以開皇五年始賜額爲龍懐寺地鄰緜左遂均緜上之恩山似龍盤卽建龍懷之刹爾其崇巒經復複磵縈􅅆高丘􅂥雲長林翳日増瓊垣於下麓揆瑶構於中巖香闕神行珍臺妙立玉虯銜靄絕游氣而負蒼天金鳯連甍排烈風而瞰玄圃延綠房於疊巘上拂霞莊蔓丹闕於重磎下披泉戸陽開陰闔變霜露於旋􅅆蠖動螟飛起雷霆於指顧玉堂朝亘影襲長虹珠殿宵浮光含列􅀫禪師殁後爰有孝恭法師智開法師弘嚮法師寶積闍梨四上人者竝禪師之上足而法門之領袖也五明衢路控引情宮八解源流朝宗性海其㴱爲寶投白玉於嶄巖無礙居眞得玄珠於㒺􅁚住持眞界栖息妙塗俱探寂滅之源各證菩提之域雖業定人境照巳極於無方而道寄生成功遂覃於有相演中乘之奥義增上棟之宏規萬栱不騫千門有闊俄而帝隋大去皇家小往天地閉而賢人隱雲雷屯而巨寶衰毒龍横霧四天沉暗逆之悲醉象驅風三界溺崩離之酷上人慧機幽晤定識濳融知佛日之恒明審王風之尚靜芝歌商岳揆雞嶺而同歸茅藉磻溪與猴江而共致遯俗無悶因時有待洎丹陵啟秩赤縣居尊迦維授手波旬革面十千天子新朝帝釋之宮八萬仙人始向毗耶之國一音演而荒景服三聖澄而禮樂備繇是巴方舊彥蜀城遺老仰慈門而知戸牖升福田而喜畊鑿雕鞍繡轄瞻鷰崿而馳魂黼帶綖裾指鸚林而鶩欵寶瓶宵注潤浹堯旬玉麈晨麾風調舜曆咸以爲假沉其性迷生安視聽之功動亂其心窮子失肌膚之戀江連巫峽始絆心猿山對禺同終維意馬貞觀年中積闍梨等廼宣昭遺址發揮精舍容成挍曆揆日用於天經􅀠首陳章算神功於地籙廻廊􅌄窱自吐風颷列榭崢嶸坐含雲雨圖碣宮之妙質儼廬舍之眞容寶珠周映銀龕備色逸多垂足似臨兠率之天師利分身若赴維摩之境靈仙可接藻繪無施眞應難微雕䥴有寄若乃巡積岨歷森沉天花照而高月落地籟驚而幽泉湧紫蘭花徑香侵柏葉之罏綠草紋茵影入芙蓉之座眞童鳯䇿卽踐金沙仙女鸞衣還窺石鏡巖莊轉梵杳㝠松桂之墟磵石栖橰寂寞藤蘿之院法鼓奏而寒山曠􅇝鐘鳴而曉壑靜頳苔翠蘚具不盡之靈衣石乳瓊漿入無生之妙􅄿肅肅焉遙遙焉信調銜之珠庭而列眞之甲第也爰有上座玄鑒法師等竝六塵無我四諦非他奉乾越之㣲言守楞伽之奥府法雷濳吼鼓動風煙慧日揚明照臨丘壑靑漢坐定見心宅之恒靈丹洞行忘覺身城之每化須彌不動逈鎭閻浮闍崛安居下觀忉利開四生之廣路敘六􅃐之􅂜倫足以遵揚眞績恭宣來命者矣縣令桺公諱明獻字太初河東人也太玄降氣中黃授彩襲周魯之榮基􅄍河汾之靈液四科高第振風翮於三冬萬室崇班跼雲􅆖於百里旣而政成􅀺頌道洽甿謳假無上之幽筌毗不言之景化絃歌在韻將寶偈而齊歸銅􅇘成章與梵天而共貫瓊波湛淡沃蕩雲雷珠灌蕭條蔽􅉛煙雨貞機罕應良談於好事之游朗調多奇高賞盡名山之曲下􅋅東臯事失南州塗窮歡孔席之栖遑笑楊岐之浩蕩薄游兹邑喜見高人三接而定琴樽七縱而擒風月林宗有道相期淸濁之間平叔能言見許天人之際從容宴語契闊胸懷欣性情之同冥感形骸之共遣雖玄都妙域巳挂於􅁯言而義塾文場竊申於知巳敢作頌曰妙􅁚無倪神功有渉湛淡名器崩騰事業慧路翹車禪河艤檝控引羣品輪􅅆庶劫縱橫宇宙反覆山川言因境立道寄形詮爰稽福地式揆珍田丹溪漏日碧洞栖煙闍都玉檻須彌石室榛灌溟濛風雲蕭瑟晬容乃眷禪徒有謐葉磴三休花巖四密崇巒架殿疊嶂營樓千􅎝鳯起萬栱鸞浮星開紺髪月湛靑眸神宮不夜􅃉閣長秋戸臨重崿牕分絕嶺半漢香浮中天梵警鶴林聖迹龍泉佛影鳥思山空猿悲峽靜森森巨柏落落長松月出東岫霞生北峰山人自狎野老相逢白雲屢斷靑溪幾重彭澤之令臨卭之客比德山藪重規泉石法宇成言慈門致役糠粃吏隱薜蘿心迹吾生擾擾與道遑遑殷勤頌詠惆悵津梁投功翠碣助化玄場百年之後苔蘚蒼蒼
