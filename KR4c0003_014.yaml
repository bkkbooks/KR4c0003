front:
  text: 王子安集卷之十四
  hash: sha256:443ff6cd28d839090eb11dadba2303b93f0bae5bb6d76c6a8aced5a25cc63b5f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0003_SBCK_014-1a}
body:
  text: 唐龍門王勃子安著明閩漳張燮紹和纂碑􅎚州玄武縣福會寺碑若夫考龍圖而括運撫麟筆以傷時天地閉而賢人隱周孔逝而微言絶豈非太階無象三辰鮮逌敘之因滄海為陵百川有橫流之勢况乎法身長往顧糟粕以空存化迹繁流仰舟航而遂遠雖復功推八正猶迷鶴樹之談道亞三明未覩龍宮之籍則有妙音難遇瞻雪嶺而投軀真諦希聲仰雲山而破骨優填企景新雕白玉之龕般若尋風而化黃金之像三千寶座回出天宮八萬珍臺遙臨淨域非惠圖之冥感孰能臻于兹乎福會寺者隋開皇中之所建也爾其峰巒地列東分井絡之光樓雉雲橫西睹禺同之奧北彌豐邑里閈千甍南控平江波潮萬里擁亭臯之絶勢升林野之殊形肇開修竹之園式揆旃檀之剎法川高闢慈宮峻敞文璫寶綴環日月於重廊翠栱丹楹起虹霓於復殷真容俯映福衆爰依梵筵交燭禪房互啓山神獻果還栖交露之臺天女持香即繞飛花之閣輪輝夜滿抽紫熖於金山毫相晨臨發珠華於玉地爰有縣令柳邊河東令族大業之年來光上邑高人奉檄功為銅墨之先令宰鳴琴課穆絃歌之最眷香城而惻念披道肆而驚魂示懷延奬思弘末教乃於寺內起重閣一所乘煙置臬揆日端繩層榭三休雕簷四注奔星挂廡混珠網而同歸明月窺軒雜璿璫而共貫仍抽麗筆俯刋貞琰詞源迅委振法海之波瀾義宇宏深接禪宮之閫奧昔者陶濳彭澤罔聞仁祠之風潘嶽河陽未入菩提之域兼其美者著在我柳君乎俄而帝隋方否三官失龍鳳之圖皇業未昌九野被豺狼之毒雖復餐砂茹石窺劒道而回心蜂聚梟騰指銅梁而革面自非法雲西眷濳銷火宅之氛慧日東來回朗昏衢之景則安能冥資福地顯沮魔軍波淸於振壑之隅燎息於炎昆之曲洎乎大鈞無事神器有歸淸玉戶而帝寰中轉金輪而王天下玄場佛境與天壤而惟新鶯樹雞林共風雲而改旦功既成矣時既貞矣紫宸有𥙿蒼氓胥悅都人狎至瞻鴈塔而歡心野老相趨尋鹿園而頓顙或至誠冥發爭知不盡之虛或道恩旁流竟委忘緣之施乃於寺內造菩提塑像一座實彭氏絶羣之迹洞參瑶銑體備丹靑得埏範之奇模盡陶甄之能事功分實相變入冥機丹果長春青蓮不染靈儀若動似臨王舍城中神足疑行即坐菩提樹下銀牀地湧寶帳猶懸珍木天成金花不落總章元年又奉為皇帝更造八菩薩像成於淨境别峻崇堂而力寄羣緣功難獨舉遂令衆情馳鶩空懷更始之圖靈座端嚴未得安居之地時有弘演上人自丹鳥下日昌帝籙於明堂靑鶴乘霄降仙苗于大室軒冕將風雲交映鐘鼎與山河共遠法師宿持真諦幼挺殊姿拔五翳於長驅登四禪於回觀以為德因時建澄什繼踵於西都道冀人弘林遠隨肩於南國痛迷生之詭矯悲正覺之陵夷思欲樹真氣於未萌緒崇因於巳往遍遊淨境歷騁遐方至總章二年憩于茲剎身持寶印口出神珠心動巴南化行蜀右法羅濳舉馴鳥性於慈林慧鏡旁開息猿心於定水亦有情鈎五縛遙騰解脫之川想瘞六塵回拔沉迷之域名臣長者捐玉珮於銀庭善女靈姬落金環於寶地貪機霧滌法施泉流林衡掄𣏌􅎚之材班匠獻鈎繩之巧千欒電糾萬桷霞張飛陸緣甍曾構架景瓊缸杳照乘紺壁而宵分珠箔重華掩靑疏而曉亂紅葩植井彩綴河宮丹桂承梁香交列肆夭倡梵樂肅然忉利之天藻蓋雕璫煥若摩伽之殿豈精力之玄感而神化之曲成乎直歲寺主等州閭盛族鶖鷺榮因升慧圃而功成踐魔庭而戰勝排四門而獨往共極邦緣攀十地而遐征同趨覺路縣令虞洽旌旗百代劒履三朝匡帝座而南征擁台庭而北面星像垂祉川嶽載靈豫章七歲麒麟千里雄情負俗鬱王佐之宏圖英識邁時得公門之逸氣既而拂衣華族入天邑而觀光列板仙臺出靈關而作宰泉魚狎夜多單父之深恩隴翟遊春嗣中牟之善政有條不紊施緩政於繁繩斷訟有神下高鋒於錯節因以激揚大化濳滋比屋之封光啓令圖預積攀輪之慕縣丞裴休家接朱欄譽流丹闕軒裳照緒忠孝榮門鳥鳴有伐木之歌龍文非刈蓬之具高材列務盛德分司翰墨不足留神琴樽申其徇性十旬休沐奄有泉林千里邀迎乃疲風月靑驪蹀躞終噴玉而懸雲素鶴徘徊具銜珠而犯露加以沉研有地題橋八解之津誘勸無方叱御三乘之路故能使幽明仰德法俗依仁攀海祗而如歸挹衢樽而下瞰鄉望等龜靈高族驥子名家關錦室於中堂分綺疏於甲第或望雄都鄙代列歌鐘或業預雲雷門藏璽詔文場促席有江漢之英靈武觀連衡得岷峨之鋭氣並能馳心彼岸欲臨海而褰裳投足化城下悲思而反𬒮下官薄遊江右旅寄城隅懷道術於百齡接風期於四海依然梵宇欣象教之將行莞爾公庭惜牛刀之遂屈雖文殊辨論妙懸解而忘言而伯喈雄管敘真宗而罔愧敢巡此義乃作頌云金堤逈邑玉峽長瀾城闕紛亂江山聳盤雲屯勝邑霧啓禪壇右縈層雉左控崇巒竹園精舍檀山香閣萬栱騰虬千􅎝跂鶴晚星疏翠朝霞泛雘鼓奏泉流鐘鳴霜落時經失道代歷交呈神宮不撓法衆無驚金輪邃曉玉鏡施明功照佛剎化被王城帝圖冥運真儀濬發貝齒含星流毫推月鳥離山扃龍還海闕寶樹刑留天宫匠設爰有真人式宣慈主發迹江甸馳聲蜀宇望遠連規攀澄襲矩力窮興道功周廊廡羣緣肸蠁衆福氤氲叢楹列電高棟銜雲銀龕曙撫玉座宵分瓊璣有爛藻繪多文鬱彼㘙邑猗歟上宰松桂連華鴛鸞集彩禪津有𥙿至公無待火宅可辭舟航斯在我之飄寓邈矣來遊山川俯仰道義淹留承風郭外撰綴江幽玄機勝筆天地相周􅎚州飛烏縣白鶴寺碑原夫玉都瓊室紫垣光大帝之庭金闕銀臺玄壁杜羣仙之域故能使神明有宅駕日月以長驅鸞鳳知歸撫雲霓而上出斯則曾巢瑾穴上皇迷棟宇之尊考室靈臺中右識巖廊之貴然後冕旒前序提四海以為家登步大階列千門而有閲况乎𡺸山形見旁行草昧之先光宅乾坤之右雖鶴臨西閟龍宮與王法同亡而象化東流鴈塔與遺儀繼起白鶴寺者蓋菩提寺之餘址梁武皇之所建也香城福地之舊三巴五蜀之湊裂岷山之奧域分井絡之榮光西包玉壘之墟北瞰銅陵之野南扃列第門庭萬家東戶連峰岡巒千里實伽藍之勝迹得迦衛之英模憑絶磴以圖規俯長溪而作固自金陵不競玉鏡無章城池興南露之悲亭障切北風之候崩山鬬水觸地網而三分墜月奔星劃乾綱而五裂中原錯戾慈門為虎豹之墟滄海橫流定水穴鯨鯢之浦懷山既蕩法衆咸淪林院榛蕪軒堂委寂遂使悲生棄井堙玉甃於三泉歎積為山移瓊峰於九仞皇上攝千秋之寶運緒三聖之宏機挾宇宙而先神御雷風而首出靈功不宰華夷沾共貫之恩至道無私霜露得平分之序考禎圖於日愼寤寐同符稽妙册於年刀幽明合貺然後東巡巨鎮追六聖而撫寰中南面天壇朝萬方而小天下皇威既暢寶應齊歸川嶽薦靈風煙動慶丹烏抱日疑增帝閣之華素鶴低雲若赴仙庭之會昔白魚黃竹業未峻於封崇赤鴈芝房名不登於梵宇爰徵瑞典肇錫嘉名重興波若之臺更起招提之院金繩夕布綿秀嶺以開壇玉榜晨舒擁回峰而闢戶爰有弘演上人者法門之秀士也行超常凍思越恆飢悲浮域之為墟喜皇波之普泛縱還舟於苦海驚浪旋夷比歸馭於邪山靈關非險於是淨財雲委真衆煙馳如趨摩竭之宮似向毗邪之國縣令梁弘悅首加甄緝縣丞梁敬一親昭施典上憑天旨爭開舍利之壇俯會衆心競起須彌之座禺同故嶺石鮮堅華廣漢餘坰地多疏斥事闕經始人懷祗懼重階不就空思天室之氓寶像無資未獲黎陽之士豈非冥期肹蠁功參造化之外故能果脣間發運眸周映貝齒含滋璿毫起照三十二相臨玉座以相輝八十四儀擁金山而圓立層甍四合爍奔電於丹楹復殿三休絡浮煙於翠幌因高積磴疑遷倒景之臺架嶮連榮似立迎風之觀雕簷競注縈霧道以龍回繡桷爭飛傃雲衢而鳳矯寫歸禽於寶鏡誤接朝鸞圖走獸於文璫疑栖夕兔雷霆蓄泄裁臨承􅋼之間煙雨飛浮未出層欒之下耀丹靑於􅌲壁妙迹疑存炳銑鋈於蓮龕神輝自燭鏘鏘櫩鐸聲傳桂葉之風熖熖山爐氣結松陰之藹仰真容於始旦滿月晨昭窺列棟於方宵長虹夜發香泉激澑有符溫淨之池珍木成行無忝祗園之樹信煦尼之別府實兜率之殊庭者乎愛友上座法師等情機藻瑩戒律圓明披玉笥以研芳候瓊鐘而肅慮禪姿曉映依稀同雞岫之前梵唄晨臨髣佛像魚山之曲縣令獨孤儉等或鵬垂待運終燮道於中台或蠖屈求伸且毗風於下邑鄉望儀曹等或鹽泉錦室家稱三蜀之毫或抱朴懷仁譽擁雙流之美或以為山川肆踐猶紀石於弇州陵谷生哀尚沉碑於峴首况乎德因時盛慶流封拜之辰名為功登事屬文明之運豈可使璿猷𬒳物終昧燮於玄機金宇韜華不題勳於翠琰敢作頌曰睿塗􅌲藹靈機翕忽王架天都金裁地闕法玉利見香城繼發鴈塔齊雲龍宮瘞月長江近域廣漢遺居禪扃共往梵宇全疏迹均梁後義切秦餘山川牢落搸莽丘墟有聖聿興惟皇降撫因天因地為雲為雨日觀龍驤煙壇鶴舉肇開嘉號重光淨土猗歟上士道場真政物觀成章子來興詠土石呈彩人靈合慶寶座晨嚴金山夕映紫微分殿靑岑曜郭復岫榮樓攢峰跨閣月低璿鏡星連寶鐸彩鳯將飛蟠虹未落森沉桂宇肅穆筠壇花明柳砌葉暗朱欄溪留夏雪澗咽秋湍山虛梵冷谷靜鐘寒法衆爰依禪徒戾止望風三蜀征塵千里頓首玄墀歸心翠扆業超有色功齊無始偉哉冥化妙矣能仁去來均迹前後俱身寂滅為樂般若為因題芳翠琰敢詣靈津􅎚州通泉縣惠普寺碑若夫玄機默運披睿烈於三精素鍵濳融肇神功於萬彚則有靈期肸蠁龜龍負河洛之圖帝緒氤氲賢哲舉乾坤之策雖功懸日月終植軌於寰中業靜雲雷未逃規於象外爾其譯雉林之寶偈詮鷲嶺之真圖抽紫玉於禪山朗玄珠於智水不生不滅光臨妙物之津無去無來濬發乘時之契仗三明而獨運施洽平分據二諦而同歸功超邃古故能使三千法界向風知袵席之師百億大王聞道失巖廊之貴非釋迦之神化其孰能與於此乎既而正法將隱微言不嗣應身既沒遺儀間起恆星夜掩西天銜風霧之悲夢日宵成東漢肅壇場之禮繇是鹿園曾敞像教旁流宣妙奬於希夷範靈蹤於顯晦瑤龕寶座光華震旦之墟鳯剎霓裳斧藻閻浮之域其寺蓋梁大同年中所建地分彭蜀嶺對岷峨憑廣漢之遺墟籍犍為之舊壤西馳峭崿山連白雉之郊東赴長川江走黃牛之峽崇墉却峙之勢庭衢四會勝里九曲之分閭閻萬積危冠袨服參差軒蓋之前露渚風畦隱軫亭臯之望是惟先鏡實啓香城煥若神明恍同化出紺壇煙屬疏絶閣而三休紫殿雲深徹回廊而四注重欒復棟霧緝霞張繡桷雕􅎝鸞伸鶴跂珍臺控景羲和獲練轡之因綺榭裁氛屏翳得停鑣之所連甍積翠交玉鎖於星衢洞戶流丹綴金鋪於月竇垂珠網露傍傾漢浦之琛列鐸吟颷上合鈞天之樂固以輪奐之美冠真宰以先鳴雕範之奇告靈基而得雋乃造彌勒下生像一座相好端足華姿朗僃貞觀末年靈暉繼發房籠匝曜疑連不夜之城戶牖皆明似出重昏之境自非理參幽贊道叶冥機宣佛鏡於無方演慈燈於巳絶豈能寫丹靑於實相妙色長存圖銑鋈於真容神光不昧若乃時暄福地低落照於晴暉候肅禪房泛初華於霽景千千寶樹若在雙林一一妙香仍淸八味山暉傃脫跂葉嶼而相鳴野燕迎晨拂花簾而自樂松楹秀蔓曲成蘿薜之衣砌石生蓮直起芙蓉之座則有拖身童子戾止巖扃忍辱仙人來儀澗戶都人野彥希梵席而投裾趙美燕餘望齊庭而繼履莫不靑鳬委貫俱欣不捨之壇紫貝兼明共化無緣之力故能使雕形畫塔象設年滋彩帙瑤箱龍編月久豈西周之道備南國之風成者乎爰有寺主等覃機色外練迹塵間浴甘露於心田集祥風於性宇栖情不二忽起初地之權授手大千猶擁彌天之具縣令等或公矦百代玄貂列駟之門或文史三冬吐鳳回鸞之客銅章墨綬任切臨人鐵印黃簪功宣陸漸局牛烹而待價肆蠖屈以來伸揮鋒九仞之隅作鏡雙流之外録事抑元等丹軒紫紱家傳方面之勳驥子魚文地列膏腴之右音承隋運屢委天書爰自皇初顓流帝禮等賨渝之奉漢類微濮之匡周咸申白馬之盟並受飛龍之託故能遺風罔墜代濟其美望重西南功宣法俗咸以為絃歌小政猶篆德而垂芳鐘鼎微榮尚銘勳而作鑒况乎神威自在方傳宰匠之功豈可棟宇常存不勒山河之贊爰託幽鄙奉揚徽猷敢宣此義而為頌曰天地定位君臣作極道在巖廊功霑寰域尚淸皇盻猶歌帝力况我能仁惟神不測誕生迦室利見王城機覃有應業會無生長驅定境振旅魔營恩兼動植勢絶隨迎燕山傾仞鶴林埋景慧日西沉慈波東騁競窺靈相爭參佛影月殿分城雲龕動嶺長江舊域廣漢遺區川分潼峽塞接岷渝閭閻四會亭障威紆爰開寶地實控名都霞牆百雉雲甍四住紫闕尋煙赬樓結霧波流虹起雷奔蠖步網罩星鶉璫栖月兔靈機藻繂禪室安間雕金範玉舉翠浮丹神宮不夜虛室長寒光超有色貺出無端淸露花徑飛泉葉戶澗緑苔秋山蒼樹古茫茫庶類巍巍淨土鵝鷺同歸華夷共聚第一義諦寥廓法門迹離生滅思舉乾坤情迷則復道在為尊惟名與器萬古長存
