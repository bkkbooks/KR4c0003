body:
  text: 王子安集巻十四欽定四庫全書王子安集巻十五唐王勃撰碑益州徳陽縣善寂寺碑若夫玉繩髙曜分寳厯於皇階金榜洞開道璸暉於帝幄雖復蒼梧北望湖湘盈舜后之歌綠荇西浮江漢積文妃之頌未有激揚煩䕃栖妙果於香城揮發葢纒樹㝠基於浄域則紫房丹室猶居燬宅之間朱紱瑶筐未出塵籠之際我國家鳳翔元氣駕黄幄而層飛龍躍太虚絶蒼根而止傃文皇帝以八才御厯光昇岱野之榮文徳后以十亂乗時恭贊塗山之業握仁王之寳鏡日月重光驅梵帝之金輪雷霆静祲湼槃甘露承眷而宵流般若靈音襍祥以晝引蛟臺蜃閣俄交震旦之墟月面星毫坐照毗邪之國善寂寺者葢舊寺之餘趾梁武帝之所建也爾其碧雞仙宇分絶障於金堤石兔遙源控長江於玉峽封畿四㑹龍坰舍衞之壇里閈三分鹿野經行之地洎蒼鵞上擊銅馬交馳祗園興板蕩之悲沙界積淪胥之痛火炎崑岳髙臺與鴈塔俱平水浸天街曲岸與猴池共盡山川隠嶙空傳鷲嶺之基灌莽蕭條非復鶯林之樹武徳伊始君子道亨正皇極而撫寰中登太階而臨天下函闗雲物更逢真聖之期井絡星辰重集㑹昌之運雖開基撥亂獄訟知歸而繼絶興亡經綸未暇先皇統業貞觀御宸奉文物於三天布聲名於十地參羅上下充槖籥於襟懷八部神祇薦圖書於掌握皇寳䧏地花昇含生無昏墊之虞法衆有來蘇之望俄而後庭搆癘椒房穆卜六宫震恐三靈愕眙馳瑤展幣有事於羣宗碧劑𤣥針無徵於衆術帝廼䧏監迴慮屏璧與珠追勝跡於靈闗事良縁於福地爰紆聖綍重啓禪宫峙璇刹於將傾鎮銀繩於已絶絲綸既洽棟宇行周坤徳用寧隂儀再朗於是林衡授矩周官詮揆日之工梓匠揮斤荆客鍊成風之巧重楹畫栱坐出天霄複樹文閨俛臨電宇顯慶中縣令蕭君道𢎞理鈎繩於日用慿藻繢於天成仙官之妙匠可尋盧舍之神模不墜琱甍鶴翥曳珠網於星津繡桷虬伸吐璿璫於月徑緑房丹鎻彩綴晴霞紫閣青疏光含薄霧春風瓊樹香飄席上之蘭秋水銀塘影數軒中之芰晨光轉卉翻寳字之龍花溽露低枝蕩真文於貝葉天童潤色黄珉碧玉之壇海聖彌縫師子龍王之㑹建靈幢於厚夜琢飾年深懸法皷於迷津規模嵗逺時又於佛堂東壁畫二聖僧丹青未畢大啓神光鄰玉麈之崇輝發金龕之實相朱軒夕朗似遊明月之宫紺宇晨融若對流霞之闕繇是岷英蜀秀攀講序以雲趨帶鷰裙鸞仰齋庭而霧合貪機大阻浄施旁流綺羅分解珮之因軒葢得捐金之所靈妃翳日捨翠幄於香筵仙客停雲落霓裳於寳地自非冲姿密契景􅀿濳周豈能昭義祉於氤氲動𤣥機於肸蠁者也爰有上座𢎞一節並沈研性符隠括仁棠凝妙律於神珠肅靈椒於寳印太昊奉檝截苦海而横流風伯扶輪歴邪山而効駕騰燭龍於慧炬俯鏡重昏奏鳴鳳於天歌下清羣籟摩珍在握遥臨七寳之宫正覺為心俯闢三乗之路湛衢罇於忍地品藻雞園推水砥於言河扶持象化縣令宇文某河南人也帝隋尚書之元孫皇唐侍中之令子爾其虹旗萬里御六氣而鵬飜霜㦸千羣擁三州而鶚視帝葉皇枝之重對越乾坤金縢石匱之功光華宇宙公上流提慶中和毓祉見鐘鼎於南鄰奉軒寰於北闕雲姿月步下瑤澤而追風雪羽霞翎歴珠田而矯霧芳蘭公子即以地業髙人幽桂王孫即以琴樽待物叙徽猷於禮樂則爼豆縱横談賞契於林泉則烟霞咫尺自裁聲百里揆化雙州收武城之故事擇中牟之令典仁風易狎候丹翟於春坰惠化難經佇青鸞於曉墅山巨源之逺量嘯傲行藏謝太傅之髙風從容語嘿縣丞王敬衣簪舊族孝友名家白虹緘抵鵲之光紫電蓄衝牛之氣七年髙秀拂層漢以非遥六月雄圖擊長波而未逺鄉耆等少承榮緒中區勝族門稱東别之標地接西隅之嚮嚴君平之履道盛徳家傳秦子整之談天風流代襲咸以為妙圖真諦事出於無名翠琰𤣥碑道凝於不朽弇州北跨猶疏騄驥之銘文石東區尚勒元龜之頌况乎玉衣流慶事屬於仙幃金屋延祥福纒於梵宇爰求勝筆載記芳謡下官弱植少徒薄游多暇薜蘿人事空餘江海之心筆札神交尚有淵雲之氣相如謝病訪詩酒於臨卭夫子栖遲聼絃歌於單父羣公以道之存矣思傳記徳之書下官以文在兹乎願展當仁之筆其詞曰蜀嶺東漸岷山西積月峽星橋勝金孕碧肸蠁靈兆丘墟梵迹鴈塔推基鹿苑遺跡肅肅黄運英英文母配乾垂慶儀坤握矩寵照香城仁沾浄土爰光大壯聿求多祚青牛福地白鶴禪林重扄霧敞􅃨殿雲深龕雕翠玉刹樹黄金龜鏡夕照鳳鐸晨吟慧樓彌望化臺出没棟列長虹忩栖明月果脣周映蓮眸間發雨霽猴池烟生龍窟肅穆禪衆優游令宰方駕康衢連舟性海鷲岳增飾雞林潤彩藻繪相尋丹青盡在我今懷矣窮路何岐承風詠徳展義陳詞百年心事千載風期東西南北栖遑㡬時益州綿竹縣武都山浄慧寺碑原夫帝機寥廓雲雷驅妙有之功正氣洪荒清濁構乾元之象融而為川瀆結而為山岳五城韜海接崑閬於大都八洞藏雲冠瀛洲於巨闕造化之所偃薄靈谷之所啓處極緹油而縱觀詠頌寧殫出宇宙而髙尋風烟罕測是知玉巵無當遐荒非視聼之津金牓所存城闕盡江湖之致何必九虯齊騖直訪銀宫八駿長驅遥臨石室武都山浄慧寺者梁大清年中之所建也名山列岳之舊仙都福地之湊黄龍負匣著寳籍於經山紫鳳銜書䕃榮光於井絡須彌峯頂仍開梵帝之宫如意城中即有經行之地爾其盤基跨險列嶂慿霄日月之所竄伏烟霞之所枕倚飛泉瀑溜蕩滌崩崖緑樹𤣥藤網羅丘壑飛塵作氣被萬吹於中巖帝琰司寒宅千霜於北谷丹梯碧洞杳㝠林岫之間桂廡松楹寂寞風塵之表是稱英鎮實瞰崇岡閭閻當四㑹之街城邑辨三分之地綿磎錦瀆下浸重巒玉阜銅陵旁分絶磴山川絡繹崩騰宇宙之心原隰縱横隠軫亭臯之勢頃以黄旗夜徙紫葢晨傾九服失圖三靈在疚奸臣躍馬據折坂而吟雲壯士聞雞擁陽闗而嘯雨岷峨失險化為鋒鏑之塲江漢横流非復朝宗之國禪宇繇其覆没法衆是以凋淪國家奄有帝圖削平天釁紫宸反照皇階即叙萬國順百靈朝幽顯再立華戎一揆燭龍韜景避堯日於幽都雲鵬斂翼候虞風於晏海以為軒階具美功窮望祲之臺漢道兼𢎞力盡祈年之觀爰經寳地大啓祥宫撫香象而髙視鳴法螺而再唱龍垣浄土連帝道而重光鶴苑崇基脱皇居而首出况乎山精舊壤下鎮偏隅天帝遺墟上干躔次王舍城之宫闕白玉猶存給孤獨之園林黄金尚在法物繇其大備盛徳所以相尋株兵奉天藏之圖泉女獻山祇之籍離亭合榭因岸谷之髙低疊觀連房執岡巒之曲直丹崖反照畫栱相臨綠障斜烟雕簾間出豐隆曉震次複霤而悽皇列缺晨奔望崇軒而愕眙千香寳樹自起風烟九乳仙鐘獨鳴霜雪銀龕佛影遙承鴈塔之花石壁經文下映龍宫之葉虹生北澗即掛新幡鳳下東岑還栖舊刹若乃尋曲􅔍歴崇隈周行數里直上千仞蒼松蓄吹臨絶逕而疏寒黛篠防烟繞迴疆而結䕃春巖橘柚影入山堂秋壑芙蓉光浮水殿亦有山童採葛入丹竇而忘歸野老紆花向青溪而不返山神獻果送出菴園天女持花來遊浄國實杳㝠之秘訣託幽深之逸境豈直淮南桂樹暫得仙家江左桃源終迷故老而已爰有寛闍梨者俗姓楊氏其先華隂人也因官徙地家於綿竹山分太華水帶長汾川岳㑹同風雲感召𤣥經素論侍郎居八俊之英綠綬黄軒太尉列三台之首法師玉函䧏彩金瓶探色振八解之遙源踐三明之廣路靈機入證窮象載於初髫妙諦因心釋羊車於弱冠三千法界繇廣位而出無明十二因縁自普濟而登彼岸𢎞宣誓願大振沈黎揮覺劍而破邪山揚智燈而照昏室彌綸所被白馬盡於禺同權漸所開黄牛至於嶓冡䖍誠樂土憩影兹峯迺以貞觀九年於寺西院立七佛堂一僧舍星毫動牖月面分堦彩鳳銜旒神龍負塔飛烟湧座龕龕忉刹之天香霧成臺樹樹菩提之果朝散大夫行縣令清河張楚親承妙業俯刋貞琰林宗有道伯喈無愧法師夙機少悟􅀿變多竒玉山中㫁瓊林下雜支道林之好事語嘿方融釋慧逺之髙居風埃遂隔洎乎坐忘遺照返寂歸真城肆颯然若遺空山黯而無色豈直巖枝泣血磵户摧梁而已哉縣令劉照彭城人也自碭山仗劍綰鳳厯於雲臺春郊授鉞嗣龍圖於白水玉壘三分之胄下雜公門金陵一霸之基旁參帝緒翠緌丹紱歴今古而先鳴人傑地靈冠山川而得儁君膺岳瀆之秀挺風雲之㑹昆溪劍鍔直照胷襟楚澤珪璋潛周履行魯恭明徳方昇漢輔之階潘岳能文且職河陽之縣仁徽可被闔境仰其風猷威徳所加百城疊其霜彩尚乃康莊妙域光開不捨之壇舟檝愛河昭暢無生之業痛鷲林之殄瘁悲象教之榛蕪爰命緝興式光泉藪虎溪龍澗近分廬岳之圖金闕瑤臺更討瀛洲之記銘曰武都仙鎮龍墟粤域邑動香城山開浄國澗流百道峰雲五色谷暗藤斜山髙樹逼千楣鶴列萬栱星懸分林構址接磴開廛臨階竹樹遶棟風烟龕前怪石塔下秋泉緑崖疏逕青岑拒室霧道相縈烟房互出葉濃磎浄花深嶂密鳥度難尋猿驚易失簷分石竇地絡金沙丹丘抗月碧洞栖霞松開野路桂列仙家仙罏柏葉寳座蓮花砌因巖曲橋隨峯返果出天厨香來仙苑玉鑄啓曙金璫照晩谷思鐘張山悲鐸逺閭閻踐勝銅墨髙情聲飛别邑望動専城懸金道肆刻石山楹千載之後吁嗟令名梓州郪縣兠率寺浮圖碑若夫仙樓白玉􅆼㝠崑閬之墟神闕黄金寂寞蓬瀛之浦斯則岡巒髣髴稽鳳册而空存島㠘慿陵艤龍舟而罕迨至若按皇軒於夏籙考璿構於殷圖周王北洛之官秦帝南山之閤西京故事下聼雷霆東國餘基俛臨風雨莫不陵遷谷變共榛灌而丘墟火絶烟沉與雲雨而坱莽其有據坤靈之寳位借神道之㝠扶占象緯而圖基揆川原而宅址蜂臺映月還臨舍衛之城鴈塔尋雲即對􅡙闍之嶺成而不毁者將斯之謂與兠率寺者隋開皇中之所建也爾其林泉糾合之勢山川表裏之制抽紫巖而四絶疊丹峯而萬變連溪拒壑所以控引太虚蒸雲駕雨所以盪洩元氣涪江千仞波潮將旭日争光都城百雉甍棟與晴霞共色信光造化之竒模盡登臨之妙境𤣥房霧轉抗金樞於桂岊之前紺殿星開栖玉刹於梅林之下巖花落沼近拂天衣澗葉低隂斜籠寳座宵汀鶴警乗鼓吹而齊鳴曉峽猿清挾霜鐘而赴節若乃巡碧磴歴𤣥階鎻忩澄彩瓊鋪洞照神姿滿月疑臨石鏡之峯衆馥揚烟似對香爐之岳信可下清人境上配天都為勝地之先鳴執名山之右契者也爰有信弟子某乙等夙祛塵網早植慈根悲梵室之未𢎞悼禪居之猶􅄶以為上棟下宇河圖避風雨之災廣榭崇臺時令著髙明之宅是以菩提長者競潔舍衞之壇天帝人王争闢仙宫之塔則知威容下麗羣生鮮瞻仰之因材樸重琱黎人有子來之地乃於寺内建浮圖一所某年月日鄉望等兆基𢎞願繼發浄因陵轢中天規模大壯髙列砌架迴浮輊軒直上千尋周迴百步占氛候景神祗叶幽贊之功揆墨端行班倕逞絶羣之思收岱宗之杞梓聚崑山之玉石土兼五色金逾百鍊龍蟠萬拱策屏翳而髙驤鶴矯千楣冠扶搖而獨運重簷藹藹雲將反覆於櫺軒洞宇寥寥風伯栖遑於户牖仙娥去月旅方鏡而㤀歸寳婺辭星攀圓璫而未返𤣥甍湛䨴若鵬飛之戾九天丹檻聨騫如鳯翔之據千仞每至韶光照湛爽靄晴遥列郊墟於四野開雲氣於千里風恬雨霽烟霧藻天地之容野曠川明風景挾江山之助則有琱簾繡軸排浄域而停輪寳騎銀鞍指珍臺而聳轡於是披岫幌抵巖扄攀翠複而三休步𤣥梁而十憩廊軒外敞淑氣長延隂室中開鮮颷自激俯環瀛而極望積蘇非遙出雲漢而髙踐靈槎可記真福地之殊觀香城之巨麗者乎寺主等沈研二諦振耀三闗抵蒼璧於邪山攬𤣥珠於定水挹其流者曲成般若之縁承其風者濬發菩提之願長史河東裴某風神朗潤操履貞勤蕭條江海之心磊砢冰霜之節下岷闗而叱馭寄切全都臨蜀野而宣條功深半刺縣令衞𤣥海内髙流河東望族榮髙銅墨任屈絃歌浹辰而風化大行踰月而奸豪屏氣陶濳彭澤自得髙人王吉臨卭仍延重客縣丞胡敬仁三河舊族一代良材提鏌鋣而願割跼驊騮而待步江湖秋至方懷縱壑之圖海浪風髙未接垂天之翼鄉望等並中和受氣孝友承家才稱江漢之靈地實岷峨之秀或以時良入選擢迹鄉鄰或以朝望來儀升名郡縣並沐康衢之化俱承比屋之封瞻彼岸而同歸登春臺而共樂咸以垣墉遽覆猶傳路寢之歌銀鼎俄窮尚勒靈臺之頌况乎崇基奕奕與天地而争工層構峩峩配山川而永固豈可使𢎞規在我空存蔽日之基雄筆同時不借凌雲之氣謹聞命矣乃作銘云二象成紀三才定位開剖太虛導引元氣紛紛化迹飈飈聖致行傑趣約歸同葉異法王西眷教迹東遊功超道茂義冠儒流丹青既備棟宇旋周梵宫霞積香閣星浮緬想蓬瀛金臺逈起曠瞻崑閬瑤房峻峙壯矣名都神居休止大哉英服兹峯誕紀金繩對嶺玉牓分岑松扄委鬱桂幌深沈雲龕樹晦烟洞花深重巒霧結􅃨磵泉吟肅肅禪衆遙遙浄境鹿野經文龍宫拂影梵榛金室光來石井峽曉猿清池曛鶴警岷峨舊族江漢英姿争開法願重崇峻基占雲接廡揆景分墀天人合應幽顯呈期靈思孤出神模獨湧霧積千楹霞張萬栱玉牖星羅璿璫月擁􅃨榭龍蟠重甍鳯聳峩峩峻岊奕奕崇標琱簾切漢寳綴凌霄深忩閟景洞户流飈銀缸夕映珠鐸晨搖我辭秦隴來遊巴蜀勝地歸心名都憩足甫逮鄉縣頻移灰燭聿從良時仍尋妙躅曠望原陸周流江氾桃李春風芙蓉秋水烟霞四面闗山千里他鄉寓目兹焉復㡬梓州郪縣靈瑞寺浮圖碑若夫神州括地寰中分五嶽之圖巨壑浮天海上擢三山之秀造化之所樞紐靈仙之所窟宅故得昭灼天漢發揮雲氣牛頭山者即廣漢之名峰也圓裔㡬乎數里直上逾乎百仞若乃巖泉銑石之什風烟草木之狀傾九圍而得雋環四時而競爽蒼岑隠嶙旁分玉砌之階碧洞逶迤下掬金陵之苑實羣聖之所託也隋開皇中王秀作牧益州來窺勝地首旌嘉號仍疏淨域因危裂户就嶺磴之成規跨險分榮借岡巒之迥勢工窮雕鏤妙出丹青飛棟神行迴甍靈搆又於山頂别建浮圖隋運告遷明皇首出軒疏琱昧基砒堙蕪􅍕興宣榭之災施及栢梁之燼鄉望等馳心妙律夙契禪居悲梵宇之摧梁痛珍臺之絶構思𢎞法願重緝竒功黨且千家集惟巨萬以為玉樓星峙稽閬苑之全模金闕霞飛得瀛洲之故事指香城而聳睇臨火宅而危魂參妙範於神明騁良工於宇宙飛亷按轡定樞梟於風衢羲和頓第揆鈎䋲於日路雕簷畫拱龍迴紫漢之間􅃨霤重欒鳳舉丹霄之外瓊扉暮敞推日月於金鋪繡桷晨開落繁星於玉砌每至兩江春返四野初晴山川霽而風景涼林甸清而雲霧絶沙汀道暖落花與新燕争飛城邑迎寒涼葉共初鴻競起則有都人襲賞慿朱檻而披襟野客含情俯丹櫺而極睇窮百年之後樂冩千里之長懷信可以澡雪精神清疎視聽而息機心於紛擾置懷抱於真寂者矣且勃旅遊岷徼漂舉涪鄉年晷一窮時灰七變王陽西上方驚斂轡之心王粲南征實動登樓之思我之懷矣乃作頌曰大塊甄成名山作寺發地龍盤干霄鳳峙風雪萬邑岡巒千里絶域天成珍臺地起揆刹𤣥嶺圖基丹􅕲層棟峥嶸重簷􅌄窱有隋紊厯重明改照事與時遷迹從原燎義均除舊事切維新如或繼者代有其人聲飛隴蜀望動州隣争開争施競植靈因控險裁標循危列構巖烟接廡峰雲對霤鐸運星衢璫懸月竇紫軒霧合丹梁露透暮春疏節新秋戒序照蒲暄郊氣銷寒渚樹濃鶯亂川長鴈舉流涕寫懷魂馳意與偉哉靈宇壯矣全摹窮髙極麗逺覽長圖賞因時合筆為神驅有情君子誰為捨乎
