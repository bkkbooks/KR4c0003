front:
  text: 王子安集卷之六
  hash: sha256:72057fff0ef98c41c7addba168f6cbb010e25fa317f8ab35129a1cb72b2e1740
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0003_SBCK_006-1a}
body:
  text: 唐龍門王勃子安著明閩漳張燮紹和纂序晚秋遊武擔山寺序若夫虎丘仙鎮吳王殉殁之墟驪嶠崇基秦帝升遐之宅雖珠衣玉匣下賁窮泉而廣岫長林終成勝境亦有霍將軍之大隧回寫祁連樗里子之孤墳竟開長樂豈如武擔靈嶽開明故地蜀夫人之葬迹任文公之死所岡巒隱隱化為闍崛之峰松柏蒼蒼即入祗園之樹引星垣於沓嶂下布金沙棲日觀於長崕傍臨石鏡瑶臺玉甃尚控霞宫寶剎香壇猶芬仙闕雕瓏接映臺凝夢渚之雲壁題相輝殿寫長門之月美人虹影下綴虬幡少女風吟遙喧鳳鐸羣公以玉律豐暇傃林壑而延情錦署多間想巖泉而結興於是披桂幌歷松扉梵筵霞屬禪扃煙敞雞林俊賞蕭蕭鷲嶺之居鹿苑高談亹亹龍宮之偈于時金方啓序玉律驚秋朔風四面寒雲千里層軒回霧齊萬物於三休綺席垂雲窮九垓於一息碧雞靈宇山川極望石兕長江汀洲在目龍鑣翠轄駢闐上路之遊列榭崇闉磊落名都之氣渺渺焉洋洋焉信三蜀之竒觀也昔者升高能賦勝事仍存登嶽長謡清標未逺敢攀盛烈下揆幽襟庶旌西土之遊逺嗣東平之唱云爾宇文德陽宅秋夜山亭宴序若夫龍津宴喜地切登仙鳳閣玄虛門稱好事亦有登山臨水長想巨源清風明月每思玄度未有能星馳一介留美迹於芳亭雲委八行抒勞思於彩筆遂令啓瑶緘者攀勝集而長懷披瓊翰者仰高筵而不暇王子猷之觸興不覺浮舟嵇叔夜之相知欣然命駕琴樽佳賞始詣臨卭口腹良遊未辭安邑乃知兩鄉投分林泉可攘袂而遊千里同心煙霞可傳檄而定友人河南宇文嶠清虛君子中山郎餘令風流名士或三秋意契闢林院而開襟或一面新交敘風雲而倒屣彭澤陶濳之菊影泛仙樽河陽潘嶽之花光縣妙理巖巖思壁家藏虹岫之珍森森言河各控驪泉之寶偶同金碧暫照詞場巴漢英靈濳光翰院亹亹焉蕭蕭焉信天下之竒託也于時白藏開序青女御律金風高而林野動玉露下而江山淸琴亭酒榭磊落乘煙竹徑松扉參差向月魚鱗積磴還升蘭桂之峰鴛翼分橋即映芙蓉之水亦有紅蘋緑荇亘渚連翹玉帶瑶華分楹間植池簾夕敞香牽十步之風岫幌霄褰氣襲三危之露縱沖襟於俗表留逸契於人間東山之賞在焉南澗之情不逺夫以中牟馴雉猶嬰觸網之悲單父歌魚罕繼鳴琴之趣俾夫一同詩酒不撓於牽絲千載巖溪無慚於景躅云爾遊冀州韓家園序銅溝水北石鼓山東星辰當畢昴之墟風俗是唐虞之國雖接燕分晉稱天子之舊都而向街當衢有高人之甲第祥風塞户瑞氣沖庭芳酒滿而緑水春朗月間而素琴薦家童掃地蕭條仲舉之園長者盈門廓落東平之室梧桐生霧楊柳搖風眺望而林泉有餘奔走而煙霞足用神龍起伏俱調鼎鑊之鳴滋鳳雌雄並入笙竽之奏高情壯思有抑揚天地之心雄筆奇才有鼓怒風雲之氣南庭興晚東徑隂生石髓折而隱士歸玉山崩而野人醉僉為文在我卜翰苑當仁王羲之之蘭亭五百餘年直至今人之賞石季倫之梓澤二十四友始得吾徒之遊陶陶然落落然則大唐調露之元年獻歲正月也夏日宴張二林亭序張二官松駕乘間桂筵追賞引簮裾之勝侶狎丘壑之神交辨縱於解頤道深於喻指香柸濁醴是河朔之平生雄筆清詞得高陽之意氣林亭曠望季倫調妓之園泉石周遊子晉登仙之浦舟浮葉影簟積花文黃鵲度而颷驚丹烏傾而日晚出處之情一致筌蹄之義兩忘沈轄留驤眺乘羊於衛玉彈毫可作明擲地於孫金共題橫吹之篇用記兹辰之樂人採一字四韻成篇夏日宴宋五官宅觀畫障序宋五官芝庭襲譽盛文史於三冬桂幄凝歡照綺羅於九夏樽浮緑蟻每披仙霧之文障列青牛更寫行雲之態爾其龍編繡質貿錦分花隱映樓臺比窗簾之在旦參差花葉若桃李之恆春楚媛調絃韓娥􅍟酒虹橋度幔鵲鏡臨粧佩引琅玕詎動懷風之韻鞍回玳瑁唯奔逐日之姿魚鳥冷而相親泉石紛而在玩宋家斯近雖别謝於登垣秦氏未遙自堪留於駐馬驚鴻擅美丹青貴近質之竒吐鳳摽華宫徵得緣情之趣遞揚筆妙式暢辭端秋日宴季處士宅序若人爭名於朝廷者則冠蓋相趨遁迹於丘園者則林泉見託雖語默非一物我不同而逍遙皆得性之場動息匪自然之地故有季處士者逺辭濠上來遊鏡中披白雲以開筵俯青溪而命酌昔時西北則我地之琳琅今日東南乃他鄉之竹箭又此夜乘槎之客猶􅍟仙家坐菊之賓尚臨清賞既而依稀舊識歡吳鄭之班荆樂莫新交申孔程之傾蓋向時朱夏俄涉素秋金風生而景物清白露下而光隂晚庭前柳葉才聽蟬鳴野外蘆花行看鷗上數人之內幾度琴樽百年之中少時風月蘭亭有昔時之會竹林無今日之歡丈夫不縱志於生平何屈節於名利人之情矣豈曰不然人賦一言各申其志使夫千載之下四海之中後之視今知我咏懷抱於兹日春日孫學宅宴序若夫懷放曠寥廓之心非江山不能宣其氣負鬱怏不平之思非琴酒不能泄其情則林泉為進退之場樽罍是言談之地白衣送酒青陽在節鳬鴈亂而江湖春梅柳開而庭院晚楚屈平之瞻望放於何之王仲宣之登臨魂兮往矣俠客時有且傾鸚鵡之杯文人代興聊舉麒麟之筆人采一字四韻成篇與員四等宴序自嵇阮寂寥尹班超忽高筵不嗣中霄誰賞古今惜芳辰者停鶴軫于風衢懷幽契者佇鸞觴於月徑巳矣哉林壑遂喪煙霞少􅍟良會不恆神交復幾請沃非常之思但宣絶代之遊託同志於百齡求知巳於千載道之存矣無乃然乎人賦一言俱裁四韻夏日諸公見尋訪詩序天地不仁造化無力授僕以幽憂孤憤之性稟僕以耿介不平之氣頓忘山嶽坎坷於唐堯之朝傲想煙霞憔悴於聖明之代情可知矣賴乎神交勝友得山澤之虯龍隱路幽居降雲霄之鸞鳳楊公沈公行之者仁義禮智用之者乾元亨利玄經苦而白鳳翔素牒開而紫鱗降金門待詔謁天子於朝廷石室尋真訪下走於丘壑幽人待士非無北壁之書隱士迎賓自有西山之饌席門蓬巷佇高士之來遊叢桂幽蘭喜王孫之相對山南花囿澗北松林黃雀至而清風生白鶴飛而蒼雲起停琴緑水仲長統之歡娛置酒青山郭子期之賓客人探一字四韻成篇仲氏宅宴序僕不幸在流俗而嗜煙霞恨林泉不比德而稽阮不同時處良辰而鬱怏仰高風而杼軸者多矣豈夫司馬卿之車騎上客盈門仲長統之園林羣英在席坐卧南郭蕭條東野江波浩曠晴山紛積嘉鴛鸞之接翼曜江漢之多才顧斜景而危心瞻火雲而變色思傳勝餞敢振文鋒蓋同席者高人薛曜等耳盍各賦詩放懷敘志俾山川獲申於知已煙霞受制於吾徒也江寧吳少府宅餞宴序蔣山南望長江北流伍胥用而三吳盛孫權困而九州裂遺墟舊壤數萬里之皇城虎踞龍盤三百年之帝國闕連石塞地實金陵霸氣盡而江山空皇風清而市朝改昔時地險嘗為建業之雄都今日太平即是江寧之小邑吳生俊寀輔佐烹鮮我輩良遊方馳去鷁梁伯鸞之逺逝自有長謡閔仲叔之遐征仍逢厚禮臨别浦枕離亭陳雲四面洪濤千里簾帷後闢竹樹映而秋煙生棟宇前臨波潮驚而祥風動嗣宗高嘯緑軫方調文舉清談芳樽自滿想衣冠於舊國樂極悲來愴零雨於中軒動流波於下席嗟乎九江為别帝里隔於雲端五嶺方踰交州在於天際方嚴去舳且對窮途玉露下而蒼山空他鄉悲而故人别請開文囿共瀉詞源人賦一言俱題四韻還冀州别洛下知巳序東西南北丘也何從寒暑隂陽時哉不與河陽古樹無復殘花合浦寒煙空驚墜葉王生賣藥入天子之中都夏統乘舟屬羣公之大會風煙匝地車馬如龍鐘鼓沸天美人似玉芳筵交映旁徵豹象之胎華饌重開直報蛟龍之髓季鷹之思吳命駕果為秋風伯鸞之適越登山以求淥水辭故友謝時人登鄂坂而迂回入邙山而北走何年風月三山滄海之春何處風花一曲青溪之路賓鴻逐暖孤飛萬里之中仙鶴隨雲直去千年之後悲夫光隂難再子卿殷勤於少卿風景不殊趙北相望於洛北鴛鴦雅什俱為贈别之資鸚鵡竒杯共盡忘憂之酒春夜桑泉别王少府序下官以窮途萬里動脂轄以長驅王公以傾餞百壺别芳筵而促興是以青陽半序明月中霄離亭擁花草之芳别館積琴歌之思去留歡盡動息悲來惜投分之幾何恨知音之忽間他鄉握手自傷關塞之春異縣分襟竟切悽愴之路既而星河漸落煙霧仍開高林靜而霜鳥飛長路曉而征驂動含情不拜空佇聽於南昌揮涕無言請投文於西候因探一字四韻成篇
