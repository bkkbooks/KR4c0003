body:
  text: 卷之一賦春思賦并序七夕賦九成宫東臺山池賦并序廟山賦并序寒梧棲鳳賦江曲孤鳬賦并序馴鳶賦卷之二賦採蓮賦并序澗底寒松賦并序慈竹賦并序靑苔賦并序四言古詩倬彼我系勃兄勵序五言古詩上巳浮江宴韻得址字春日宴樂遊園韻得接字山亭夜宴詠風懷仙并序忽夢遊仙七言古詩秋夜長採蓮曲臨高臺滕王閣江南弄落花落寒夜懷友二首六言古詩附雜曲卷之三五言律詩銅雀妓二首聖泉宴并序尋道觀而張天師居也其觀即昌利觀散關晨度别薛華重别薛華遊𣑽宇三覺寺麻平晚行送盧主簿餞韋兵曹白下驛餞唐少府杜少府之任蜀州仲春郊外郊興郊園即事觀佛迹寺山居晚眺贈王道士八仙徑數里巖徑窈窕杖而後進寺南又有昌利觀去寺可春日還郊對酒春園作觀內懷仙秋日别王長史上巳浮江宴韻得遙字長柳羈遊餞别易陽早發焦岸早行和陸四深灣夜宿山帶江主人依傷裴録事喪子五言排律泥溪秋日仙遊觀贈逍士詩無首四句一作駱賓王出境遊山二首三月曲水宴得樽字盧照鄰和得樽字附五言絶句晚屆鳳州羇春林塘懷友山扉夜坐春莊春遊春園林泉獨飲登城春望他鄉敘興夜興臨江二首江亭夜月送别二首别人四首贈李十四四首早春野望山中冬郊行望寒夜思友三首始平晚息扶風晝屆離京浸遠普安建陰題壁九日七言絶句秋江送别二首蜀中九日登玄武山旅眺盧照鄰九月九日玄武山旅眺附邵大震九月九日登玄武山旅眺附河陽橋代竇郎中佳人答楊中舍卷之四序續書序黃帝八十一難經序四分律宗記序入蜀紀行詩序三月上巳祓禊序守歲序山亭興序山亭思友人序卷之五序滕王閣詩序遊山廟序梓潼南江泛舟序上巳浮江宴序綿州北亭羣公宴序夏日登龍門樓寓望序夏日登韓城門樓寓望序秋日遊蓮池序越州秋日宴山亭序秋日宴洛陽序卷之六序晚秋遊武擔山寺序宇文德陽宅秋夜山亭宴序遊冀州韓家園序夏日宴張二林亭序夏日宴宋五官宅觀畫障序秋日宴季處士宅序春日孫學宅宴序與員四等宴序夏日諸公見尋訪詩序仲氏宅宴序江寧吳少府宅餞宴序還冀州别洛下知巳序春夜桑泉别王少府序卷之七序秋日楚州郝司户宅餞崔使君序秋晚入洛於畢公宅别道王宴序越州永興李明府宅送蕭三還齊州序秋夜於綿州羣官席别薛升華序秋日餞别序冬日羈遊汾陰送韋少府入洛序餞宇文明序感興奉送王少府序别盧主簿序送李十五序送白七序送劼弟赴太學序卷之八表上九成宫頌表上拜南郊頌表為原州趙長史請為亡父度人表啓上從舅侍郎啓上武侍極啓又上李常伯啓上皇甫常伯啓又上吏部裴侍郎啓上明員外啓上許左丞啓上郎都督啓卷之九書上劉右相書上絳州上官司馬書為人與蜀城父老書又與契苾將軍書上百里昌令書卷之十論三國論八卦卜大演論平臺祕略論十首孝行一貞修二文藝三忠武四益政五尊師六褒客七幼俊八規諷九愼終十卷之十一頌乾元殿頌并序拜南郊頌并序卷之十二頌九成宫頌贊平臺祕略贊孝行第一貞修第二藝文第三忠武第四善政第五尊師第六褒客第七幼俊第八規諷第九愼終第十卷之十三碑益州夫子廟碑彭州九隴縣龍懷寺碑卷之十四碑梓州玄武縣福會寺碑校州飛烏縣白鶴寺碑校州通泉縣惠普寺碑卷之十五碑益州德陽縣善寂寺碑益州綿竹縣武都山淨惠寺碑校州郪縣兜率寺浮圖碑梓州郪縣靈瑞寺浮圖碑卷之十六碑廣州寶莊嚴寺舍利塔碑行狀常州刺史平原郡開國公行狀刻初唐四子集序今海內湛深經術淹名理之學蓋莫長于閩而紹和徵君其尊宿也往余里居嘗嗼吾鄊之有仲醇清漳之有紹和巋然稱二大老仲醇得生同里閈少而習之紹和則巳如天際真人蒹葭宛在矣屬有天幸承乏此邦遂得登其堂披其帷盡聆塵下之霏屑兼彂枕中之鴻寶伐柯我覯永畢於斯雖復平子之抒華掞藻茂先之比物連髏但有過之無不及也紹和雅志好修不僅立言垂卋然其撰述之富抑亦近代所無既己搜刻漢魏以來七十有二家將漸次及於三唐兩宋令後世尚友作者如入寶林豈非快事乃所梓僅及初唐四君子尚未竣事而紹和告殂矣嗟乎人琴俱亡昔人所痛令唐初以後諸君子精神不經洗發豈不與紹和俱亡哉余小子竊志焉而未之逮尚兾後人不昧斯旨豈惟諸君子不亡即紹和亦不亡矣唐初風氣龎縟六朝綺靡剗削未盡四子傑出力厚而致豐觀拾遺江河萬古之推尊則知當時已群用見哂而紹和又極力表章四子之品行使不以器識兩字抹殺豈惟與江河並流雖與日月爭光可也若紹和者可謂能溦顯闡幽者也據壇坫而稱尊宿不虛也崇禎庚辰仲秋望後八日梁溪後學曺荃題于漳署之霞北草堂王子安集序自裴氏以器識程人而抹殺文藝謂四傑輕浮淺露必非騁邁長享之骨而四子淹躓不振一時剖斷終莫能拔此不過愛憎之言幸而中耳然則男子生世必盡槐鼎期頥如孔光張禹及近孔敬宗輩始克自摽根器而不愧鬚睂恐世間無此名教也且四子本傳不過掦已護前無所與讓先輩見而惡之耳若六朝傷化敗倫之事萬萬必無豈可投卑之死法中也子安天性過人夙企曾閔所遭多忤然父子兄弟之際自成雍熙至其貽愆髙堂貶官遠播百悔填膺無以自贖勢必自投蛟龍腹中以為化身處差足自原也盧升之灌園以奉毋佞佛以延毋而志俱不可伸有心人冝共惋痛若李么起義駱公應之浩氣淩霄尺檄殱牝今眀興巳𣏌侍御于學宫不知並時之人却目之為叛纍代皆狂亦獨何哉盈川以從叔弟神讓與李敬業有連神讓𬒳誅盈川亦用外鐫貞柯􅋊翆傲彼華苑四君子炳炳如此不奬賞其忠孝之大節而詆訶其𥚹急之小疪顧不謬哉子安謂人子必鋭意醫部事曺元而通祕乞鄂州而採藥其與弟詩云自余返𥘉服無情想髙蓋報國豈無情從親心乃大家門往復和易真摯且祖𫐠河汾多所彂明大有琅琅禮樂器者焉么文大率從引滿擁𬒳酣暢得來玄鶴爭蜚絳螭百變即雕鏤者所不能爭其工又字字俱有根蒂非漫言者小序碎金輝動衫袖諸廟寺碑以三珠之樹綵增七寶之莊嚴乃乾元殿等頌何以不動同時之嘆運命所遭豈大力所淂髙坐而揶揄哉余因敘子安集而備書四傑忠孝之大凡千年煙靄至是經天眀識君子必以余為知言蜚遁老人張燮識于麟角堂藝苑巵言曰裴行儉弗取四傑懸斷終始然亦臆中耳彼所重王劇王勔蘇味道者一以鉤黨取族一以模稜貶竄區區相位何益人毛髮事千古肉食不識丁人舉為談柄良可笑也王長么此假正先得我心而余又互有彂眀聊質之裴氏燮又識髮事千古囱食不識丁人舉為談柄良可笑也王長么此假正先得我心而余又互有彂眀聊質之裴氏燮又識鮑梁魏群材周隋衆制或苟求蟲篆未盡力於丘墳或獨徇波瀾不尋源於禮樂會時沿革循名抑揚多守律以自全罕非常而制物其有飛馳倐忽倜儻紛綸鼓動包四海之名變化成一家之體蹈前賢之未識探先聖之不言經籍為心得王何於逸契風雲入思叶張左於神交故能使六合殊材並推心於意匠八方好事咸受氣於文樞出軌躅而驤首馳光芒而動俗非君之博物孰能致於此乎君諱勃字子安太原祁人也其先出自有周濬啓大明之裔隱乎炎漢弘宣高尚之風晉室南遷家聲布於淮海宋臣北徙門德勝於河汾宏材繼出逹人間峙祖父通隋秀才高第蜀郡司户書佐蜀王侍讀大業末退講藝于龍門其卒也門人諡之日文中子聞風睹奧起豫道帷揣摩三古開闡八風始擯落於鄒韓終激揚於荀孟父福畤歷任太常博士雍州司功交址六合二縣令為齊州長史抑惟邦彥是日人宗絶六藝以成能兼百行而為德司馬談之晚歲思弘授史之功揚子雲之暮年遂起參玄之歎君之生也含章是託神何繇降星辰奇偉之精明何繇出家國賢才之運性非外奬智乃自然孝本乎未名人應乎初識器業之敏先乎就傳九歲讀顔氏漢書撰指瑕十卷十歲包綜六經成乎期月懸然天得自符昔訓時師百年之學旬日兼之昔人千載之機立談可見居難則易在塞咸通於術無所滯於詞無所假幼有鈞衡之略獨負舟航之用年十有四時譽斯歸太常伯劉公巡行風俗見而異之曰此神童也因加表薦對策高第拜為朝散郎沛王之初建國也博選奇士徵為侍讀奉教撰平臺鈔略十篇書就賜帛五十匹先鳴楚館􅓡峙齊宫乘忌側目應劉失步臨秀不容尋友初服遠遊江漢登降岷峨觀精氣之會昌玩靈竒之肸蠁考文章之迹徵造作之程神機若助日新其業西南洪筆咸出其詞每有一文海內驚瞻所製九隴縣孔子廟堂碑文宏偉絶人稀代為寶正平之作不能奪也咸亨之初乃參時選三府交辟遇疾辭焉友人陵季友時為虢州司法盛稱弘農藥物乃求補虢州參軍坐免歲餘尋復舊職棄官沈迹就養于交址焉長卿坐廢於時君山不合於朝豈無媒也其惟命乎富貴比於浮雲光陰踰於尺璧著撰之志自此居多觀覽舊章翾翔群藝隨方滲漉干何不盡在乎詞翰倍所用心嘗以龍朔初載文場變體爭構纖微競為雕刻糅之金玉龍鳳亂之朱紫靑黃影帶以徇其功假對以稱其美骨氣都盡剛健不聞思革其弊用光志業薛令公朝右文宗託末契而推一變盧照鄰人間才傑覽淸規而輟九攻知音與之矣知巳從之矣於是鼓舞其心發泄其用八紘馳驟於思緒萬代出沒於毫端契將往而必融防未來而先制動搖文律宫商有奔命之勞沃蕩詞源河海無息肩之地以茲偉鑒取其雄伯壯而不虛剛而能潤雕而不碎按而彌堅大則用之以時小則施之有序徒縱橫以取勢非鼓怒以為資長風一振衆萌自偃遂使繁綜淺術無藩籬之固紛繪小才失金湯之險積年綺碎一朝淸廓翰苑豁如詞林增峻反諸宏博君之力焉矯枉過正文之權也後進之士翕然景慕久倦樊籠咸思自釋近則靣受而心服遠則言發而響應教之者逾於激電傳之者速於置郵得其片言而忽焉高視假其一氣則邈矣孤騫竊形骸者既昭發於樞機吸精微者亦濳附於聲律雖雅才之變例誠壯思之雄宗也妙異之徒别為縱誕專求怪説爭發大言乾坤日月張其文山河鬼神走其思長句以增其滯容氣以廣其靈巳逾江南之風漸成河朔之制􅍝稱相述罕識其源扣純粹之精機未投足而先逝覽奔放之遍節巳滯心而忘返乃相循於局步豈見習於通方信譎不同非墨翟之過重增其放豈莊周之失唱髙罕屬既知之矣以文罪我其可得乎君以為摛藻雕章研幾之餘事知來藏往探賾之所宗隨時以發其惟應便稽古以成其殆察微循紫宫於北門幽求聖律訪玄扈於東洛響像天人每覽韋編思弘大易周流窮乎八索變動該乎四營為之發揮以成注解嘗因夜夢有稱孔夫子而謂之日易有太極子其勉之寤而循環思過半矣於是窮蓍蔡以像告考爻彖以情言既乘理而得玄亦研精而循道虞伸翔之盡思徒見三爻韓康伯之成功僅踰兩繫君之所注見光前古與夫發天地之祕藏知鬼神之情狀者合其心矣君又以幽贊神明非杼軸於人事經營訓導乃優遊於聖作於是編次論語各以群分窮源造極為之古訓仰貫一以知歸希體二而致遠為言式序大義昭然文中子之居龍門也睹隋室之將喪知吾道之未行循歎鳳之遠圖宗獲麟之遺制裁成大典以贊孔門討論漢魏迄于晉代刪其詔命為百篇以續書甄正樂府取其雅奧為三百篇以續詩又自晉太熙元年至隋開皇九年平陳之歲褒貶行事述元經以法春秋門人薛收竊慕因為元經之傳未就而殁君思崇祖德光宣奧義續薛氏之遺傳制詩書之衆序包舉藝文克融前烈陳群稟太丘之訓時不逮焉孔伋傳司寇之文彼何功矣詩書之序並冠於篇元經之傳未終其業命不我與有涯先謝春秋二十八皇唐上元三年秋八月不攺其樂顔氏斯殂養空而遊賈生終逝嗚呼天道何哉所注周易窮乎晉封又注黃帝八十一難幸就其功撰合論十篇見行於代君平生屬文歲時不倦綴其存者才數百篇嗟乎促齡材氣未盡殁而不朽君子貴焉兄勔及劇磊落詞韻鏗鍧風骨皆九變之雄律也弟助及勛㧾括前藻網羅群思亦一時之健筆焉友愛之至人倫所及永言存殁何痛如之援翰紀文咸所未忍蓋以投分相期非宏詞説濳然􅒆涕究而序之分為二十卷具諸篇目三部盛作恨不序於生前七志良書空得撰於身後神其不遠道或存焉王子安集共十六卷張燮識嘉僅行其詩賦作二卷今為並録諸篇得十王勃集至文獻通考時尚存二十卷近世永卷六參訂諸名公姓氏姚江施邦曜爾韜梁溪曹荃元宰定會稽曹惟才無竒甬東楊德周南仲較三山徐􅎾興公曹學佺能始閩漳王志道而弘盧化鰲爾騰黃道周幼玄魏呈潤中嚴溫陵池顯方直夫弟張紹科烴叔閲
