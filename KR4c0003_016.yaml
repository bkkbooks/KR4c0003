front:
  text: 王子安集卷之十六
  hash: sha256:419031d85df0925bc2e8e6c10b462d84875153c3997262f550e13cb52e0e633b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0003_SBCK_016-1a}
body:
  text: 唐龍門王勃子安著明閩漳張燮紹和纂碑廣州寶莊嚴寺舍利塔碑昔者萬人疾疫神農鞭草而救之四維凋瘵夏禹刋木以除之豈非物外其性則道功出事愆其和則任跡著傍稽素篆仰叩玄扉即時義而規大覺因彛倫而佇真諦向使三災克殄八正咸修人握戒珠家藏寶印則三十二相不可得而視也八萬四千法不可得而聞也然則聖人以運否而生神機以喪而顯况迦維授手摩竭推心高張妙用之功自極橫流之弊蓋不獲巳豈徒然哉故能業擁大千化形真一繇樂推而起七覺因來蘇而㘴三昧發揮五演以寂滅為身常提挈四流用慈悲為化迹黑風宵遁波旬忘反噬之心緑洺晨開天常識問津之所括夷塗於九相蹇步其安納慧略於重昏迷方自曉大矣哉應物而起興運而終至自於崑冥復歸於無物雖金沙宴駕雙林無可作之期而玉諜遺文六塵有經行之俗象法不可以無主微言不可以遂喪六千羅漢競結香緣五百仙人分開講肆星龕月殿俄盈震旦之墟鳳剎蠅旌坐遍閻浮之域屈伸闔闢其道矣哉夫寶莊嚴舍利塔者梁大同三年內道場沙門曇俗法師之所立也其琅琊貴族則漢庭峻節祖德猶傳梁甫高吟嘉聲未遠法師夙登真地深入慧門照果業於三明拂塵勞於八解羊車綺歲懸欣半月之詞鳳閣觿年巳振彌天之響道惟堅固行乃頭陀百結斯安斥羅綃而罷御十珍雖貴對藜藿而甘心于時以石應天人大弘緇侶法師至誠幽感獨步玄宗豈直王公欽振錫之風固亦天子降同輿之禮寶瓶宵注則雨露隨軒玉柄朝撝則風霜滿席既而素懷有在濳營擯俗之圖爰定我居首託栖霞之寺爾乃巖開石霤邑跨金陵魚峰多讚唄之歡虎溪有送迎之限紫蘿山徑居藏勝緣靑松澗戶坐諧幽致枕石潄流者久之原夫見化有緣應身欲謝昊天罔極追懷自遠故有諸天會聚共位神光列國交兵譯求其致豈不深哉然則麟鳯下靈猶稱瑞貺玉石微玩尚勝精彩亦有楚鐸淪照擢紫靄以衝星周鼎沈華吐黃雲而噴景誠浩作者之述足稱希代之貴况乎釋迦妙相如來真骨雖八萬四千之寶塔散在群方而九十二道之靈虹終聞間出立成斯應瞻庭廡而時逢非德不鄰歷山川而罕致是以優填頓顙思存電下之光波慝投身願奉巖間之影粵在梁武精求不暇以為秦登碣石而事止尋仙漢索瀛洲而心非好善於是齊筵鳳設上祈忉利之宮講帳星隨下請龍王之藏輕齎棹海重賞梯山庶玉匣之全移幸金棺之半啓以法師智遺人我識洞幽明思假妙因冀通靈感爰承綸紼載踐滄𬈑過石門而右指歷銅標而左顧乘桴月沂戒楫星沼相彼遐陬實惟荒裔一音演說本承聽受之鄉五日繼明素隔照臨之域珍奇乃萃聖德攸傳則知有感必臻信覃幽境不行而至豈隔殊方法師既達國城式敷朝命受銑筐而頂禮撫瑤緘而跪發盡收其寶重載而歸亦猶珠匿弊衣須馬鳴而後用金藏陋宇待龍樹而方開梁氏之都妙箕而仰神光家之繇也十四字疑有脫誤炎涼可質往反九十旬楫柁不輟風潮八千里以大周三歲届于兹邑法師性豐幽淡質固虛羸綿歷是淹疲疴屢積維摩見柄蓋伸方便之門道安謝歸思遠朝廷之事願居此剎有詔許焉仍分舍利俾弘真福國惟甌駱郡實番禺爾其封疆跨躡之壯海陸會同之衝上當星紀下裂坤維階百越而鄰三吳軹雕題而陬交趾神化氣色汀洲建不死之鄉舜禹精靈原隰現行宮之地閭閻霧撲士女雲流謳歌有霸道之餘毗俗得華風之雜蜃樓高峙猶埋夕帳螺臺峻績尚識朝基信夷夏之奧區而仙靈之窟宅也此寺乃曩在宋朝早筵題目法師聿提神足願啓規模爰於殿前更須彌之塔因緣盛力人以子來徵日官而正墨集風師而舉草育王奔令掃地戶而獻神兵𣑽事馳心感天官而下靈匠崇階遽積寶樹俄周不殊仙造還如湧出故其粉畫之妙丹靑之要璿基岌其六時雕關紛其四照仙楹架雨若披雲翳之官綵檻臨風似遏扶搖之路散華璫於月徑璧合非遙撥􅊻網於星潯珠連可驗玉虬承􅋼傃雲竇而將騫金爵提甍拂烟衢而待翥瑤窗繡戶洞達交輝方井圓泉參差倒景雕鐫僃勒飛禽走獸之奇藻繪爭開復地重天之奕懸梁九息良馬駿走而未窮疊磴三休的盧騁犍而知倦是栖銀槨用府瓊函採舍衛之遺模得浮圖之故事爰自梁末以迄皇初城邑屢新軒墀若舊雖復百魔蜩沸聽鼓鐸而懷音六賊蜂屯仰椽欒而革靣多回淨施罕犯仁官則知會吹遐斯同偃草慈雲所潤豈直流根故能比獨守之祠堂長為典制均魯王之祕殿若有明徵而其作鎮一隅俯災荒而獨秀盤基有地冠終古而長存者乎國家業擁事初事用皇極高祖以援疑撥亂伏紫氣而登三太宗以端拱繼明自黃離而用九皇上纘乾坤之令業振文武之英風太階平而百度理中國定而兆人樂時和歲阜邑頌塗歌以五刑不用六械徒設舟車四達誰論貢賦之差襟帶八荒非復華夷之隔天寶降地符升木石甄祉飛沈效慶雖叶和制變實類文思之功而持盈守成亦資連帥之助大中大夫使持節廣韶等州都督李某早登淸貫夙踐崇軒嘉猷回發於天朝善政果行於朞月越溪仙鍔吐光芒而駭人岱嶺寒松排風颷以成性美哉稱繇功著鶻響徹於雲霄方為時須熊軾疲於道路廣陵單轂如送張綱渤海亂繩復思龔遂王尊皂蓋欣臨折坂之前吳隱朱軿更集貪泉之右高名夙著佛化橫飛群盜屏跡而歸農姦吏聞風而去職京坻坐積圄犴濳回汲黯之臥淮陽直聞淸淨王堂之居汝郡但舉賢良用能使檻穽不施猛獸巡江而逺竄市㕓無擾商旅倍道而相歡颶風寢􅧆炎埃罷厲人稱有道家實無為加以援翰寫心自契真廉之㫖高談見意不踰玄默之津學究儒林真窮釋部知通人事且味禪宗道可以知歸物繇其顯會是歲也忽於此塔重覩神光玉林照灼金山具足倐來忽往類奔電之含雲吐𦦨流精若繁星之轉漢傾都共仰溢郭周窺士女幾乎數里光景動乎七重實孟冬之日也觀夫至道不私瑞生必繇乎樂國慶基有會福至必依於善人自非化足動微教非飾迹何以發真如之盛契壯實相之輝華在昔鳳集頴川宣后歸功于良守龍游湘浦章帝布德於賢臣歷選前猷兹為故實然後上和下睦主聖臣良滅火返風雖有辭於進讓母修子應亦何愧於當仁至於百越衣纓三闕耆老或代道篁竹氣推丹桂之城家擅芝蘭名動蒼梧之野出平原而祛甲擁崇闥以鳴鐘並為蕃部之恩親覩招提之瑞同祈介福共潔齊壇罄龍象於南州盡衣鉢於西竺會吞方仗供僃盂蘭法鼓振而沙界肅洪鐘鏘而鐡圍淨妙財爰捨法施爭流華轂牣於香城文駟填於寶廄鏹藏巨億更入僧田價直百千還登佛座豈徒照車十乘列隨氏之明珠盈篚萬金積大顚之寶具而巳朝散大夫守長史某地乘華緒價揠名流豫章擢而成幹騏驥生而躡影山濤天骨無情吏隱之間王衍風神自出塵埃之表自沗榮嶺海作式瀛幽略其小術包其大體振溫良之逸步得毗贊之弘綱布道移風善寵邦政歸休置驛獨守家聲然則野老行歌雖致功於露冕藩君坐嘯固藉美於題輿化成異壤抑繇同德故能道揚法教揮斥蓋纒家懷方廣之恩人慕韋陀之學傳燈繼廣曵組成陰下逮府僚旁周縣寀並志薰修同希福慧可謂爾之教矣何日忘之者乎時有明威將軍行禺府折衝都尉李公天子之舊屬朝廷之夙將也靈根自遠聖族多奇受睇盻於甘泉奉衣纓於平樂靑龍帶劍光超殿閣之榮白武銜珠早陟齊壇之寵自招皇誕作鎮邉城湟水樓船遂勞都尉灞陵車馬尚識將軍魂驚斷鴈之峯恩盡沈鳶之浦濡鱗涸轍處定水而彌勤撫翼香林在窮途而更切頻光法會荐委珠珍護持攸仰招提是屬其兆基也如此經綸黼藻其大矣哉爰自上座實綸等竝妙根宿植勝果將圓翰飛般若之林高步檀那之舍慈襟密洞散明月於談筵智鍔相輝化繁霜于寶創思雕琬琰式播徽猷弟子家嗣太丘沗閨門之薄宦地連睢渙竊藻繪之餘工爰託下才用旌高躅豈知仲宣旅泊方銜深井之悲長卿罷歸空負凌雲之氣我之懷矣乃作銘云太息頽運嗟呼失道德弊為仁物壯則老縶猿情暗求梟計早赤水沈珠玄丘墜寶皇矣妙覺蒸然應期宗深微妙業奧慈悲燃燈匡俗捨筏濟時涅槃不住般若無思俯迹見生和光不滅色音雖昧規模尚切猗歟上人穆彼惟新智傾八藏心超六塵凄凉燬宅解脫迷津鴻冥佇想龍蟄存身靑蓋遺邦黃旗故服原隰形勢江山重復澗戶秋明巖盤夜燭鼓鐘于宮聲聞于外聿求紫闥言尋丹瀨絶域棲遑驚濤顚沛至誠冥感神珍顯會甄陶設險翼軫疏源尉陀餘國盧尋舊邊邑居雄盛人物􅎋全是惟樂土實日龍川護持靈剎莊嚴寶塔基構鼎新亭欒櫨業奔日宵排歸雲曉納架壁三休連甍四合分惟星紀境控天池棟宇綿邈衡津推移神機丕應瑞景濳儀光合玉廡彩動金枝凡我僚庶同嗟權實周顗情勤王濛思逸咫尺幽鍵往來靈室共蔭法堂俱歸慧日四維信受三明弘益貝葉紛綸龍華舄奕講肆宏敞齊筵巨翼供引純陀飯回香積天人合契幽顯同心傾家奉賄破産移琛軒裳敻鶩纓珮交臨蘭薰習遠檀那意深偉哉連率冲乎德化職重隼裳秩遵熊駕酌貪貽則還淳息詐道濟香城禎凝寶舍琳琅什種𣏌梓緇徒調輕僧會辨折文殊奔螭易失令鼠難拘願刋貞琰永冠康衢伊我窮途欣兹勝謁文休泛海仲翔遊越尚想知音有懷明發􅍝惟雅顧叨陪天骨爰抽弱翰式敘高蹤孤音易竭獨賞難逢思起王粲悲生蔡雍豈無章甫誰適為容行狀常州刺史平原郡開國公行狀某州縣洪颷未翔靈鳳垂翼景雲不燭神龍宛頸豈非時不可以苟遇道不可以虛行聖人作而萬物睹神功資而百寶用是以山川倒徙太階懷息亂之臣天地離乖元首佇康時之具則有得其數者於平原公見之矣自星虹杳祉開寶曆於軒圖雷電窈冥載休徴於魯讖龍驤鳳起霸王存玉壘之雲紫蓋黃旗王迹著金陵之野故得卿才表秀疊彩駢蹤皂蓋朱幡連州比郡公矦必復子孫承百代之基餘慶不忘仁義應千齡之運公鼎門疏照穴岫翔輝分獄秀於樊矦禀辰精於傅說折旋儒館以六藝為笙簧軒翥翰林用兩京為鼓吹經邦化俗涉游夏之門庭减竈麾兵得孫吳之閫奧皇天眷命聖武膺圖覩物懷人思功去罪寰中有事曹參希執帛之榮閫外多虞周緤企中軍之寵見危授命藏器及時攀鳳羽於九霄候龍顏於千里蕭王內寢頻獻雅誠韓信齊壇屢遷優秩武德三年授中郎將俄遷大將軍秦王統軍皇基肇闢天步猶難宸扆應上相之榮仙夢受中權之寄被廬講將實賴宏圖今日僉謀光應時望于時弄兵竊舉猶勤甲胄吞沙餌石尚阻河梁公制變以奇蕩除以殺七擒三捷之略緒著轅門拔旗穿札之能勳在盟府五年六月加上柱國隨班列也剪桐疏爵分茅建杜下斷物土上格星躔唐虞著其升降周漢明其損益所以羽儀帝室蕃衛王畿懲惡勸善庸賢敘德高祖勳逾黜夏業擅戡黎置酒醴於南宫揚旌斾於東府建皇帝之號安不忘危覽徹矦之籍榮而思報以公乃誠匪懈原始要終望嚴雪而識寒松觀疾風而知徑草九年封望都縣男貞觀元年改封縣矦文貔禁旅實著趫雄淸道啓行允兹多士自非譽高朝諷價重人謡仍虧博望之儀必亂鈎陳之選公早陪戎律夙簡帝心􅏡歷二宫當仁不讓授左衛中郎俄遷右虞矦率䓤山狄壤蒲海蠻陬信要服之外區乃胸奴之右地境鄰蛇澤乘徑席而鵰騰郡邇酒泉候霄塵而鶚視天子乃停旒側聽負扆晨驚振洪策於古今溢嚴勳於覆載將使八紘昭泰銀臺應益地之圖九縣平夷瑤水流尋仙之駕貞觀某年授高昌道行營總管公道凝三略功標五才逸氣縱橫雄精貫月象物而動鼓鼙肅戰士之容推信而行歌舞表將軍之德褁糧坐甲輕死等於鴻毛投袂衝冠重義均於熊掌鑒空歸惠荒度來賓收鄭吉之前蹤復張騫之故事廟堂頌德魏闕疇庸光贊末條非公莫可某年授某州刺史尋以江沱粵域衡霍名區楚情剽狡吳風澆競火耕水耨郡闕婺女之精竦劍危冠人尋鱄諸之弊分宣演化卧理切於宸襟易俗遷訛行吟佇於人望貞觀某年遷睦州刺史政刑不匿考績連最俄授使持節松州都督今上鈞臺嗣曆鼎邑凝圖百城勞晉武之心千里揚漢宣之詔璽書加秩縟禮請藩綸煥增班事高恆典永徽中改沙州刺史屬鼇山亂德鴻水稽誅扶桑落日之濱妖朋蟻結孤竹尋雲之際孽黨蜂騰百濟遺黎託懸巢而斬氣三韓別種附危幕而遊魂玉帳搜兵佇責包茅之貢金壇令律將收楛矢之琛龍朔年中授公熊津道總管公昔從幕府早厠戎行覽兵法於軒轅受陰陽於吕望三門五壘得破敵之奇謀大艦雲梯總行軍之妙法故得戰無全陳野靡堅城摐金將躍馬暫臨銜壁與牽羊相繼豈惟秋方息亂遙聞定遠之名春谷投心遐想度遼之策若斯而巳矣及三軍獻捷諸將論功帝嘉乃勳作鎮炎野授公廣州都督改封平原公以途鄰北戶地接南池珠崖魑魅之鄉桐柱貪􅋊之境纍藩斯寄歷任稱難於是受以春風臨以夏日明冠婚於縣邑布庠孰於閭閻薤本誅強姧豪屏氣棠陰察獄􅑏獨申哀理龔遂之亂繩解虞卿之錯節黃霸得循良之譽績未衒於邊城陳湯有方靣之勳位不登於刺舉兼方具美其式兹乎朝廷以公屢參伯牧駿歷班條吏不忍欺人無胥怨伏情馭極留連稷野之童託義訓毗惆悵耶溪之老雖有黃槐紫棘無以易堯盛嶽名都猶聞借冦麟德元年改授金紫光祿大夫常州刺史既而天機忽爽大漸彌留白玉徒煎黃金難化台階側席方膺雉冕之尊玉女停機俄逢鵲衣之變以某年某月日春秋若干薨于公舍嗚呼哀哉惟公間氣呈姿靈和叶慶鳳鳴千仞鵬搏萬里情關峻遠得意於衆妙之門性宇沈凝忘筌於毁譽之境因心以至孝悌表於鄉閭臨義而行祿賜均於宗族故得虬驟蠖屈服冕乘軒臨漢於締搆之辰游梁於駭亂之際章溝霧闢曵鶡尾而晨趨甲館烟開奉旄頭而夜警鳴鼙出塞進李牧之竒誠露冕巡方受蘇章之直筆方當獻納黃屋揖拜靑墀入東寺而掌壺處南臺而曵履不謂藏舟夜涉負杖朝興丹丘之化未尋玄扄之痛俄及故怨深徹樂悲纏罷市者乎謹狀
