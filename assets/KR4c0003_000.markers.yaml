  - {type: variant, offset: 3, length: 5, content: 賦春思賦并, WYG: 公案一公謂僧一行也一公言北斗建午七曜在南方有是之祥無位聖人當出華盖以下卒不可悉洪邁容齋隨筆亦曰王勃等四子之文皆精切有本原其用駢儷作記}
