  - {type: indent, offset: 9, content: 　　　, id: KR4c0003_krp_000-bkkind4}
  - {type: variant, offset: 9, length: 250, content: 七夕賦九成宫東臺山池賦并序廟山賦并序寒梧棲鳳賦江曲孤鳬賦并序馴鳶賦卷之二賦採蓮賦并序澗底寒松賦并序慈竹賦并序靑苔賦并序四言古詩倬彼我系勃兄勵序五言古詩上巳浮江宴韻得阯字春日宴樂遊園韻得接字山亭夜宴詠風懷仙并序忽夣遊仙七言古詩秋夜長採蓮曲臨高臺滕王閣江南弄落花落寒夜懷友二首六言古詩附雜曲卷之三五言律詩銅雀妓二首聖泉宴并序尋道觀而張天師居也其觀卽昌利觀散關晨度别薛華重别薛華遊𣑽宇三覺寺麻平晚行送盧主簿餞韋兵曹白下驛餞唐少府杜少府之任蜀州仲春郊外郊興郊園卽事觀佛跡寺山居晚眺贈王道士八仙逕數里巖逕窈窕杖, WYG: 碑碣盖一時體格如此}
