front:
  text: 王子安集卷之十五
  hash: sha256:23a769235b93970d2d87ee3f9bedb477ba8126370cbf7dd8780a880679dc1fe5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0003_SBCK_015-1a}
body:
  text: 唐龍門王勃子安著明閩漳張燮紹和纂碑益州德陽縣善寂寺碑若天玉繩高曜分寶曆於皇階金榜洞開道璸暉於帝幄雖復蒼梧北望湖湘盈舜后之歌緑荇西浮江漢積文妃之頌未有激揚煩蔭栖妙果於香城揮發蓋纏樹冥基於淨域則紫房丹室猶居燬宅之間朱紱瑶筐未出塵籠之際我國家鳯翔元氣駕黃幄而層飛龍躍太虛絶蒼根而止傃文皇帝以八才御曆光升岱野之榮文德后以十亂乘時恭贊塗山之業握仁王之寶鏡日月重光驅𣑽帝之金輪雷霆靜祲涅槃甘露承眷而宵流般若靈音雜祥以晝引蛟臺蜃閣俄交震旦之墟月面星毫坐照毗邪之國善寂者蓋舊寺之餘趾梁武帝之所建也爾其碧雞仙宇分絶障於金堤石兔遙源控長江於玉峽封畿四會龍坰舍衛之壇里閈三分塵野經行之地洎蒼鵝上擊銅馬交馳祗園興版蕩之悲沙界積淪胥之痛火炎崑嶽高臺與鴈塔俱平水浸天街曲岸與猴池共盡山川隱嶙空傳鷲嶺之基灌莽肅條非復鶯林之樹武德伊始君子道亨正皇極而撫寰中登太階而臨天下函關雲物更逢真聖之期井絡星辰重集會昌之運雖開基撥亂獄訟知歸而繼絶興亡經綸未暇先皇統業貞觀御宸奉文物於三天布聲名於十地參羅上下充槖籥於襟懷八部神祗薦圖書於掌握皇寶降地花升含生無昏墊之虞法衆有來蘇之望俄而後庭搆癘椒房穆卜六宮震恐三靈愕貽馳瑤展幣有事於群宗碧劑玄針無徴於衆術帝乃降監回慮屏璧與珠追勝迹於靈關事良緣於福地爰紆聖綍重啓禪宮峙璇剎於將傾鎮銀繩於巳絶絲綸既洽棟宇行周坤德用寧陰儀再朗於是林衡授矩周官詮揆日之工􅎚匠揮斤荆客錬成風之巧重楹畫栱坐出天霄復樹文閨俯臨電宇顯慶中縣令蕭君道弘理鈎繩於日用慿藻繢於天成仙官之妙匠可尋盧舍之神模不墜雕甍鶴翥曵珠網於星津繡桷虬伸吐璿璫於月徑緑房丹鎖彩綴晴霞紫閣靑疏光含薄霧春風瓊樹香飄席上之蘭秋水銀塘影數軒中之芰晨光轉卉翻寶字之龍花溽露低枝蕩真文於貝葉天童潤色黃珉碧玉之壇海聖彌縫師子龍王之會建靈幢於厚夜琢飾年深懸法鼓于迷津規模歲遠時又於佛堂東壁畫二聖僧丹靑未畢大啓神光鄰玉麈之崇輝發金龕之實相朱軒夕朗似遊明月之宮紺宇晨融若對流霞之闕繇是岷英蜀秀攀講序以雲趨帶燕裙鸞仰齋庭而霧合貪機大阻淨施旁流綺羅分解珮之因軒蓋得捐金之所靈妃翳日捨翠幄於香筵仙客停雲落霓裳於寶地自非沖姿密契景應濳周豈能昭義祉於氤氲動玄機於肸蠁者也爰有上座弘一節並沈研性符隱括仁棠凝妙律於神珠肅靈椒於寶印太昊奉楫截苦海而橫流風伯扶輪歷邪山而效駕騰燭龍於慧炬俯鏡重昏奏鳴鳯於天歌下淸羣籟摩珍在握遙臨七寶之宮正覺為心俯闢三乘之路湛衝樽於忍地品藻雞園推水砥於言河扶持象化縣令宇文某河南人也帝隋尚書之元孫皇唐侍中之令子爾其虹旗萬里御六氣而鵬翻霜戟千羣擁三州而鶚視帝葉皇枝之重對越乾坤金縢石匱之功光華宇宙公上流提慶中和育祉見鐘鼎於南鄰奉軒寰於北闕雲姿月步下瑤澤而追風雪羽霞翎歷珠田而矯霧芳蘭公子即以地業高人幽桂王孫即以琴樽待物敘徽猷於禮樂則爼豆縱橫談賞契於林泉則煙霞咫尺自裁聲百里揆化雙川收武城之故事擇中牟之令典仁風易狎候丹籜於春坰惠化難經佇靑鸞於曉隊山巨源之遠量嘯傲行藏謝太傅之高風從容語默縣丞王敬衣簪舊族孝友名家白虹緘抵鵲之光紫電蓄衝牛之氣七年高秀拂曾漢以非遙六月雄圖擊長波而未遠鄉耆等少承榮緒中區勝族門稱東別之標地接西隅之嚮嚴君平之履道盛德家傳秦子整之談天風流代襲咸以為妙圖真諦事出於無名翠琰玄碑道凝於不朽弇州北跨猶疏騄驥之銘文石東區尚勒元龜之頌况乎玉衣流慶事屬於仙幃金屋延祥福纏於𣑽宇爰求勝筆載記芳謡下官弱植少徒薄遊多暇薜蘿人事空餘江海之心筆札神交尚有淵雲之氣相如謝病訪詩酒於臨卭丘也栖遲聽絃歌於單父群公以道之存矣思傳記德之書下官以文在兹乎願展當仁之筆其詞曰蜀嶺東漸岷山西積月峽星橋勝金孕碧肸蠁靈兆丘墟𣑽迹鴈塔推基鹿苑遺迹肅肅黃運英英文母配乾垂慶儀坤握矩寵照香城仁沾淨土爰光大壯聿求多祚靑牛福地白鶴禪林重扄霧敞復殿雲深龕雕翠玉剎樹黃金龜鏡夕照鳳鐸晨吟慧樓彌望化臺出沒楝列長虹窗栖明月果脣周映蓮眸間發雨霽猴池煙生龍窟肅穆禪衆優遊令宰方駕康衢連舟性海鷲嶽增飾雞林潤彩藻繪相尋丹青盡在我今懷矣窮路何岐承風詠德展義陳詞百年心事千載風期東西南北栖遑幾時益州綿竹縣武都山淨慧寺碑原夫帝機寥廓雲雷驅妙有之功正氣洪荒淸濁構乾元之象融而為川瀆結而為山嶽五城韜海接崑閬於大都八洞藏雲冠瀛洲於巨闕造化之所偃薄靈谷之所啓處極緹油而縱觀詠頌寧殫出宇宙而高尋風煙罕測是知玉巵無當遐荒非視聽之津金榜所存城闕盡江湖之致何必九蚪齊鶩直訪銀官八駿長驅遙臨石室武都山淨慧寺者梁大清年中之所建也名山列嶽之舊仙都福地之湊黃龍負匣著寶籍於經山紫鳳銜書蔭榮光於井絡須彌山頂仍開𣑽帝之官如意山中即有經行之地爾其盤居跨險列嶂慿霄日月之所竄伏煙霞之所枕倚飛泉瀑澑蕩滌崩崖緑樹玄藤網羅丘壑飛塵作氣被萬吹於中巖帝琰司寒宅千霜於北谷丹梯碧洞杳冥林岫之間桂廡松楹寂寞風塵之表是稱英鎮實瞰崇岡閭閻當四會之街城邑辨三分之地綿磎錦瀆下浸重巒玉阜銅陵旁分絶磴山川絡繹崩騰宇宙之心原隰縱橫隱軫亭臯之勢頃以黃旗夜徙紫蓋晨傾九服失圖三靈在疚姧臣躍馬據折坂而吟雲壯士聞雞擁陽關而嘯雨岷峨失險化為鋒鏑之場江漢橫流非復朝宗之國禪宇繇其覆沒法衆是以凋淪國家奄有帝圖削平天釁紫宸反照皇階即敘萬國順百靈朝幽顯再立華戎一揆燭龍韜景避堯日於幽都雲鵬斂翼候虞風於晏海以為軒階具美功窮望祲之臺漢道兼弘力盡祈年之觀爰經寶地大啓祥宫撫香象而高視鳴法螺而再唱龍垣淨土連帝道而重光鶴苑崇基脫皇居而首出况乎山精舊壤下鎮偏隅天帝遺墟上干躔次王舍城之宫闕白玉猶存給孤獨之園林黃金尚在法物繇其大僃盛德所以相尋株兵奉天藏之圖泉女獻山祗之籍離亭合榭因岸谷之高低疊觀連房執岡巒之曲直丹崖反照畫栱相臨緑障斜煙雕簾間出豐隆曉震次復􅋼而悽皇列缺晨奔望崇軒而愕眙千香寶樹自起風煙九乳仙鐘獨鳴霜雪銀龕佛影遙承鴈塔之花石壁經文下映龍宮之業虹生北澗即挂新幡鳳下東岑還栖舊剎若乃尋曲􅔍歷崇隈周行數里直上千仞蒼松蓄吹臨絶徑而疏寒黛篠防煙繞回疆而結蔭春巖橘柚影入山堂秋壑芙蓉光浮水殿亦有山童採葛入丹竇而忘歸野老紆花向靑溪而不返山神獻果送出菴園天女持花來遊淨國實杳冥之祕訣託幽深之逸境豈直淮南桂樹暫得仙家江左桃源終迷故老而巳爰有寬閣梨者俗姓楊氏其先華陰人也因官徙地家於綿竹山分太華水帶長汾川嶽會同風雲感召玄經素論侍郎居八俊之英緑綬黃軒太尉列三台之首法師玉函降彩金瓶探色振八解之遙源踐三明之廣路靈機入證窮象載於初髫妙諦因心釋羊車於弱冠三千法界繇廣位而出無明十二因緣自普濟而登彼岸弘宣誓願大振沈黎揮覺劒而破邪山揚智燈而照昏室彌綸所被白馬盡於禺同權漸所開黃牛至於嶓冡虔誠樂土憩影兹峯乃以貞觀九年於寺西院立七佛堂一僧舍星毫動牖月面分階彩鳳銜旒神龍負塔飛煙湧座龕龕忉利之天香霧成臺樹樹菩提之果朝散大夫行縣令淸河張楚親承妙業俯刋貞琰林宗有道伯喈無愧法師夙機少悟應變多奇玉山中斷瓊林下雜支道林之好事語默方融釋慧遠之高居風埃遂隔洎乎坐忘遺照返寂歸真城肆颯然若遺空山黯而無色豈直巖枝泣血澗戶摧梁而巳哉縣令劉照彭城人也自碭山仗劍綰鳳曆於雲臺春郊授鉞嗣龍圖于白水玉壘三分之胄下雜公門金陵一霸之基旁參帝緒翠緌丹紱歷今古而先鳴人傑地靈冠山川而得俊君膺嶽瀆之秀挺風雲之會昆溪劒鍔直照胸襟楚澤圭璋濳周履行魯恭明德方升漢輔之階潘嶽能文且職河陽之縣仁徽可被闔境仰其風猷威德所加百城疊其霜彩尚乃康莊妙域光開不捨之壇舟楫愛河昭暢無生之業痛鷲林之殄瘁悲象教之榛蕪爰命緝興式光泉藪虎溪龍澗近分廬嶽之圖金闕瑤臺更討瀛洲之記銘曰武都仙鎮龍墟粵域邑動香城山開淨國澗流百道峰雲五色谷暗藤斜山高樹逼千楣鶴列萬栱星懸分林構址接磴開門里臨階竹樹繞棟風煙龕前怪石塔下秋泉緑崖疏徑靑岑拒室霧道相縈煙房互出葉濃磎淨花深嶂密鳥度難尋猿驚易失簷分石竇地絡金沙丹丘抗月碧洞栖霞松開野路桂列仙家仙罏柏葉寶座蓮花砌因巖曲橋隨峯返果出天厨香來仙苑玉鑄啓曙金璫照晚谷思鐘張山悲鐸遠閭閻殘勝銅墨高情聲飛別邑望動專城懸金道肆刻石山楹千載之後于嗟令名􅎚州郪縣兜率寺浮圖碑若夫仙樓白玉窈冥崑閬之墟神闕黃金寂寞蓬瀛之浦斯則岡巒髣佛稽鳳册而空存島嶼慿陵􅋈龍舟而罕逮至若按皇軒於夏籙考璿構於殷圖周王北洛之官秦帝南山之閣西京故事下聽雷霆東國餘基俯臨風雨莫不陵遷谷變共榛灌而丘墟火絶煙沉與雲雨而坱莽其有據坤靈之寶位借神道之冥扶占象緯而圖基揆川原而宅址蜂臺映月還臨舍衛之城鴈塔尋雲即對𡺸闍之嶺成而不毀者將斯之謂與兜率者隋開皇中之所建也爾其林泉糾合之勢山川表裏之制抽紫巖而四絶疊丹峯而萬變連溪拒壑所以控引太虛蒸雲駕雨所以蕩泄元氣涪江千仞波潮將旭日爭光都城百雉甍棟與晴霞共色信光造化之竒模盡登臨之妙境玄房霧轉抗金樞於桂岊之前紺殿星開栖玉剎於靈境之際巖花落沼近拂天衣澗葉知陰斜籠寶座宵汀鶴警乘鼓吹而齊鳴曉峽猿淸挾霜鐘而赴節若乃巡碧磴歷玄階鎖窗澄彩瓊鋪洞照神姿滿月疑臨石鏡之峯衆馥揚煙似對香爐之嶽信可下淸人境上配天都為勝地之先鳴執名山之右契者也爰有信弟子某乙等夙祛塵網早植慈根悲𣑽室之未弘悼禪居之猶𥚹以為上棟下宇河圖避風雨之災廣榭崇臺時令著高明之宅是以菩提長者競潔舍衛之壇天帝人主爭闢仙官之塔則知威容下麗群生鮮瞻仰之因材朴重雕黎人有子來之地乃於寺內建浮圖一所某年月日鄉望等兆基弘願繼發淨因陵轢中天規模大壯高列砌架回浮輊軒直上千尋周回百步占氛候景神祗叶幽贊之功揆墨端行班倕逞絶群之思收岱宗之𣏌􅎚聚崑山之玉石土兼五色金逾百錬龍蟠萬拱策屏翳而高驤鶴矯千􅎝冠扶搖而獨運重簷藹藹雲將反覆於􅎉軒洞宇寥寥風伯栖遑於戶牖仙娥去月旅方鏡而忘歸寶婺辭星攀圓璫而未返玄甍湛䨴若鵬飛之戾九天丹楹聯騫如鳯翔之據千仞每至韶光照湛爽靄晴遙列郊墟於四野開雲氣於千里風恬雨霽煙霧藻天地之容野曠川明風景挾江山之助則有雕簾繡軸排淨域而停輪寶騎銀鞍指珍臺而聳轡於是披岫幌抵巖扃攀翠復而三休步玄梁而十憩廊軒外敞淑氣長延陰室中開鮮颷自激俯環瀛而極望積蘇非遙出雲漢而高踐靈槎可記真福地之殊觀香城之巨麗者乎寺主等沈研二諦振耀三關抵蒼璧於邪山攬玄珠於定水挹其流者曲成般若之緣承其風者濬發菩提之願長史河東裴某風神朗潤操履貞勤蕭條江海之心磊砢氷霜之節下岷關而叱馭寄切全都臨蜀野而宣條功深半刺縣令衛玄海內高流河東望族榮高銅墨任屈絃歌浹辰而風化大行踰月而姧豪屏氣陶濳彭澤自得高人王吉臨卭仍延重客縣丞胡敬仁三河舊轍一代良材提鏌鋣而願割局驊驑而待步江湖秋至方懷縱壑之圖海浪風高未接垂天之翼鄉望等並中和受氣孝友承家才稱江漢之靈地實岷峨之秀或以時良入選擢迹鄉鄰或以朝望來儀升名郡縣並沐康衢之化俱承比屋之封瞻彼岸而同歸登春臺而共樂咸以垣墉遽覆猶傳路寢之歌銀鼎俄穹尚勒靈臺之頌况乎崇基奕奕與天地而爭工層構峩峩配山川而永固豈可使弘規在我空存蔽月之基雄筆同時不借凌雲之氣謹聞乃作銘云二象成紀三才定位開剖太虛導引元氣紛紛化迹颷颷聖致行傑趣約歸同葉異法王西眷教迹東逰功超道茂義冠儒流丹靑既僃棟宇旋周𣑽宮霞積香閣星浮𬗟想蓬瀛金臺逈起曠瞻崑閬瑶房峻峙壯矣名都神居攸止大哉英服兹峯誕紀金繩對嶺玉榜分岑松扄委鬱桂幌深沈雲龕樹晦煙洞花深重巒霧結復澗泉吟肅肅禪衆遙遙淨境鹿野經文龍宮拂影𣑽臻金室光來石井峽曉猿淸池曛鶴警岷峨舊族江漢英姿爭開法願重崇峻基占雲接廡揆景分墀天人合應幽顯呈期靈思孤出神模獨湧霧積千楹霞張萬栱玉牖星羅璿璫月擁復榭龍蟠重甍鳳聳峩峩峻岊奕奕崇標雕簾切漢寶綴凌霄深窗閟景洞戶流颷銀缸夕映珠鐸晨搖我辭秦隴來遊巴蜀勝地歸心名都憩足甫逮鄉縣頻移灰燭聿從良時仍尋妙躅曠望原陸周流江汜桃李春風芙蓉秋水煙霞四面關山千里他鄉寓目兹焉復幾􅎚州郪縣靈瑞寺浮圖碑若夫神州括地寰中分五嶽之圖巨壑浮天海上擢三山之秀造化之所樞紐靈仙之所窟宅故得昭灼天漢發揮雲氣牛頭山者即廣漢之名峰也圓裔幾乎數里直上逾乎百仞若乃巖泉銑石之什風煙草木之狀傾九圍而得雋環四時而競爽蒼岑隱嶙旁分玉砌之階碧洞逶迤下掬金陵之苑實群聖之所託也隋開皇中王秀作牧益州來窺勝地首旌嘉號仍疏淨域因危裂戶就嶺磴之成規跨險分榮借岡巒之回勢工窮雕鏤妙出丹靑飛棟神行回甍靈搆又於山頂別建浮圖隋運告遷明皇首出軒疏雕昧基砒堙蕪奄興宣榭之災施及柏梁之燼鄉望等馳心妙律夙契禪居悲𣑽宇之摧梁痛珍臺之絶構思弘法願重緝竒功黨且千家集惟巨萬以為玉樓星峙稽閬苑之全模金闕霞飛得瀛洲之故事指香城而聳睇臨火宅而危魂參妙範於神明騁良工於宇宙飛廉按轡定樞臬於風衢羲和頓策撥鈎繩於日路雕簷畫栱龍回紫漢之間復􅋼重欒鳯舉丹霄之外瓊扉暮敞挂明月於金鋪繡桷晨開落繁星於玉砌每至兩江春返四野晴初山川齊而風景涼林甸淸而雲霧絶沙汀送暖落花與新燕爭飛城邑迎寒涼葉共初鴻競起則有都人襲賞慿紫檻而延襟野客含情俯丹􅎉而極睇窮百年之後樂寫千里之長懷信可以澡雪神襟淸踈視聽忘機意於紛擾置懷抱於真寂者矣且勃旅遊岷徼漂舉涪鄉年晷一窮時灰七變王陽西上方驚斂轡之心王粲南征實動登樓之思我之懷矣乃作頌曰大塊甄筫名山作紀發地龍盤干霄鳯峙風雪萬邑岡巒千里絶域天成珍臺地起揆剎玄嶺圖基丹嶠層棟崢嶸重簷􅌄窱有隋紊曆重明改照事與時遷迹從原燎義均除舊事切為新如或繼者代有其人聲飛隴蜀望動州鄰爭開禪施競植靈因控險裁標循危列構巖煙接廡峰雲對􅋼鐸運星衢璫懸月竇紫軒霧合丹梁露透暮春疏節新秋戒序照滿暄郊氣銷寒渚樹濃鶯亂川長鴈舉流涕寫懷魂馳意與偉哉靈宇壯矣全摹窮高極麗遠覽長圖賞因時合筆為神驅有情君子誰為捨乎
