body:
  text: 王子安集巻二欽定四庫全書王子安集巻三唐王勃撰五言律詩銅雀妓二首金鳯鄰銅雀漳河望鄴城君王無處所臺榭若平生舞席紛何就歌梁儼未傾西陵松檟冷誰見綺羅情妾本深宫妓層城閉九重君王歡愛盡歌舞為誰容錦衾不復襞羅衣誰再縫髙臺西北望流涕向青松聖泉宴并序𤣥武山有聖泉焉浸淫厯數百千年乗巖泌湧接磴分流下瞰長江沙堤石岸咸古人遺跡也兹乃青蘋緑芰紫苔蒼蘚遂使江湖思逺寤寐寄託既而崇巒左岥石壑前縈丹㟧萬尋碧潭千頃松風唱響竹露薫空瀟瀟乎人間之難遇也方欲以林壑為天屬琴樽為日用嗟乎古今代謝方深川上之悲少長同遊且盡山隂之樂盍題芳什共冩髙情詩得泉字披襟乗石磴列籍俯春泉蘭氣薫山酌松聲韻野絃影飄垂葉外香度落花前興洽林塘晚重巖起夕烟尋道觀其觀即昌利觀而張天師居也芝㕓光分野蓬闕盛規模碧壇清柱閾丹洞肅松樞玉笈三山記金箱五嶽圖蒼虬不可見一作得空望白雲衢散關晨度關山淩旦開石路無塵埃白馬髙談去青牛真氣來重門臨巨壑連棟起崇隈即今揚䇿度非是棄繻回别薛華送送多窮路遑遑獨問津悲涼千里道悽斷百年身心事同漂泊生涯共苦辛無論去與住俱是夢中人重别薛華明月沉珠浦秋風濯錦川樓臺臨絶㟁洲渚亘長天旅泊成千里棲遑共百年窮途惟有淚還望獨澘然遊梵宇三覺寺香閣披青磴琱臺控紫岑葉齊山路狹花積野壇深蘿幌棲禪影松門聴梵音遽欣陪妙躅延賞滌煩襟麻平晚行百年懷土望千里倦遊情髙低尋戍道逺近聼泉聲磵葉纔分色山花不辨名羈心何處盡風急暮猿清送盧主簿窮途非所恨虛室自相依城闕居年滿琴樽俗事稀開襟方未已分袂忽多違東巖富松竹嵗暮幸同歸餞韋兵曹征驂臨野次别袂慘江垂川霽浮煙歛山明落照移鷹風凋晚葉蟬露泣一作泫秋枝亭臯分逺望延想間雲涯白下驛餞唐少府下驛窮交日昌亭旅食年相知何用早懷抱即依然浦樓低晚照鄉路隔風煙去去如何道長安在日邊杜少府之任蜀州城闕輔三秦風煙望五津與君離别意同是宦遊人海内存知巳天涯若比隣無為在岐路兒女共沾巾仲春郊外東園垂桞徑西堰落花津物色連三月風光絶四鄰鳥飛村覺曙魚戲水知春初晴山院裏何處染囂塵郊興空園歌獨酌春日賦閒居澤蘭侵小徑河桞覆長渠雨去花光濕風歸葉影疎山人不惜醉唯畏緑樽虛郊園即事烟霞春旦一作早賞松竹故年心斷山疑畫障懸溜冩鳴琴草徧南亭合花濃一作開北院深閒居饒酒賦隨興欲抽簮觀佛跡寺蓮座神容儼松崖聖跡餘年長金跡淺地乆石文疎頽華臨曲磴傾影赴前除共嗟陵谷逺俄視化城虛山居晚眺贈王道士金壇疎俗宇玉洞侶仙羣花枝栖晚露峰葉度晴雲斜照移山影廻沙擁溜一作文琴樽方待興竹樹已迎曛八仙逕寺南又有昌利觀去寺可數里巖逕窈窕杖而後進柰園欣八正松巖訪九仙援蘿窺霧術攀桂俯雲阡一作烟代北鸞驂至遼西鶴騎旋終希脱塵網連翼下芝田春日還郊閒情兼黙語一作黙黙携杖赴巖泉草緑縈新帶榆青綴古錢魚牀侵㟁水鳥路入山烟還題平子賦花樹滿春田對酒春園作投簮下山閣携酒對河梁狹水牽長鏡髙花送斷香繁鸎歌似曲疎蝶舞成行自然催一醉非但閲年光觀内懷仙玉架殘書隱金壇舊跡迷牽花尋紫洞一作澗歩葉下清谿瓊漿猶類乳石髓尚如泥自能成羽翼何必仰雲梯秋日别王長史别路長一作餘千里深恩重百年正悲西候日更動北梁篇野色籠寒霧山光歛暮烟終知難再奉懷德自澘然上已浮江宴韻得遥字上已年光促中川興緒遥緑齊山葉滿紅洩㟁花銷泉聲喧後澗虹影照前橋遽悲春望逺江路積波潮長桞晨征犯煙磴夕憩在雲關晚風清近壑新月照澄灣郊童樵唱返津叟釣歌還客行無與晤頼此釋愁顔羈遊餞别客心懸隴路遊子倦一作惓江干槿豐一作濃朝砌静篠宻夜牕寒琴聲銷别恨風景駐離歡寜竟山川逺悠悠旅思難易陽早發飭裝侵曉月奔䇿候殘星危閣尋丹嶂廻梁屬翠屛雲間迷樹影霧裏失峰形復此涼颷至空山飛夜螢焦㟁早行和陸四侵星違旅舘乗月戒征儔複嶂迷晴色虚巖辨暗流猿吟山漏曉螢散野風秋故人渺何際鄉關雲霧浮深灣夜宿主人依山帶江津途臨巨壑村宇架危岑堰絶灘聲隱峰交樹影深江童暮理楫山女夜調砧此時故鄉逺寜知逰子心傷裴録事䘮子蘭堦霜候早松路穸一作夜臺深魄散珠胎沒芳銷玉樹沈露文晞宿草烟照慘平林芝焚空歎息流恨滿籝金五言排律泥谿弭棹淩奔壑低鞭躡峻岐江濤出㟁險峰磴入雲危溜急船文亂巖斜騎影移水烟籠翠渚山照落丹崖風生蘋浦葉露泫一作泣竹潭枝泛水雖云美勞歌誰復知秋日仙遊觀贈道士一作駱賔王詩無首四句石圖分帝宇銀牒洞靈宫廻丹縈岫室複翠上巖櫳霧濃金竈静雲暗玉壇空野花常捧露山葉自吟風林泉明月在詩酒故人同待余逢石髓從爾命飛鴻出境遊山二首源水終無路山阿若有人驅羊先動石走兔欲投巾洞晚秋泉冷巖朝古樹新峰斜連鳥翅磴疊上魚鱗化鶴千齡早元龜六代春浮雲今可駕滄海自成塵振翮淩霜吹正月佇天潯為鑣淩翠壑飛軫控青岑巖深靈竈沒澗毁石渠沈宫闕雲間近江山物外臨玉壇棲暮夜珠洞結秋隂蕭蕭離俗影擾擾望鄉心誰意山遊好屢傷人事侵三月曲水宴彭澤官初去河陽賦始傳田園歸舊國詩酒間長筵列室窺丹洞分樓瞰紫烟縈廻亘津渡出沒控郊鄽鳯琴調上客龍轡儼羣仙松石偏宜古藤蘿不記年重簷交密樹複磴擁危泉抗石晞南嶺乗沙眇北川傅巖來築處磻溪入釣前日斜真趣逺幽思夢涼蟬盧照隣和得樽字附風烟彭澤里山水仲長園繇來棄銅墨本自重琴樽髙情邈不嗣雅道今復存有美光時彦養德坐山樊門開芳杜徑室距桃花源公子黄金勒仙人紫氣軒長懷去城市髙詠狎蘭蓀連沙飛白鷺孤嶼嘯𤣥猿日影巖前落雲花江上翻興䦨車馬散林塘夕鳥喧五言絶句晚届鳯州寶鷄辭舊域仙鳯厯遺墟去此近城闕青山明月初羇春客心千里倦春事一朝歸還傷北園裏重見落花飛林塘懷友芳屛畫春草仙杼織朝霞何如山水路對面即飛花山扉夜坐抱琴開野室携酒對情人林塘花月下别是一家春春莊山中蘭葉徑城外李桃園直知人事静不覺鳥聲喧春遊客念紛無極春淚倍成行今朝花樹下不覺戀年光春園山泉兩處晚花桞一園春還持千日醉共作百年人林泉獨飲邱壑經塗賞花桞遇時春相逢今不醉物色自輕人登城春望物外山川近晴初景靄新芳郊花桞徧何處不宜春他鄉叙興綴葉歸烟晚乗花落照春邊城琴酒處俱是越鄉人夜興野烟含夕渚山月照秋林還將中散興來偶歩兵琴臨江二首泛泛東流水飛飛北上塵歸驂將别棹俱是倦遊人去驂嘶别路歸棹隱寒洲江臯木葉下應想故城秋江亭夜月送别二首江送巴南水山横塞北雲津亭秋月夜誰見泣離羣亂烟籠碧砌飛月向南端寂寂離亭掩江山此夜寒别人四首乆客逢餘閏他鄉别故人自然堪下淚誰忍望征塵江上風烟積山幽雲霧多送君南浦外還望將如何桂軺初不駐蘭筵幸未開林塘風月賞應待故人來霜華浄天末霧色籠江際客子常畏人何為乆留滯贈李十四四首野客思茅宇山人愛竹林琴樽唯待處風月自相尋小徑偏宜草空庭不厭花平生詩與酒自得㑹仙家亂竹開三徑飛花滿四鄰從來揚子宅别有尚𤣥人風筵調桂軫月徑引藤杯直當花院裏書齋望曉開早春野望江曠春潮白山長曉岫青他鄉臨眺一作睨極花桞映邊亭山中長江悲已滯萬里念將歸况屬高風晚山山黄葉飛冬郊行望桂密巖花白梨疎林葉紅江臯寒望盡歸念斷征蓬寒夜思友三首乆别侵懷抱他鄉變容色月下調鳴琴相思此何極雲間征思斷月下歸愁切鴻鴈西南飛如何故人别朝朝翠山下夜夜滄江曲復此遥相思清尊湛芳緑始平晚息觀闕長安近江山蜀道賖客行朝復夕無處是鄉家扶風晝届離京浸逺帝里金莖去扶風石柱來山川殊未巳行路方悠哉普安建隂題壁江漢深無極梁岷不可攀山川雲霧裏遊子幾時還九日九日重陽節開門有菊花不知來送酒若箇是陶家七言絶句秋江送别二首早是他鄉值早秋江亭明月帶江流已覺逝川傷别念復看津樹隱離舟歸舟歸騎儼成行江南江北互相望誰謂波瀾纔一水已覺山川是兩鄉蜀中九日登𤣥武山旅眺紀事云武山在東蜀勃以檄雞文斥出沛王府既廢客劍南王有遊𤣥武山詩九月九日望鄉臺他席他鄉送客杯人今一作情巳厭南中苦鴻鴈那從北地來盧照鄰九月九日𤣥武山旅眺附九月九日眺山川歸心歸望積風煙他鄉共酌金花酒萬里同悲鴻鴈天邵大震九月九日登𤣥武山旅眺附九月九日望遥空秋水秋天生夕風寒鴈一向南飛逺遊人幾度菊花叢河陽橋代竇郎中佳人答楊中舍披風聼鳥長河路臨津織女遥相妬判知秋夕帶啼還那及春朝携手度
