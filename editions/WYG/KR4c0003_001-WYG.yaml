body:
  text: 賦春思賦并序咸亨二年余春秋二十有二旅寓巴蜀浮遊嵗序殷憂明時坎壈聖代九隴縣令河東柳太易英達君子也僕從游焉髙談胸懷頗洩憤懣于時春也風光依然古人云風景不殊舉目有山河之異不其悲乎僕不才耿介之士也竊禀宇宙獨用之心受天地不平之氣雖弱植一介窮途千里未嘗下情於公侯屈色於流俗凜然金石自匹猶不能忘情於春則知春之所及逺矣春之所感深矣此僕所以撫窮賤而惜光隂懷功名而悲嵗月也豈徒幽宫狹路陌上桑間而已哉屈平有言目極千里傷春心因作春思賦庶幾乎以極春之所至析心之去就云爾若夫年臨九域韶光四極解宇宙之嚴氣起亭臯之春色况風景兮同序復江山之異國感大運之虚盈見長河之紆直蜀川風候隔秦川今年節物異常年霜前桞葉銜霜翠雪後梅花犯雪妍霜前雪裏知春早看桞看梅覺春好思萬里之佳期憶三秦之逺道淡蕩春色悠揚懷抱野何樹而無花水何堤而無草於是僕本恨人平生自淪懷書去洛抱劍辭秦惜良㑹之遒邁厭他鄉之苦辛忽逢邊候改遙憶帝鄉春帝鄉迢遞關河裏神臯欲暮風烟起黄山半入上林園𤣥㶚斜分曲江水玉臺金闕紛相望千門萬户遥相似昭陽殿裏報春歸未央臺上看春暉水精却掛鴛鴦幔雲母斜開翡翠幃競道西園梅色淺爭知北闕桞隂稀歛態調歌扇廽身整舞衣銀蠶吐絲猶未暖金燕銜泥試學飛妾本幽閨學歌舞寜知漢代多廵撫前年齋祭謁甘泉今嵗笙簫祠后土桃花萬騎喧長薄蘭葉千旗照平浦見原野之芳春憶山河之䆳古長安路狹遶長安公子春來不厭看杏葉裝金轡䈬萄鏤玉鞍聳葢臨平樂廻笳出上蘭上蘭經鄠杜揮鞭日將暮白馬新臨御溝道青牛近出章臺路章臺接建章垂桞復垂楊草開馳馬埓花滿闘雞塲南隣少婦多妖婉北里王孫駐行幰乍怪前春節候遲預道今年寒食晩傷紫陌之春度惜青樓之望逺紫陌青樓照月華珠帷黼帳七香車蛾眉畫來應幾様蟬􅁂梳時半欲斜恨雕鞍之届晩痛銀箭之更賖行行避葉歩歩看花因狂夫之蕩子成賤妾之倡家狂夫去去無窮已賤妾春眠春未起自有蘭閨數十重安知榆塞三千里榆塞連延玉關側雲間沉沉不可識葱山隱隱金河北霧裏蒼蒼幾重䵥忽有驛騎出幽并傳道春衣萬里程龍沙春草遍瀚海春雲生疎勒井泉寒尚竭燕山􅇏火夜應明聞道河源路逺逺誰教夫壻苦行行君行塞外多霜露為想春臺起烟霧遊絲空罥合歡枝落花自遶相思樹春望年年絶幽閨離緒切春色朝朝異邊廷羽書至都䕶新封萬里侯將軍稍定三邊地長斾猶銜掃雲色寶刀尚擁干星氣昨夜祁連驛使還征夫猶在鴈門關君度山川成白首應知嵗序歇紅顔紅顔一别成胡越夫壻連延限城闕羌笛横吹隴路風戎衣直照關山月春色徒盈望春悲殊未歇復聞天子幸關東馳道烟塵萬里紅析羽揺初日繁笳思曉風後騎猶分長樂館前旌已映洛陽宫洛陽宫城紛合沓離房别殿花周匝河陽别舍抵長河丹輪紺幰相經過戚里繁珠翠中閨盛綺羅鳯移金谷舞鶯引石城歌向夕天津洛橋暮爭驅紫燕黄牛度閒居伊水園舊宅邙山路武子新布金錢埒季倫欲碎珊瑚樹復道西墉春霧寡更值南津春望寫入金市而乗羊出銅街而試馬葉抱露而爭密花牽風而亂下錦障縈山羅幃照野司空令尹之博物二陸三張之文雅新年柏葉之樽上巳蘭英之斚春來併是春何啻兩違秦忽逢江外客復憶江南春羅衣乗北渚錦䄂出東隣江邊小婦無形迹特怨狂夫事行役鳯凰山上花無數鸚鵡洲中草如積春江澹容與春期無處所春水春魚樂春汀春鴈舉君道玉門關何如金陵渚為問逐春人年光幾處新何年春不至何地不宜春亦有當春逢逺客亦有當春别故人風物雖同候悲歡各異倫歸去春山恣聞放蕙畹蘭臯行可望何為悠悠坐惆悵比來作客住臨卭春風春日自相逢石鏡巖前花屢密玉輪江上葉頻濃髙平㶚㟁三千里少道梁山一萬重自有春花煎别思無勞春鏡照愁容盛年耿耿辭鄉國長路遙遙不可極形隨朗月驟東西思逐浮雲幾南北春蝶參差命儔侶春鶯綿蠻思羽翼余復何為此方春長歎息㑹當一舉絶風塵翠葢朱軒臨上春朝昇玉署調天紀夕憩金閨奉帝綸長卿未達終希達曲逆長貧豈剰貧年年送春應未盡一旦逢春自有人七夕賦若夫乾靈鵲䜟之端地輔龍驂之始慿紫都而受厯按𤣥丘而命紀鳯毛鍾桂閫之祥麟角燦椒庭之祉馳朱軒於九域振黄麾於萬里抗芝館而星羅擢蘭宫而霞起則有皇慈霧洽聖渥天浮庭分玉禁邸瞰金樓剪鳧洲於細桞披鶴籞於長楸啟魚鈴而分帝術授虹璧而控神州擁黄山於石磴洩𤣥灞於銅溝列瑶牕而送燠闢銀牓而迎秋君王乃排青幌揺朱舄戒鵷輿靜鸞掖繞露廊而轉歩傃雲阡而縱跡嘯陳客於金牀命淮仙於桂席翔翠䍐於金甸迎吹簫於鳯驛佇靈匹於星期眷神姿於月夕於時玉繩湛色金漢餘光烟淒碧樹露濕銀塘視蓮潭之變彩見松院之生涼引驚蟬於寶瑟宿蘭燕於瑶筐緑臺兮千仞赬樓兮百常拂花筵而惨惻披葉序而徜徉結遥情於漢陌飛永睇於霞莊想佳人兮如在怨靈歡兮未揚促遥悲於四運味遺歌於七襄於是虬簷晚静魚扄夜飾忘帝子之光華下君王之顔色握犀管展魚箋顧執事招仲宣仲宣跪而稱曰臣聞九變無津三靈有作布元氣於浩蕩運太虚於寥廓辨河鼔於西堧降天孫於東堮循五緯而清黄道正三衡而澄紫落海人支石之機江女穿針之閣鄙塵情於春念擬仙契於秋諾河光清地紀山氣歛天標霜凝碧宙水瑩丹霄耀麟軒於霧術褰羽斾於星橋徴赤螭而架渚漾青翰而乗潮停翠梭兮巻霜縠引鴛杼兮割氷綃舉黄花而乗月駕籠黛葉而巻雲翹撫今情而恨促指來渚而傷遥既而丹軒黄一作萬拱紫房朱一作千籥仙御逶遲靈徒擾弱風驚雨驟烟廽電爍媧皇召巨野之龍莊􅅱命雕陵之鵲駐麟駕披鸞幕奏雲和汎霞酌碧虬玉室之饌白兔銀臺之藥荷葉赬鮫芙蓉青雀上元錦書傳寶字王母瓊箱薦金約綵襻魚頭比目縫香緘燕尾同心縛羅帳五花懸珉砌百枝然下芸幬而暱枕弛蘭服而交筵託新歡而宻勿懷往眷而潺湲於是羈鸞切鏡旅鶴驚絃悲侵玉履念起金鈿儼歸装而容曵整還葢而遷延洞庭波兮秋水急關山晦兮夕露連謂河漢之無浪似參商之永年君王乃背彤砌陟𤣥室沖想自閒神情如逸痛靈妃之稀偶嘉沉思之可畢荆艶齊升燕佳並出金聲玉韻蕙心蘭質珠櫳綺檻北風臺繡户雕牕南向開響曵紅雲歌面近香隨白雪舞腰來掩清琴而獨進淩絳樹而輕廽盧女黄金之椀張家碧玉之杯奉君王於終夕夫何怨於良媒俄而月還西漢霞臨東沼鳬氏鳴秋雞人唱曉玉關控鶴瓊林飛鳥君王乃馭風殿而長懷俯雲臺而自矯矜雅範而霜髙穆沖襟而霞眇迎十客召三英香涵蔗酎吹肅蘭旌娃館疎兮緑草積歡房寂兮紫苔生聳詞源於月徑披翰藪於雲扄方絶元凱而髙視豈與梁楚而駢聲九成宫東臺山池賦并序九成宫東臺地接閒曠面山臨水爾其松峯桂壑紅泉碧磴金石千聲雲霞萬色侍郎張公雅思沉鬱永懷梓匠式侔仙造聿構靈㕓纎波成止水之源拳石儼干霄之狀雖流波覆簣俯藉人機而布葉攅花𣺌同天㑹僕因暇日濫奉清埃敢抽南畆之才􅂓叙東山之事云爾若夫金臺妙境玉署仙居酌丹池一作墀之曉暇候青禁之宵餘驟沖情於月道飛峻賞於烟墟指山楹而思逸懷水鏡而神虚既而仰瞻赬嶠傍窺黛壑複嶂烟廽攅溪霧錯偉沉用之兼濟想神功之可作規疊巘於盤龍憲飛泉於挂鶴覆簣而縈巖磴浮芥而環川堮採拳石於瑶濵搴纎珠於綺薄萍徙楚江之蔕花轉崑墟之蕚岫藴玉而虹驚浦涵珠而星落美仁智之同歸信髙深之縱託爾其危岑漏景曲渚留寒髙松偃鶴清篠鳴鸞被蘭丘而結珮照蓮服而披冠激坳堂於别溆引膚寸於危巒若乃嶺横雞秀波連鳯液花鳥縈紅蘋魚漾碧緑衣𤣥袵赬鱗翠額在林藪而同歡望江湖而齊適及夫景沉西崿月下東濵峰深夜乆潭靜秋新荷抽水葢薜引山茵雪芝獻液露菊傾津嗣南商之逸興有東海之遐賔保林泉而肆賞混簮紱而同塵何濯纓之有地如攀桂之無因遊廟山賦并序𤣥武山西有廟山東有道君廟葢幽人之别府也長蘿巨樹梢翳雲日王子馭風而遊泠然而善葢懷霄漢之舉而忘城闕之戀矣因欲攀洪崖於烟道邀羡門於天路仙師不存壯志徒爾俄而泉石移景秋隂方積松柏羣吟悲聲四起背鄉關者無復向時之榮焉嗚呼有其志無其時則知林泉有窮路之哭一作嗟烟霞多後時之歎不其悲乎遂作賦曰陟彼山阿積石峩峩亭臯千里傷如之何啟松崖之宻䕃攀桂岊之崇柯隔浮埃於地絡披顥氣於天羅爾其緑巖分徑蒼岑對室菌軒丹絢芝塲翠宻俯泉石之清泠臨風飇之瑟䫻仰紺臺而攜手望𤣥都而容膝於是躡霞岡於玉砌歩雲岊於金壇懷妙童與真女想青螭及碧鸞情恍恍而將逸心迥迥而未安見丹房之晩晦知紫洞之宵寒既而露昏千嶂烟浮四野恨流俗以情多痛飛仙之術寡驅逸思於方外局髙情于天下使蓬瀛可得而宅焉何必懷於此都也亂曰巳矣哉吾誰欺林壑逄地烟霞失時託宇宙兮無日俟鸞虬兮未期他鄉山谷祗令人悲寒梧棲鳯賦鳯兮鳯兮來何所圖出應明主言棲髙梧梧則嶧陽之珍木鳯則丹穴之靈雛理符有契誰言則孤遊必有方駭一作哂南飛之驚鵲音能中吕嗟入夜之啼烏况其靈光蕭散節物淒清疎葉半殞髙歌和鳴鳥也將託其宿止人也焉知乎此情月照孤影風傳暮聲將振耀其五色俟簫韶之九成九成則那率舞而下懷彼衆㑹罔知淳化雖璧沼可飲更能適於醴泉雖瓊林可棲復想廵於竹榭念是欲往敢忘晝夜茍安安而能遷則思思其不暇故當披拂寒梧翻然一發自此西序言投北闕若用之銜詔冀宣命於軒堦若使之游池庶承恩於嵗月可謂擇木而俟處卜居而後歇豈徒比跡於四靈常栖栖而没没江曲孤鳬賦并序梓州之東南涪江之所合有潭焉周數十歩青壁絶地緑波澄天常有孤鳬棲蕩其側飛沉翻唼而天性不違嗟乎宇宙之容我多矣造化之資我厚矣何必處華池之内而求稻粱之恩哉遂作賦曰靈鳯翔兮千仞大鵬飛兮六月雖慿力而易舉終候時而難發不如深潭之鳥焉順歸潮而出没迹已存於江漢心非繫於城闕吮紅藻翻碧蓮刷霧露棲雲烟迫之則隱馴之則前去就無失沉浮自然爾乃忘機絶慮懷聲㺯影乗駭浪而神驚漾澄瀾而趣靜恥園雞之戀促悲塞鴻之赴永知動息而多方屢㳂洄而自省故其獨泛單宿全真逺致反覆幽溪淹留勝地傷雲鴈之嬰繳懼泉魚之受餌甘辭稻粱之惠焉而全飲啄之志也馴鳶賦海上兮雲中青城兮絳宫金山之斷鶴玉塞之驚鴻謂江湖之漲不足憩謂宇宙之路不足窮終銜石矢坐觸金籠聲酸夕露影怨秋風巳矣哉何氣髙而望闊卒神瘁而智癢徒鶩迹於仙遊竟纒機於俗網未若兹禽猶融泛想慚丹丘之麗質謝青田之逸響與道浮沉因時俯仰去非内懼馴非外奬夫勁翮揮風雄姿觸霧力制烟道神周天歩鬱霄漢之𢎞圖受園亭之近顧質雖滯於城闕䇿巳成於雲路陳平負郭之居韓信昌平之寓似達人之用晦混塵蒙而自託類君子之含道處蓬蒿而不怍悲授餌之徒懸痛開弦之自落故爾放懷於誕暢因此寄心於寥廓
