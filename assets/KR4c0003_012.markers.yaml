  - {type: punctuation, offset: 3941, content: /, id: KR4c0003_krp_012-bkkpn71}
  - {type: variant, offset: 3941, length: 336, content: 其二贊平臺秘略贊孝行第一受訓椒殿承輝桂閾資父事君自家刑國孝惟忠本忠隨孝得履薄臨深惟王之則貞修第二列藩好德淸修互起峻局剛情中孚素履道契玄極芳圖青史爲善不同同歸于美藝文第三榮分上邱業盛文塲爭開寶札競聳雕章氣淩雲漢字挾風霜後之來者其在君王忠武第四善政第五榮開社稷業照旂常是恢藩化或固朝章功成道洽身歿名揚唯忠與孝千載生光尊師第六奔霆易駭巨壑難遊主明臣直撫類相求道行言用性逸神休吁嗟盛軌從善如流褒客第七功惟應物業貴逢時君王樂道上客含詞情起月肆興入煙達文林辨囿何代無之幼俊第八列后雲騰英童霧躍年妙識遠理豐詞約寵照玉旗文先銅爵勿疎小善方恢大略規諷第九寵榮有極恭沖是守軸碎羣毛金銷衆口全忠衛國順時藏垢周之宗盟異姓爲後愼終第十具覽藩猷遐窺國篆罕兼百行多褒一善履忠存性愼終思遠生榮死哀身沒名顯, WYG: ''}
