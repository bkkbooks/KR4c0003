body:
  text: 附錄王勃傳石晉劉昫王勃字子安綘州龍門人祖通隋蜀郡司戸書佐大業末棄官歸以著書講學爲業依春秋體例自獲麟後歴秦漢至於後魏著紀年之書謂之元經又依孔子家語揚雄法言例爲客主對答之說號曰中說皆爲儒士所稱義寍元年卒門人薜收等相與議謚曰文中子二子福畤福郊勃六歳解屬文構思無滯詞情英邁與兄勔勮才藻相類父友杜易簡常稱之曰此王氏三珠樹也勃年未及冠應幽素舉及第乾封初詣闕上宸逰東岳頌時東都造乾元殿又上乾元殿頌沛王賢聞其名召爲沛府修撰甚愛重之諸王鬬雞互有勝負勃戲爲檄英王雞文高宗覽之怒曰據此是交搆之漸卽日斥勃不令入府久之補􅉑州參軍勃恃才傲物爲同僚所嫉有官奴曹達犯罪勃匿之又懼事洩乃殺達以塞口事發當誅會赦除名時勃父福畤爲雍州司戸參軍坐勃左遷交趾令上元二年勃徃交趾省父道出江中爲採蓮賦以見意其辭甚美渡南海墮水而卒時年二十八勮弱冠進士登第累除太子典膳丞長壽中擢爲鳯閣舍人時壽春王成器衡陽王成義等五王初出閣同日授册有司撰儀注忘載册文及百僚在列方知闕禮宰相相顧失色勮立召書吏五人各令執筆口占分寫一時俱畢詞理典贍人皆歎服㝷加弘文舘學士兼知天官侍郞勮頗任權勢交結非類萬歲通天二年綦連耀謀逆事泄勮坐與耀善并弟勔並伏誅勔累官至涇州刺史神龍初有詔追復勮勔官位福畤天后朝以子貴累轉澤州長史卒初吏部侍郞裴行儉典選有知人之鑒見勮與蘇味道謂人曰二子亦當掌銓衡之任李敬玄尤重楊烱盧照隣駱賓王與勃等四人必當顯貴行儉曰士之致遠先器識而後文藝勃等雖有文才而浮躁淺露豈享爵祿之噐耶楊子沈靜應至令長餘得令終爲幸果如其言勃文章邁㨗下筆則成尤好著書撰周易發揮五卷及次論等書數部勃亾後竝多遺失有文集三十卷勃聰警絕衆於推歩暦算尤精嘗作大唐千歲暦言唐德靈長千年合承周隋短祚其論大㫖云以土王者五十代而一千年金王者四十九代而九百年水王者二十代而六百年木王三十代而八百年火王者二十代而七百年此天地之常期符暦之數也自黃帝至漢竝是五運眞主五行巳遍土運復歸唐德承之宜矣魏晉至於周隋咸非正統五行之沴氣也故不可承之大率如此王勃傳宋宋祁王勃字子安綘州龍門人六歲善文辭九歲得顔師古注漢書讀之作指瑕以擿其失麟德初劉祥道廵行關内勃上書自陳祥道表于朝對䇿高第年未及冠授朝散郞數獻頌闕下沛王聞其名召署府修撰論次平䑓祕畧書成王愛重之是時諸王鬬雞勃戲爲文檄英王雞高宗怒曰是且交搆斥出府勃旣廢客劒南嘗登葛憒山曠望慨然思諸葛亮之功賦詩見情聞虢州多藥草求補參軍倚才陵籍爲僚吏共嫉官奴曹達抵罪匿勃所懼事洩輙殺之事覺當誅會赦除名父福疇繇雍州司功參軍坐勃故左遷交趾令勃徃省度海溺水痵而卒年二十九初道出鍾陵九月九日都督大宴滕王閣宿命其婿作序以夸客因出𥿄筆徧請客莫敢當至勃慨然不辭都督怒起更衣遣吏伺其文輙報一再報語益奇乃矍然曰天才也請遂成文極歡罷勃屬文初不精思先磨墨數升則酣飲引被覆面卧及寤援筆成篇不易一字時人謂勃爲腹藁尤喜著書初祖通隋末居白牛溪敎授門人甚衆嘗起漢魏盡晉作書百二十篇以續古尙書後亾其序有錄無書者十篇勃補完缺逸定著二十五篇嘗謂人子不可不知醫時長安曹元有秘術勃從之游盡得其要嘗讀易夜夣若有告者曰易有太極子勉思之寤而作易發揮數篇至晉卦會病止又謂王者乗土王世五十數盡千年乘金王世四十九數九百年乘水王世二十數六百年乘木王世三十數八百年乘火王世二十數七百年天地之常也自黃帝至漢五運適周土復歸唐唐應繼周漢不可承周隋短祚乃斥魏晉以䧏非眞主正統皆五行沴氣遂作唐家千歲暦武后時李嗣眞請以周漢爲二王後而廢周隋中宗復用周隋天寶中太平久上言者多以詭異進有崔昌者采勃舊說上五行應運暦請承周漢廢周隋爲閏右相李林甫亦贊右之集公卿議可否集賢學士衞包起居舍人閻伯璵表上曰都堂集議之夕四星聚於尾天意昭然矣於是玄宗下詔以唐承漢黜隋以前帝王廢介􅈶公尊周漢爲二王後以商爲三恪京城起周武王漢高祖廟授崔昌太子贊善大夫衞包司虞員外郞楊國忠爲右相自稱隋宗建議復用魏爲三恪周隋爲魏王後􅈶介二公復舊封貶崔昌烏雷尉衞包夜郞尉閻伯璵涪川尉勃兄勮弟助皆第進士勮長壽中爲鳳閣舍人壽春等五王出閣有司具儀忘載册文群臣巳在乃寤其闕宰相失色勮召五吏執筆分占其辭粲然皆畢人人嗟服㝷加弘文舘學士兼知天官侍郞始裴行儉典選見勮與蘇味道曰二子者皆銓衡才至是語驗勮素善劉思禮用爲箕州刺史與綦連耀謀反勮與兄涇州刺史勔及助皆坐誅神龍初詔復官助字子功七歲䘮母哀號隣里爲泣居父憂毁骨立服除爲監察御史裏行初勔勮勃皆著才名故杜易簡稱三珠樹其後助劼又以文顯劼早卒福畤少子勸亦有文福畤嘗詫韓思彦思彥戲曰武子有馬癖君有譽兒癖王家癖何多耶使助出其文思彥曰生子若是可夸也勃與楊烱盧照隣駱賓王皆以文章齊名天下稱王楊盧駱四傑烱嘗曰吾媿在盧前恥居王後議者謂然遺事王勃示知巳詩云客書同十奏臣劍巳三奔則不爲無意於功名者夣游仙詩云乗月披金枝連星解瓊珮則不爲無意於神仙者是以登葛幘山而思武侯之功宿仙居觀而思霓衣之侣也又述懷擬古詩云僕生二十祀有志十數年下策圖富貴上策懷神仙而二志竟不遂可勝嘆哉韻語陽秋集評蕭明與王僧辯書凢諸部曲赴投戎行霜戈電㦸無非武庫之兵龍甲犀渠皆是靈臺之仗王勃滕王閣序紫電清霜王將軍之武庫正用此事以十四歲之童子胸中萬卷千載之下宿儒猶不能知其出䖏豈非間世奇才杜子美韓退之極其推服良有以也使勃與杜韓竝世對毫恐地上老驥不能追雲中俊鶻也丹鉛錄禇淵碑風儀與秋月齊明音徽共春雲等濶庾信馬射賦落花與芝蓋齊飛楊桺共春旗一色隋長壽舎利碑浮雲共嶺松張葢明月與巖桂分叢王勃滕王閣記本此然勃之語何啻青出於藍前無古人也丹鉛錄滕王閣記至今稱之上巳云綠齊山葉滿紅曵㟁枝銷九日云蘭氣添新酌花香染別衣又詠風云肅肅涼景生加我林壑清驅烟入洞戸卷霧出山楹去來固無跡動息如有情日落山水靜爲君起松聲最有餘味眞天才也唐詩紀事紏謬永嘉所刻初唐十二家其王子安集有田家三首過眼知非子安作細玩知爲王無功作也張氏貴公子多食客何以謬誤至此剔出以不誤觀者田家三首阮籍生平懶嵇康意氣疎相逢一飽醉獨坐數行書平池聊養鶴閑田且牧猪草生元亮徑花暗子雲居倚牀㸔婦織登隴課兒鋤廻頭尋仙子併是一空虛家住箕山下門枕潁川濱不知今有漢唯言昔避秦琴伴庭前月酒勸後園春自得中林士何沗上皇人平生唯以樂作性不能無朝朝訪鄕里夜夜遣人酤家貧畱客久不暇道精麄抽簾特益炬㧞簀更燃爐怕聞飲不足何見有殘壺王勃寺碑高臺與鴈塔俱平曲㟁與猴池共盡佛有五精舍獼猴江其一也楊用修外集王勃河橋不相送江樹遠含情杜荀鶴承恩不在貌敎妾若爲容皆五言律也然去後四句作絶乃妙藝苑巵言盧駱王楊號稱四傑詞㫖華靡固沿陳隋之遺骨氣翩翩意象老境超然勝之五言遂爲律家正始内子安稍近樂府楊盧尚宗漢魏藝苑巵言補遺王勃之先文中子見勃弄筆令作題太公遇文王贊日姬昌好德吕望潛華城闕雖近風雲尚賒漁舟倚石釣浦橫沙路幽山僻溪湥岸斜豹韜禳惡龍鈐辟邪雖逢切近猶待安車君王握手何其晚耶芝田錄按楊炯序勃文集云陳群禀太丘之訓時不逮焉是勃未及見祖也丁用晦云文中命之作頌恐誤姑闕之
