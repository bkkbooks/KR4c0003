front:
  text: 王子安集巻之九
  hash: sha256:20b52a74c9a8ed42ba82e5c98c8f1cda02c5c9ff1c33019f2909ae71b2392ded
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0003_SBCK_009-1a}
body:
  text: 唐龍門王勃子安著明閩漳張爕紹和纂書上劉右相書葢聞聖人以四海爲家英宰與千齡合契用能不行而至春霆仗天地之威以息相推時雨鬱山川之兆故有􅀇蛟晩集憑鶴鼎而先鳴蒼兕晨驚運龍韜而首出竝能風騰霧躍指麾成烈士之致蠖屈虬奔談笑坐羣卿之右未如越蒼海棄行間排紫㣲謁天子於是遭不諱之主擁非常之位龍章鳳黻照其前鏘金鳴玉疊其後三靈叶贊超然奉天下之圖四海承平髙歩取寰中之託君矦之富貴足矣聖朝之付遇㴱矣故知陽矦息浪長鯨臥横海之鱗風伯停機大鵬鎩垂天之翼及其投形巨壑觸丹浦而雷奔假勢靈颷指青霄而電擊神氣洋洋謂鱗翮使之然也殊不知兩儀超忽動止繫於無垠萬化糾紛舒巻存乎非我是以陳平昔之智士也俯同降卒百里奚曩之達人也親爲餓􅀠當其背强敵轉康衢雄慮耿於風雲危途迫於朝夕豈自期榮稱相府西藩專虎據之圖寵冠齋壇東向舉熊飛之策顧盻可以蕩山岳咄嗟可以降雷雨遂令用與不用是非於楚漢之間知與不知得失於虞秦之際故􅂮生有數審窮達者繫於天材運相符決行藏者定於已君矦足下可不謂然乎借如勃者􅆌小之一書生耳曾無繫鐘鼎石之榮非有􅀯隘北閣之援山野悖其心迹煙霧養其神爽未嘗降身摧氣逡巡於列相之門竊譽干時匍匐於羣公之室所以慷慨於君矦者有氣存乎心耳實以四海兄弟齊逺契於蕭韓千載風雲託神知於管鮑不然則荷裳桂楫拂衣於東海之東菌閣松楹髙枕於北山之北焉復區區屑屑踐名利之門哉至尊以揺河徙岳之威當立地開天之運聖人有作羣材畢舉星辰入仕揖讓朱鳥之門風雨稱臣奔􅋅蒼龍之闕方欲停旒金室引成康於已任闢廣瑶林復堯舜於兹日可謂明明穆穆盡天子之容貌矣抑嘗聞之丹山九􅌇煙峰非數簣之功紫極千門雲臺俟萬楹之力故天下至曠神器不可獨專天道無私􅀇勲有待而立書曰元首明哉股肱良哉好問則􅁉自用則小况掌萬國之權受一人之寵動見臧否言知利害君矦足下何時易耶雖有大命不資童子之言而恭此小心敢進狂夫之説伏見􅈙陽未靖大軍頻進有識寒心羣黎破膽昔明王之制國也自近而及逺先仁而後罰徵實則效存狥名則功淺是以農疏千里僅踰重石之鄉禹截九州不敘流沙之境豈才不及而智有遺哉將以辨離方而存正功也雖至人無外甲兵曜天子之威王事有征金鼓發將軍之氣而長城在界秦漢所以失全昌巨海横流天地所以限殊俗闢土數千里無益神封勤兵十八萬空疲帝卒驚烽走傳駭秦洛之甿飛芻輓粟竭淮海之費於是乗奸放命者出繩纆以生威因公挾私者入閭閻而競法雖一物失所泰階延旰食之憂而百戰方雄中國鮮終年之樂圖得而不圖失知利而不知害移手足之病成腹心之疾征税屈於東西威信蹇於表裏語曰勝之不武不勝爲辱天下之責四面至矣誠可逺凝髙策上薦忠言决人事於去就合天情於終始遂令囘麾轉檄背青丘而騖列障分亭巡蒼波而守昔者齊侯以力方城爲楚國之辭虞帝崇文苗人失洞庭之險况乎仗徳綏亂以直乗邪明逆順之端聳􅂠夷之望雖復舳艫沸海旌旗觸天鐵山四面金城千里亦不能爲敵人計矣此君矦之未諭一也葢聞星逥日運御洪荒者貞夫一電照風行制寥廓者歸乎靜易曰復其見天地之心乎語曰動之斯和綏之斯來是知源潔則流清形端則影直大道起而仁義息神化周而市獄定雖復體元立敎􅌌災耀知逺之書順時宰物宥罪發精㣲之典而况澆風易漸淳化難歸孔明耿介於當朝子輿殷勤於易簣葢有繇也伏見邊凶尚梗殊恩屢發亾命山澤者日月相趨朝脱桎梏夕還囹圄姦徒抱袂因時立僥倖之謀頑夫頓足中路紆吁嗟之􅃤皆繇寛勝於猛人迷所習勸沮不彰廉恥相冒亦有公卿失職恥受珪符之任郎官有釁俯捨銅􅇘之榮又焉可以弘奬風流抑揚衆務者也且夫朽索􅂶羈不􅀵奔馬之逸輕緍振網或隨吞舟之勢况非常之化方洽於齊人無􅄭之思乃及於將恐匡衡管仲靈沼於下泉矣古之善爲國者不然信賞而必罰道徳而齊禮澤配雲雨而無曲惠威匹雷霆而絶私戮交書聳幣仗慈厚之師投金散璧樹仁明之長故雖開衢室葢明堂亦將四三皇而六五帝矣此君矦之未諭二也葢易曰天地之大徳曰生聖人之大寶曰位何以守位曰人何以聚人曰財是知發揮地利農桑啟其業振蕩天功泉貝流其用伏覩前制屢擾事非畫一􅒡市蕭然人情怪動夫補簡竝用未盡交易之宜輕重齊行適啟兼并之路於是連闤掩闠者閉肆而乗其屈布衣韋帶者闔門而受其困五方競爽務淺術以相雄百郡爭勝驅末技而成弊田夫織婦衣食鮮終朝之給巨駔洪商輿馬挾封君之勢葢有繇來矣故曰國儲闕於九載則公上無所給家廩乏於三年則妻子非其有夫隂陽覆逆天地之常數百六運窮堯湯所不免一旦洪泉决地大旱焦山風雨於一歲之間霜雹於數州之境繁運廣役首尾於中外沓税增徭日夕於都鄙爕陰陽者將何以處之一夫竊議公之盛徳虧矣愚謂嚴程峻法絶輕陋之貨則奸鎔之源塞矣㳂風正典重耕耘之務則邪嬴之計沮矣然後逺􅀪教㫖大變流俗法立有犯而必施令出唯行而不返違公竊鑄者具五刑之戮因時力田者懸一命之賞不然則賈生晁錯復流涕而言矣此君矦之未諭三也嵩衡不拒細壤故能崇其峻江海不讓纎流所以存其廣是以星臺曉闢上台忘吐握之勞月殿宵興中宇軫山林之慕知夫御天下者必待人也詩曰濟濟多士文王以寧未見君子憂心如醉伏見皇明逺燭帝采遐宣張樂岱郊騰勲社首徵廉察孝瑶壇虚不次之階署行議年璿撿動非常之詔天下可謂幸甚矣於是友月朋霞之客背青臯而至馮唐顏駟之才排紫閣而集夫豈知終始異數涇渭同流蘿薜失圖簮纓解體惜哉羣英霧散名矦招蔽善之嫌天下雷同君子鮮長鳴之地而欲招絶足致真龍難矣此君矦之未諭四也易曰拔茅連茹以其彚征吉豈非順物不若招類報國不如進賢陽事昇而雨露歸陰駕凝而風霜厲莫不觀時有記撫氣相求窮則獨善其私達則兼善天下而利巳疵物者以自任爲身謀知進忘􅅲者謂專榮而得計豈知夫尺波易謝寸晷難畱陵谷好遷乾坤忌滿君矦足下出納王命升降天衢激揚鳳扆之前趨歩麟臺之上亦復知天下有遺俊乎夫心之精㣲口不能言也言之㣲妙書不能文也伏願闢東閣開北堂待之以上賓期之以國士使得披肝膽布腹心大論古今之利害髙談帝王之綱紀然後鷹揚豹變出蓬戸而拜青墀附景摶風捨薹衣而見綘闕幸甚斯不爲難矣庶幾乎麑卵不棄終感􅀇枵之精駿骨時􅀵或致飛黄之錫書生王勃􅂮罪􅂮罪再拜上綘州上官司馬書月日龍門百姓王勃再拜奉書于司馬上官公足下葢聞靈化出於窈冥帝圖寄於寥廓聖人生而萬物睹太階平而四國㑹故曰有非常之后者必有非常之臣有非常之臣者必有非常之績至今雷奔雨嘯風旋電轉拾青紫於俯仰取公卿於朝夕雲臺迫漢南宫列元宰之圖霜㦸羅門北闕據名臣之第嘗見之矣至若時非我與雄略頓於窮途道不吾行髙材屈於卑勢孔宣父之英達位未列於陪臣管公明之傑秀名僅終於郡屬有時無主賈生獻流涕之書有志無時孟軻養浩然之氣則亦有焉豈非妙造無端盛衰止乎其域神期有待動靜牽乎所遇向使太公失於周伯則旗亭之屠父韓信屈於蕭何則轅門之餓􅀠又焉得鷹揚豹變吐納風雲者哉故曰知與不知用與不用觀夫得失之際亦窮達之有數乎其有邀時譽忘廉恥狥茍得設向背於朝廷立縱横於勢利舉三寸之舌屈辱豪門奉咫尺之書逡巡下席皆自謂材足以動俗智足以濟時鐘鼎輝其顧盻冠葢生其籍甚豈知夫四海君子攘袂而恥之乎五尺㣲童所以固窮而不爲也此葢莊周有言所以得意而忘象得象而忘言語曰談何容易易稱書不盡言知談之不易而欲言之盡以是思之良可知矣下官者康衢之賤耳嘗聞闕里之言頗挂平輿之目豈不知塵形俗狀游水鏡而多慚抱鼓援鼙偶雷門而自失而欲刻鵠飾鳬唐突扄餘者邪徒以登山泛海庶測髙㴱執炬傳螢希增日月三奔九合下官聞管仲之風千載一時君矦受鮑卿之託是敢陳其徑庭不然則秋風明月西江畱獨往之因桂嶠松巖􅀯山有不羣之地矧區區者而重髙明之閫閾哉君侯極天分構振瓊樹而韜霞帶地疏源握珠胎而冠月鱗軒羽殿瑶臺降卿相之榮鵲仰蟬簮金社發公矦之始青臯獨唳望鴻漸而翻雲丹穴髙鳴對鵷池而矯霧嚴助以賢良待詔未厭承明汲黯以方正拾遺終榮臥理藩維克振既叅來暮之歌邦國不空自有康沂之相加以雄材廣度散琬琰於胸懷逸氣遒文運風霜於掌握迫青霄而構舍煙霞之涯涘莫尋振滄渤以流謙江漢之波瀾未測耀靈桂於趙席垂棘知歸辯羣籟於莊軒懸匏自託賓階夕敞清河銷驥縶之虞虛榻晨披元禮得龍驅之地方當翊贊宸極羽儀台屏豈徒偃仰州縣勞事藩庭而已哉借如僕者言不滿於鄉黨聲不出於堂閾東海取樂於簞瓢南山畢志於文史餐花佩葉入蘭室而談􅀇挹露攀霞坐松扃而嘯逸揚子雲之澹泊心竊慕之嵇叔夜之逍遥真其好也未嘗露才揚已飾小智以驚愚假勢憑時託中人而樹迹遍遊天下寒心於將相之門獨守太􅀇側身於名利之境嘗謂奉琴巵於北牖詠詩禮於􅀯陔坐商洛而折雲英臨江湖而採煙液生願畢矣而屬鸞扃停逸頻虚不次之階鶴板徵賢累發非常之詔天下有道吾豈匏􅀲承達人一顧之榮辱公車再辟之禮平津矦之博物終屈奉常賈大夫之才名猶逢綘灌况庸者而可免於此乎君侯要津先據圖海盛於當時下官覆簣方勤爲山始於今日雖陵㴱谷變終非入室之賓而晝詠宵吟敢預升堂之列夫以幽明不測尺標見天下之心巨細相傾寸管合羲舒之度豈非道存斯貴理在必亨覇略近􅀤於輿歌皇圖不隔於芻議故有榮枯絶等奉推轂而欣然年勢不侔受分庭而㒺愧風規可接惟君矦體之今古未殊則下官願矣常恨霜松列澗萬尋無罩月之期露草滋山寸莖有梢雲之望斯則聲實困於兼濟才位難於俱立况乎地勢不足以誇俗容貎不足以動人遑遑藪澤安足以奉髙明之咳唾也所冀蠅階賤質附雲足而追颷蚋序輕姿託霜毛而絶海委名勵巳蛟鐔申獨斷之能偶迹當仁驪珠鮮闇投之懼天衢可望指鵬程而三休巨壑難遊伏龍門而一息勃􅂮罪􅂮罪爲人與蜀城父老書葢聞天地作極不能遷否泰之期川岳薦靈不能改窮通之數豈非聖賢同業存乎我者所謂才榮辱異流牽乎彼者所謂命是以龍驤鳳峙翥一作伊周成翊贊之功含糗羮藜顏冉困棲遲之病或先號而後笑或始吉而終凶事不可量功未必定則知洪濤未接長鯨多陸􅂮之憂層風未翔大鵬有雲傾之勢池鰌井鮒亦將鼔鱗而輕之田鳩野鸚亦將騫翮而侮之及衝溟渤接扶揺吹波則江漢倒流騰氣則虹霓掩彩摩赤岸負蒼天然後知其力焉吁韓信之無津也昌亭之一餓夫耳馬卿之失路也臨卭之一食客耳武不足以服衆文不足以動時長劍屈於無知洪筆淪於不用洎乎雄圖躡運至尊納背水之謀麗藻昇朝天子賞淩雲之作威加海岳聲振廊廟彼淮陰之俠少成都之遺老也又焉能知逺近哉是以鑑物於肇不於成賞士於窮不於達是知卞和之得玉也精存於岸谷之間張􅂠之得劒也氣發於星辰之際夫豈琢磨成器然後知其寶剸斵爲能然後知其用哉仰惟鄉耆等竝玉山髙族金堤勝侣列子弟於千城耀衣冠於百代或以風雲去國公孫躍馬之年鐘鼎從王諸葛攀龍之日門庭相接雕甍將綺棟連陳機杼相和鳳攝將虬梭交響金漿玉饌食客三千緑幘青裳家僮數百沖襟渺識人多江漢之靈麗藻􅂠文代有雲泉之氣北齋開敞􅀯舘虛閒詩酒同歸琴書合契忘機得意恥嵇阮之交疎虛席延賓恨原嘗之客少實煙霞之藪澤風月之津梁者乎劉仲文之逺識不以乾沒詣梁城閔仲叔之髙風不以口腹累安邑雖其已沒生氣猶存况乎屬宇宙之明當天下之泰不能俯拾青紫髙視縉紳攀北極而謁帝王入􅀯宫而取卿相脇肩側足求哀鍾釜之間低首俛睂取齊升斗之末磋乎誠下官所以仰天漢而鬱拂臨江山而慷慨者也但時可以未遇可以未行志願可以未成功業可以未就古之才足以輔王業躡迹屠釣之間功可以濟巨川藏身版築之下百里奚之負販陳湯之丏貸而况於庸者哉此僕所以駿奔於顧盻之餘自致於恩光之末也且夫精誠所感尚動神明意氣相交豈慚車馬倘能投心季子遥存素紵之恩援手應侯先立綈袍之贈豈人之情也能無報乎方今白藏紹序朱律謝期天髙而林野疎􅀱肅而江山靜輕蟬送夏驚晩吹於風園旅鴈乗秋動宵吟於露渚絲纊成於􅀯畒秔黍被於東阡時計有儲願履多福下官薄游綿載飄寓淹時歡躓相仍憂虞自積陟梁鴻之峻岳何暇長謡臨阮籍之長途唯知慟哭庶憑賙給以濟飄危輕訴短懷佇流嘉耗又蜀都廣鎮岷㠊奥壤山分玉宇木向金陵景貺有期英靈間出榮問休暢幸甚幸甚夫神有可迫渌波驚七柱之音道有可符􅀇霜扣九鐘之節豈道窮精秘妙聴察於無聲理實杳冥􅀇應通於不測波流柱響波無入柱之因霜落鐘鳴霜非扣鐘之具况乎言忘意得臭味相求目擊道存神明已接鄭僑之逢吳札無謂殊方阮籍之對嵇康自然同氣僕雖不敏嘗從事於斯矣嘗謂薰蕕不共器梟鸞不比翼是以類乎方者按風雲於千里乖乎類者起山川於一面抑嘗聞之士之生也其迹可擯而道不可藏其身可辱而志不可奪其有拂衣投臂遯形滄海之隅裂裳裹足獨立髙山之頂量腹而食度身而衣以鐘鼎爲芻豢以衣冠爲縲絏方欲策鸞鳳而撫雲英鞭虹霓而採煙液其次排玉闕指金門成賈誼之謨樹終軍之策因機入務懷素將相之門沐露沾霜擁筆公矦之室然則拾青紫於旦暮取功名於俄頃演文物而動寰中騰聲名而振天下若下官者可謂慚二途矣而歛手長揖强顏髙視低心於蹇躓之辰忍恥於恓惶之日哉渭濱畱釣鷹揚之業未萌緇源滯牧鴻漸之資葢寡及其攀穹運接靈期乗雲雷而清八極和陰陽而調萬品則知㝠機所運吉凶于倐忽之間􅀇命所移飛伏於斯須之際日月自至􅊃復爾耳方今炎颷謝節爽􅀱闗辰風髙而宇宙清霜下而亭郊肅歸雲止鴈流曙響於東津落照開鴻寫晴規於北岸螢疎夕砌蟬促朝林感序縁情故豐奇賞僕一違秦隴再革炎涼戒征軸而無因指歸途而有倦故鄉超曠曽山重復吳宮尚遠頻驚去燕之心楚峽猶賒已下聞猿之淚徒以風猷未隔道義相存幸承知已之心稍緩他鄉之思昔虞公再見懸光白璧之前季布一言猶定黄金之諾况交已成於杵臼道已茂於金蘭希照窮途遠流嘉貺若使恩裁口腹空畱安邑之賓惠闕始終取恨昌亭之客與契苾將軍書昊天不忱哲人終否畢公逝矣傷如之何敬想情則懿親義惟良執非夫人之爲慟其誰爲慟乎僕與此公早投交契夷險之際終始如一常思竝建忠孝之蹟共申家國之讎壯志不就古人所悲何圖一旦長訣嗚呼哀哉管仲不存叔牙空在子皮已䘮子産何依興言追昔良增痛悼適得韋四郎書具承大郎雅意知欲以此公碑誌託之下走夫撫今懷昔理寄斯文旌徳敘功事屬知巳是以子期幽思感叔夜之形言伯喈雄藻待林宗而無媿下走雖不敏幸託㴱期此而不爲誰當爲者但恐位卑先逹才非㧞萃虛承厚睠不副髙聞謹遣舍弟勛往面取進止臨書啜泣􅃤惶不次上百里昌言書勃言鄉人奉五月一日誨子弟各陳百里之術宣於政者承命惶灼伏增悲悚勃聞古人有言明君不能畜無用之臣慈父不能愛無用之子何則以其無益於國而累於家也嗚呼如勃尚何言哉辱親可謂㴱矣誠宜灰身粉骨以謝君父復何面目以談天下之事哉所以遲廻忍恥而已者徒以虛􅂮不如立節茍殞不如成名悔過儻存於巳爲仁不假於物是以孟明不屑三奔之誚而罷匡秦之心馮異不羞一敗之失而摧輔漢之氣故其志卒行也其功卒就也此言雖小可以喻大此勃所以懷既往而不咎指將來而駿奔割萬恨於生涯進一簣於平地者今大人上延國譴逺宰邊邑出三江而浮五湖越東甌而度􅀯海嗟乎此皆勃之罪也無所逃於天地之間矣然勃嘗聞之大易曰人之所助者信也天之所助者順也是以君子不以否屈而易方故屈而終泰忠臣不以困窮而䘮志故窮而必亨今交趾雖逺還珠者嘗用之矣書不云乎弗慮胡獲弗爲胡成不勝憤激之至謹上百里昌言一部列爲十八篇分爲上下巻庶竭私欵少禆公政追思罪戾若投氷谷謹奉言疏不備勃再拜
